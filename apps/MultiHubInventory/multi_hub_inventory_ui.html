<!-- favicon: hub-and-spoke (central hub linked to peer hubs), inline SVG so the SPA stays self-contained -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><g stroke='%231A77C9' stroke-width='2.4' stroke-linecap='round'><line x1='16' y1='16' x2='16' y2='6'/><line x1='16' y1='16' x2='7' y2='25'/><line x1='16' y1='16' x2='25' y2='25'/></g><g fill='%231A77C9'><circle cx='16' cy='6' r='3.4'/><circle cx='7' cy='25' r='3.4'/><circle cx='25' cy='25' r='3.4'/></g><circle cx='16' cy='16' r='5.8' fill='%231A77C9'/><circle cx='16' cy='16' r='2.4' fill='white'/></svg>">
<style>
:root { --primary:#1A77C9; --ok:#388e3c; --warn:#ff9800; --crit:#d32f2f; --bg:#f5f5f5; --card:#fff; --border:#ddd; --text:#333; --muted:#777; --alt:#f9f9f9; --hover:#e3f2fd; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--primary);text-decoration:none} a:hover{text-decoration:underline}

.hdr{background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.hdr h1{font-size:17px;font-weight:600} .hdr .info{margin-left:auto;font-size:12px;opacity:.85}

.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;position:sticky;top:42px;z-index:99}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;color:var(--muted);transition:all .15s}
.tab:hover{color:var(--text);background:var(--alt)} .tab.active{color:var(--primary);border-bottom-color:var(--primary)}

.content{max-width:1400px;margin:0 auto;padding:16px}
.panel{display:none} .panel.active{display:block}

.card{background:var(--card);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden}
.card-h{padding:10px 14px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);background:var(--alt)}
.card-b{padding:14px}

.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.m{padding:10px;border-radius:6px;background:var(--alt)}
.m-l{font-size:11px;color:var(--muted);margin-bottom:2px} .m-v{font-size:18px;font-weight:600}

.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:5px 12px;border-radius:14px;font-size:12px;font-weight:500;background:var(--hover)}
.pill b{color:var(--primary);margin-left:4px}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--primary);color:#fff;padding:7px 9px;text-align:left;cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0}
th:hover{background:#1565a7} th .arr{font-size:9px;margin-left:3px;opacity:.6}
td{padding:6px 9px;border-bottom:1px solid #eee}
tr:nth-child(even){background:var(--alt)} tr:hover{background:var(--hover)}

.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.b-ok{background:#e8f5e9;color:var(--ok)} .b-warn{background:#fff3e0;color:var(--warn)} .b-crit{background:#ffebee;color:var(--crit)}
.b-builtin{background:#e8eaf6;color:#3949ab} .b-community{background:#fce4ec;color:#c62828} .b-platform{background:#f3e8ff;color:#7c3aed}

.alert{padding:8px 12px;border-radius:6px;margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:6px}
.a-crit{background:#ffebee;border-left:4px solid var(--crit);color:var(--crit)}
.a-warn{background:#fff3e0;border-left:4px solid var(--warn);color:#e65100}
.a-ok{background:#e8f5e9;border-left:4px solid var(--ok);color:var(--ok)}
.a-info{background:#e3f2fd;border-left:4px solid #1976d2;color:#0d47a1}

.loading{text-align:center;padding:50px 20px;color:var(--muted)}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{text-align:center;padding:30px;color:var(--crit)}
.err button{margin-top:10px;padding:7px 18px;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px}

.btn{display:inline-block;padding:7px 14px;border-radius:4px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s}
.btn-p{background:var(--primary);color:#fff} .btn-p:hover{background:#1565a7} .btn-p:disabled{background:#90caf9;cursor:not-allowed}
.btn-d{background:#ffebee;color:var(--crit)} .btn-d:hover{background:#ffcdd2}
.btn-s{padding:4px 10px;font-size:12px}
.actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.cfg-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:4px 0}
.cfg-row label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
input[type=number].cfg-n{width:64px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:13px}

.filter input{padding:7px 11px;border:1px solid var(--border);border-radius:4px;font-size:13px;width:280px;max-width:100%;margin-bottom:10px}

.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.ni{padding:7px 10px;background:var(--alt);border-radius:4px}
.ni .nl{font-size:11px;color:var(--muted)} .ni .nv{font-size:13px;font-weight:500}

.chart-wrap{overflow-x:auto;margin:8px 0}

details{margin:8px 0} summary{cursor:pointer;font-weight:600;font-size:13px;padding:6px 0;color:var(--primary)}

select{padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:13px;margin-right:8px}

.diff-add{color:var(--ok)} .diff-rem{color:var(--crit)} .diff-chg{color:var(--warn)} .diff-item{margin:2px 0 2px 16px}
.pill-menu{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.pill-auto{background:#dbeafe;color:#1e40af} .pill-integ{background:#d1fae5;color:#065f46} .pill-apps{background:#ede9fe;color:#5b21b6}

@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.tab{padding:7px 10px;font-size:12px}.filter input{width:100%}}
.report-mode .actions,.report-mode .live-only,.report-mode .tab[data-tab="config"]{display:none}
.report-banner{background:#fff3cd;color:#856404;padding:8px 20px;font-size:13px;text-align:center;border-bottom:1px solid #ffc107;position:sticky;top:0;z-index:101}
.report-mode .hdr{top:33px}

/* ===== AUDIT MODE — styles not already in the SPA ===== */
.hdr-audit{background:var(--primary);color:#fff;padding:10px 20px;border-radius:8px 8px 0 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:0}
.hdr-audit h1{font-size:17px;font-weight:600}.hdr-audit .meta{font-size:12px;opacity:.85;margin-left:auto}
summary.card-h{cursor:pointer;user-select:none}
summary.card-h::-webkit-details-marker{color:var(--muted)}
summary.card-h::marker{color:var(--muted)}
summary.card-h:hover{background:#f0f0f0}
details:not([open])>summary.card-h{border-bottom:0}
table[data-sortable] th{cursor:pointer}
table[data-sortable] th:hover{background:#1565a7}
table[data-sortable] th[data-dir] .arr{opacity:1}
.muted{color:var(--muted)}.warn{color:var(--warn)}.crit{color:var(--crit)}
</style>
</head>
<body>
<div class="hdr"><h1>Multi-Hub Inventory</h1><span class="info" id="hubInfo">Loading…</span>
  <span id="hdrLinks" style="display:flex;gap:10px;align-items:center;margin-left:8px"></span>
  <button id="rescanBtn" onclick="rescanFleet()" class="btn btn-p btn-s" style="margin-left:auto">↻ Rescan fleet</button></div>
<div class="tabs" id="tabs">
  <div class="tab active" data-tab="summary">Summary</div>
  <div class="tab" data-tab="register">Register</div>
  <div class="tab" data-tab="drift">Firmware Drift</div>
</div>
<div class="content">
  <div class="panel active" id="p-summary"></div>
  <div class="panel" id="p-register"></div>
  <div class="panel" id="p-drift"></div>
</div>
<script>
// ===== VERSION =====
const UI_VERSION = "0.2.0";

// ===== CONFIG & MOCKS =====
const WORKBENCH = false; // true for hub-free local development
const T = '${access_token}', B = '${api_base}';
const MOCK_PEERS = [{index:0,label:'maison-pro',reachable:true,webBase:'http://192.168.1.86'},{index:1,label:'maison',reachable:true,webBase:'http://192.168.1.213'}];
const MOCK_AUDIT = {
  // Hub 0: real-drift group (same source=softwareBuild, different values) + inconsistent-fields group (different sources)
  0: { hubName:'maison-pro', generatedAt:'2026-05-23 10:00 UTC', deviceCount:4, allDevices:{
       // P1 — real drift: both use softwareBuild but different values
       '1':{id:1,label:'Office Plug A',deviceTypeName:'Zigbee Outlet',manufacturer:'Acme',model:'P1',
            firmware:'1.0.6',firmwareSource:'softwareBuild',firmwareOta:null,
            protocol:'Zigbee',orphan:false,disabled:false,appsUsingCount:2,dashboards:[],lastActivityTimeMs:Date.now()},
       // S1 — inconsistent fields: one device reports via softwareBuild, other via application
       '2':{id:2,label:'Thermostat A',deviceTypeName:'Thermostat',manufacturer:'Sinope',model:'TH1300ZB',
            firmware:'1.0.7',firmwareSource:'softwareBuild',firmwareOta:null,
            protocol:'Zigbee',orphan:false,disabled:false,appsUsingCount:1,dashboards:[1],lastActivityTimeMs:Date.now()-2*86400000},
       '3':{id:3,label:'Old Sensor',deviceTypeName:'Contact',manufacturer:'Acme',model:'C1',
            firmware:'1.0',firmwareSource:'softwareBuild',firmwareOta:'20004001',
            protocol:'Z-Wave',orphan:true,disabled:false,appsUsingCount:0,dashboards:[],lastActivityTimeMs:Date.now()-30*86400000},
       '4':{id:4,label:'Office Plug B',deviceTypeName:'Zigbee Outlet',manufacturer:'Acme',model:'P1',
            firmware:'1.0.7',firmwareSource:'softwareBuild',firmwareOta:null,
            protocol:'Zigbee',orphan:false,disabled:false,appsUsingCount:1,dashboards:[1],lastActivityTimeMs:Date.now()-3*86400000} } },
  1: { hubName:'maison', generatedAt:'2026-05-23 10:01 UTC', deviceCount:3, allDevices:{
       // P1 — real drift: same hub, same source, yet another value
       '7':{id:7,label:'Office Plug C',deviceTypeName:'Zigbee Outlet',manufacturer:'Acme',model:'P1',
            firmware:'1.0.9',firmwareSource:'softwareBuild',firmwareOta:null,
            protocol:'Zigbee',orphan:false,disabled:false,appsUsingCount:1,dashboards:[1],lastActivityTimeMs:Date.now()},
       // S1 — inconsistent fields: application='08' vs softwareBuild='1.0.7' on hub 0
       '8':{id:8,label:'Thermostat B',deviceTypeName:'Thermostat',manufacturer:'Sinope',model:'TH1300ZB',
            firmware:'08',firmwareSource:'application',firmwareOta:null,
            protocol:'Zigbee',orphan:false,disabled:false,appsUsingCount:1,dashboards:[1],lastActivityTimeMs:Date.now()-1*86400000},
       // Linked mirror — should be filtered out by filterLinked
       '9':{id:9,label:'Mirror',manufacturer:'Acme',model:'P1',firmware:'1.0.6',firmwareSource:'softwareBuild',firmwareOta:null,protocol:'Linked',appsUsingCount:0,dashboards:[],lastActivityTimeMs:Date.now()} } },
};

// ===== CORRELATION ===== (pure functions; unit-tested in tests/test-correlation.js)
function filterLinked(rows){ return rows.filter(r => r.protocol !== 'Linked'); }
function mergeFleet(hubResults){
  const rows = [], hubs = [];
  for (const h of hubResults){
    const info = { label:h.label, ok:!!h.ok, error:h.error||null, hubName:null, generatedAt:null, deviceCount:0 };
    if (h.ok && h.data && h.data.allDevices){
      info.hubName = h.data.hubName || null;
      info.generatedAt = h.data.generatedAt || null;
      const tagged = Object.values(h.data.allDevices).map(r => Object.assign({}, r, { hub:h.label }));
      const kept = filterLinked(tagged);
      info.deviceCount = kept.length;
      for (const r of kept) rows.push(r);
    }
    hubs.push(info);
  }
  return { rows, hubs };
}
function fwBasis(d){
  const ota = (d.firmwareOta||'').trim();
  if (ota) return { basis:'OTA', value: ota };
  const fw = (d.firmware||'').trim();
  if (fw) return { basis: d.firmwareSource || 'firmware', value: fw };
  return { basis: null, value: null };
}
function firmwareDrift(rows){
  const groups = {};
  for (const r of rows){
    const mfr=(r.manufacturer||'').trim(), model=(r.model||'').trim();
    if (!mfr && !model) continue;
    const key = mfr + ' ' + model;
    (groups[key] = groups[key] || {key, manufacturer:mfr, model, devices:[]}).devices.push(r);
  }
  const out = [];
  for (const k in groups){
    const g = groups[k];
    if (g.devices.length < 2) continue;
    const byBasis = {};                                   // basis -> Set of values
    for (const d of g.devices){
      const b = fwBasis(d);
      if (!b.basis) continue;                             // unknown firmware: not comparable
      (byBasis[b.basis] = byBasis[b.basis] || new Set()).add(b.value);
    }
    const bases = Object.keys(byBasis);
    if (!bases.length) continue;                          // all-unknown group: skip
    const mixed = bases.some(b => byBasis[b].size > 1);   // same field, different values = real drift
    const inconsistent = bases.length > 1;                // identical hardware reporting via different fields
    if (!mixed && !inconsistent) continue;                // consistent: not interesting, don't show
    out.push({ key:g.key, manufacturer:g.manufacturer, model:g.model, count:g.devices.length,
               devices:g.devices, bases, mixed, inconsistent });
  }
  out.sort((a,b) => (b.mixed - a.mixed) || (b.inconsistent - a.inconsistent) || (b.count - a.count));
  return out;
}
function attentionItems(rows, opts){
  const MS_PER_DAY = 86400000;
  opts = opts || {};
  const staleDays = opts.staleDays || 7;
  const cutoff = (opts.now || Date.now()) - staleDays * MS_PER_DAY;
  const res = { stale:[], orphaned:[], disabled:[], unreferenced:[] };
  for (const r of rows){
    if (r.disabled === true) res.disabled.push(r);
    if (r.orphan === true) res.orphaned.push(r);
    if (typeof r.lastActivityTimeMs === 'number' && r.lastActivityTimeMs > 0 && r.lastActivityTimeMs < cutoff) res.stale.push(r);
    const noApps = (r.appsUsingCount || 0) === 0;
    const noDash = !r.dashboards || r.dashboards.length === 0;
    if (noApps && noDash) res.unreferenced.push(r);
  }
  return res;
}
function fleetSummary(merged){
  const rows = merged.rows, byHub = {}, byProtocol = {}, byMfr = {};
  for (const r of rows){
    byHub[r.hub] = (byHub[r.hub] || 0) + 1;
    const p = r.protocol || 'Unknown'; byProtocol[p] = (byProtocol[p] || 0) + 1;
    const m = (r.manufacturer||'').trim() || 'Unknown'; byMfr[m] = (byMfr[m] || 0) + 1;
  }
  const att = attentionItems(rows, {});
  return { total: rows.length, byHub, byProtocol, byManufacturer: byMfr,
    attentionCounts: { stale:att.stale.length, orphaned:att.orphaned.length,
      disabled:att.disabled.length, unreferenced:att.unreferenced.length } };
}

// ===== HELPERS =====
const STALE_DAYS = 7;
// Map of hub label -> webBase (scheme+host), populated from /api/peers.
let HUB_WEBBASE = {};
// Return an <a> link to the device edit page, or plain escaped text if id is unknown.
// Falls back to a relative path for loopback/localhost bases (resolves to the serving hub).
function dlink(id, name, hubLabel){
  if (id == null) return esc(name);
  const wb = HUB_WEBBASE[hubLabel] || '';
  // Cloud-relay peers have no reachable /device/edit admin page (cloud.hubitat.com serves the
  // OAuth API, not the hub UI) — render plain text rather than a broken link.
  if (/cloud\.hubitat\.com/.test(wb)) return esc(name);
  // Loopback self-peer (or no webBase): a relative link resolves to the serving hub.
  const base = (wb && !/127\.0\.0\.1|localhost/.test(wb)) ? wb : '';
  return `<a href="${base}/device/edit/${id}" target="_blank" rel="noopener">${esc(name)}</a>`;
}
// Return {text, color} for days since lastActivityTimeMs.
// text is the bare day count as a string (no 'd' suffix) for numeric sort compatibility;
// callers that want the suffix (e.g. renderDrift) must append it themselves.
function inactivity(ms){
  if (typeof ms !== 'number' || ms <= 0) return { text:'Never', color:'var(--crit)' };
  const days = Math.floor((Date.now() - ms) / 86400000);
  let color = 'var(--ok)';
  if (days >= 2*STALE_DAYS) color = 'var(--crit)';
  else if (days >= STALE_DAYS) color = 'var(--warn)';
  return { text: String(days), color };
}
// Return flag badge HTML for a register row.
function flagPills(r){
  const pills = [];
  if (r.disabled === true) pills.push('<span class="badge b-crit">disabled</span>');
  if (r.orphan === true) pills.push('<span class="badge b-warn">orphan</span>');
  if ((r.appsUsingCount||0) === 0 && (!r.dashboards || r.dashboards.length === 0))
    pills.push('<span class="badge b-warn">unreferenced</span>');
  if (r.singleThreaded === true) pills.push('<span class="badge b-builtin">single-thread</span>');
  return pills.join(' ');
}
// Return true if a register row has any flag worth attention.
function isFlagged(r){
  return r.orphan === true || r.disabled === true || r.singleThreaded === true ||
    ((r.appsUsingCount||0) === 0 && (!r.dashboards || r.dashboards.length === 0));
}

// ===== ORCHESTRATION =====
let FLEET = { rows: [], hubs: [] };

function peerUrl(hubIdx, op, extra){
  let u = `${B}/api/peer?hub=${hubIdx}&op=${op}&access_token=${T}`;
  if (extra) u += extra;
  return u;
}
async function proxy(hubIdx, op, extra){
  if (WORKBENCH){
    if (op === 'data') return MOCK_AUDIT[hubIdx] || { _error: 404 };
    if (op === 'start') return { scanId: 'mock', total: 0, alreadyRunning: false };
    return { status: 'done', processed: 0, total: 0 };
  }
  try {
    const r = await fetch(peerUrl(hubIdx, op, extra));
    if (!r.ok) return { _error: r.status };
    return r.json();
  } catch(e) { return { _error: 'network' }; }
}
async function loadPeers(){
  if (WORKBENCH) return MOCK_PEERS;
  try {
    const r = await fetch(`${B}/api/peers?access_token=${T}`);
    const j = await r.json();
    return j.peers || [];
  } catch(e) { return []; }
}
// Pull each hub's last audit/data (fast). 404/error -> hub marked not-ok.
async function collectExisting(peers){
  const results = [];
  for (const p of peers){
    const d = await proxy(p.index, 'data');
    if (d && !d._error && !d.error) results.push({ label:p.label, ok:true, data:d });
    else results.push({ label:p.label, ok:false, error: d && d.error ? d.error : 'no scan yet', data:null });
  }
  return results;
}
// Trigger a fresh scan on each hub, poll to completion, then pull data.
function setScanStatus(msg){ const el = document.getElementById('hubInfo'); if (el) el.textContent = msg; }

async function rescanFleet(){
  const btn = document.getElementById('rescanBtn');
  const orig = btn ? btn.textContent : '';
  if (btn){ btn.disabled = true; btn.textContent = '⏳ Scanning…'; }
  try {
    const peers = await loadPeers();
    HUB_WEBBASE = {}; for (const p of peers) if (p.webBase) HUB_WEBBASE[p.label] = p.webBase;
    const results = [];
    for (let i = 0; i < peers.length; i++){
      const p = peers[i];
      const pos = `(${i+1}/${peers.length})`;
      setScanStatus(`Scanning ${p.label} ${pos}…`);
      const started = await proxy(p.index, 'start');
      if (!started || started._error){ results.push({label:p.label,ok:false,error:'start failed',data:null}); continue; }
      const sid = started.scanId;
      let done = false; const deadline = Date.now() + 300000; // 5 min cap
      while (!done && Date.now() < deadline){
        await new Promise(res => setTimeout(res, 2000));
        const st = await proxy(p.index, 'status', sid ? `&scanId=${sid}` : '');
        if (!st || st._error){ break; }
        if (typeof st.processed === 'number' && typeof st.total === 'number')
          setScanStatus(`Scanning ${p.label} ${pos}… ${st.processed}/${st.total} devices`);
        // HubDiagnostics' terminal audit status is 'done' (verified live), not 'complete';
        // treat anything no longer actively 'scanning' as finished (done/error/unknown).
        if (st.status && st.status !== 'scanning') done = true;
      }
      setScanStatus(`Fetching ${p.label} ${pos}…`);
      const d = await proxy(p.index, 'data');
      if (d && !d._error && !d.error) results.push({ label:p.label, ok:true, data:d });
      else results.push({ label:p.label, ok:false, error: done ? 'scan produced no data' : 'scan timed out', data:null });
    }
    FLEET = mergeFleet(results);
    renderAll();   // resets hubInfo to the summary line
  } catch (e) {
    setScanStatus('Rescan failed: ' + (e && e.message ? e.message : e));
  } finally {
    if (btn){ btn.disabled = false; btn.textContent = orig || '↻ Rescan fleet'; }
  }
}
async function boot(){
  const peers = await loadPeers();
  HUB_WEBBASE = {}; for (const p of peers) if (p.webBase) HUB_WEBBASE[p.label] = p.webBase;
  const results = await collectExisting(peers);
  FLEET = mergeFleet(results);
  // Inject header links (Settings derived from api_base, always show Docs).
  const linksEl = document.getElementById('hdrLinks');
  const linkStyle = 'color:#fff;opacity:.8;font-size:12px;white-space:nowrap';
  const cfgM = B.match(/^(https?:\/\/[^\/]+)\/apps\/api\/(\d+)/);
  if (cfgM) {
    const cfgUrl = cfgM[1] + '/installedapp/configure/' + cfgM[2];
    linksEl.insertAdjacentHTML('beforeend',
      `<a href="${cfgUrl}" target="_blank" rel="noopener" style="${linkStyle}">&#9881; Settings</a>`);
  }
  linksEl.insertAdjacentHTML('beforeend',
    `<a href="https://github.com/iamtrep/hubitat/blob/main/apps/MultiHubInventory/README.md" target="_blank" rel="noopener" style="${linkStyle}">Docs &#8599;</a>`);
  renderAll();
}

// ===== VIEWS =====
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const h = esc; // alias for tbl() which uses h() for escaping
const fmtDate = ms => (typeof ms==='number'&&ms>0) ? new Date(ms).toISOString().slice(0,10) : '—';

// ===== TABLE ENGINE ===== (ported verbatim from HubDiagnostics tbl())
function tbl(cid,cols,rows,opts={}){
  const el=document.getElementById(cid);if(!el)return;
  if(!rows||!rows.length){el.innerHTML='<p style="color:var(--muted);padding:16px">No data</p>';return}
  let filt=[...rows],sc=opts.sc??0,sd=opts.sd??'asc';
  const ct=opts.collapse??0,cl=opts.collapseLabel;
  function sf(r,ci,d){const c=cols[ci];return r.sort((a,b)=>{let x=a[c.sf]??a[c.f]??'',y=b[c.sf]??b[c.f]??'';if(c.t==='n'){x=parseFloat(x)||0;y=parseFloat(y)||0}else{x=String(x).toLowerCase();y=String(y).toLowerCase()};if(x<y)return d==='asc'?-1:1;if(x>y)return d==='asc'?1:-1;return 0})}
  function bld(rs){
    let o='';
    if(opts.filter)o+='<div class="filter"><input type="text" placeholder="Filter..." id="flt_'+cid+'"></div>';
    if(ct>0&&cl){const open=rows.length<=ct?' open':'';o+='<details'+open+'><summary style="cursor:pointer;font-weight:600;margin:4px 0">'+cl+' ('+rows.length+')</summary>'}
    o+='<div class="tbl-wrap"><table id="t_'+cid+'"><thead><tr>';
    cols.forEach((c,i)=>{const ar=i===sc?(sd==='asc'?' ▲':' ▼'):' ⇅';o+='<th data-c="'+i+'">'+h(c.l)+'<span class="arr">'+ar+'</span></th>'});
    o+='</tr></thead><tbody>'+bldRows(rs)+'</tbody></table></div>';
    if(ct>0&&cl)o+='</details>';return o
  }
  function bldRows(rs){
    let o='';
    rs.forEach(r=>{
      o+='<tr>';
      cols.forEach(c=>{
        const v=c.r?c.r(r):h(r[c.f]??'');
        const sv=r[c.sf]??r[c.f]??'';
        const color = r['_' + c.f + 'Color'] || '';
        const style = color ? ' style="color:' + color + ';font-weight:600"' : '';
        o+='<td data-v="'+h(String(sv))+'"'+style+'>'+v+'</td>'
      });
      o+='</tr>'
    });
    return o;
  }
  filt=sf(filt,sc,sd);el.innerHTML=bld(filt);
  function bind(){
    const t=document.getElementById('t_'+cid);if(!t)return;
    t.querySelectorAll('th').forEach(th=>{th.onclick=()=>{
      const ci=+th.dataset.c;
      if(ci===sc)sd=sd==='asc'?'desc':'asc';else{sc=ci;sd='desc'};
      filt=sf(filt,sc,sd);
      const tb=t.querySelector('tbody');
      if(tb){
        tb.innerHTML=bldRows(filt);
        t.querySelectorAll('th').forEach((thh,i)=>{
          const arr=thh.querySelector('.arr');
          if(arr)arr.textContent=i===sc?(sd==='asc'?' ▲':' ▼'):' ⇅';
        });
      } else {
        const det=el.querySelector('details');const wasOpen=det?det.open:false;
        el.innerHTML=bld(filt);
        const det2=el.querySelector('details');if(det2)det2.open=wasOpen;
        bind();
      }
    }});
    const fi=document.getElementById('flt_'+cid);
    if(fi){
      let _fltTimer=null;
      fi.addEventListener('input',()=>{
        clearTimeout(_fltTimer);
        _fltTimer=setTimeout(()=>{
          const q=fi.value.toLowerCase();
          filt=rows.filter(r=>cols.some(c=>{
            const txt=c.ff?c.ff(r):String(r[c.f]??'');
            return String(txt).toLowerCase().includes(q);
          }));
          filt=sf(filt,sc,sd);
          const tb=t.querySelector('tbody');
          if(tb) tb.innerHTML=bldRows(filt);
          else { el.innerHTML=bld(filt);bind() }
        },150);
      });
    }
  }bind()
}

function renderSummary(){
  const s = fleetSummary(FLEET);
  const hubLines = FLEET.hubs.map(h => `<div class="ni"><div class="nl">${esc(h.label)}${h.ok?'':' ⚠'}</div>`
    + `<div class="nv">${h.ok?h.deviceCount+' devices':'<span class="crit">'+esc(h.error)+'</span>'}</div>`
    + `<div class="nl">${h.ok?('as of '+esc(h.generatedAt||'?')):''}</div></div>`).join('');
  const kv = o => Object.entries(o).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<span class="pill">${esc(k)}<b>${v}</b></span>`).join('');
  const a = s.attentionCounts;
  document.getElementById('p-summary').innerHTML =
    `<div class="card"><div class="card-h">Fleet — ${s.total} devices (mesh mirrors excluded)</div><div class="card-b">
       <div class="ng">${hubLines}</div></div></div>
     <div class="card"><div class="card-h">Attention</div><div class="card-b"><div class="pills">
       <span class="pill">Stale<b>${a.stale}</b></span><span class="pill">Orphaned<b>${a.orphaned}</b></span>
       <span class="pill">Disabled<b>${a.disabled}</b></span><span class="pill">Unreferenced<b>${a.unreferenced}</b></span></div></div></div>
     <div class="card"><div class="card-h">By protocol</div><div class="card-b"><div class="pills">${kv(s.byProtocol)}</div></div></div>
     <div class="card"><div class="card-h">By manufacturer</div><div class="card-b"><div class="pills">${kv(s.byManufacturer)}</div></div></div>`;
}

function hasFw(r){ return !!((r.firmware||'').trim() || (r.firmwareOta||'').trim()); }
function flagText(r){ return [r.orphan&&'orphan', r.disabled&&'disabled', (((r.appsUsingCount||0)===0)&&(!r.dashboards||r.dashboards.length===0))&&'unreferenced', r.singleThreaded&&'single-thread'].filter(Boolean).join(' '); }
function regViewRows(){
  const flaggedOnly = document.getElementById('regFlagged') && document.getElementById('regFlagged').checked;
  const hasFwOnly  = document.getElementById('regHasFw')  && document.getElementById('regHasFw').checked;
  return FLEET.rows.filter(r => (!flaggedOnly||isFlagged(r)) && (!hasFwOnly||hasFw(r))).map(r=>{
    const ia = inactivity(r.lastActivityTimeMs);
    const days = (ia.text==='Never') ? 1e9 : Number(ia.text);
    return Object.assign({}, r, { _days:days, _daysText:ia.text, _daysColor:ia.color, _flags:flagText(r) });
  });
}
function refreshRegTbl(){
  const cols = [
    { l:'Hub',          f:'hub' },
    { l:'Label',        f:'label', ff:r=>(r.label||r.displayName||''), r:r=>dlink(r.id, r.label||r.displayName, r.hub) },
    { l:'Type',         f:'deviceTypeName' },
    { l:'Manufacturer', f:'manufacturer' },
    { l:'Model',        f:'model' },
    { l:'Firmware',     f:'firmware' },
    { l:'OTA',          f:'firmwareOta', r:r=>esc(r.firmwareOta||'—') },
    { l:'Protocol',     f:'protocol' },
    { l:'Days inactive',f:'_days', t:'n', r:r=>`<span style="color:${r._daysColor}">${esc(r._daysText)}</span>` },
    { l:'#Apps',        f:'appsUsingCount', t:'n' },
    { l:'Flags',        f:'_flags', ff:r=>r._flags||'', r:r=>flagPills(r) },
  ];
  tbl('regTbl', cols, regViewRows(), {filter:true});
}
function renderRegister(){
  document.getElementById('p-register').innerHTML =
    `<div class="actions">
       <label style="font-size:13px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="regFlagged" onchange="refreshRegTbl()"> Flagged only</label>
       <label style="font-size:13px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="regHasFw" onchange="refreshRegTbl()"> Has firmware</label>
       <button class="btn btn-p btn-s" onclick="exportCsv()">Export CSV</button></div>
     <div class="card"><div class="card-b"><div id="regTbl"></div></div></div>`;
  refreshRegTbl();
}
function exportCsv(){
  const cols = ['hub','label','deviceTypeName','manufacturer','model','firmware','firmwareOta','protocol','lastActivityTimeMs','appsUsingCount'];
  const head = cols.join(',');
  const lines = FLEET.rows.map(r => cols.map(c => `"${String(r[c]==null?'':r[c]).replace(/"/g,'""')}"`).join(','));
  const blob = new Blob([head+'\n'+lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'multi-hub-inventory.csv'; a.click();
}

function renderDrift(){
  const groups = firmwareDrift(FLEET.rows);
  if (!groups.length){
    document.getElementById('p-drift').innerHTML = '<div class="card"><div class="card-b muted">No firmware drift or inconsistency detected.</div></div>';
    return;
  }
  const driftCols = [
    { l:'Device',       f:'label', ff:r=>(r.label||r.displayName||''), r:r=>dlink(r.id, r.label||r.displayName, r.hub) },
    { l:'Hub',          f:'hub' },
    { l:'Firmware',     f:'firmware', r:r=>r.firmware?esc(r.firmware):'<span class="muted">—</span>' },
    { l:'Source',       f:'firmwareSource', r:r=>r.firmwareSource?esc(r.firmwareSource):'<span class="muted">—</span>' },
    { l:'OTA',          f:'firmwareOta', r:r=>esc(r.firmwareOta||'—') },
    { l:'Days inactive',f:'_days', t:'n', r:r=>`<span style="color:${r._daysColor}">${esc(r._daysText)}</span>` },
  ];
  const cards = groups.map((g, i) => {
    const mfr = esc(g.manufacturer), model = esc(g.model), count = g.count;
    let label;
    if (g.mixed && g.inconsistent) label = '<span class="crit">⚠ mixed firmware + inconsistent fields</span>';
    else if (g.mixed)              label = '<span class="crit">⚠ mixed firmware</span>';
    else                           label = `<span class="warn">⚠ inconsistent firmware fields (${esc(g.bases.join(' vs '))})</span>`;
    return `<div class="card"><div class="card-h">${label} ${mfr} ${model} (${count})</div>`
      + `<div class="card-b"><div id="drift_${i}"></div></div></div>`;
  }).join('');
  document.getElementById('p-drift').innerHTML = cards;
  groups.forEach((g, i) => {
    const devRows = g.devices.map(dev => {
      const ia = inactivity(dev.lastActivityTimeMs);
      const days = (ia.text==='Never') ? 1e9 : Number(ia.text);
      return Object.assign({}, dev, { _days:days, _daysText:ia.text, _daysColor:ia.color });
    });
    tbl('drift_'+i, driftCols, devRows, {});
  });
}

function renderAll(){
  document.getElementById('hubInfo').textContent =
    `${FLEET.hubs.filter(h=>h.ok).length}/${FLEET.hubs.length} hubs · ${FLEET.rows.length} devices`;
  renderSummary(); renderRegister(); renderDrift();
}

// ===== BOOTSTRAP =====
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('p-' + t.dataset.tab).classList.add('active');
});
boot().catch(e => { document.getElementById('hubInfo').textContent = 'Failed to load: ' + (e && e.message ? e.message : e); });
</script>
