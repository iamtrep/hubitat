# HumidityFanController (HFC) — Mode 1 behavior test spec
#
# Exercises the humidity state machine and fan-control reactions of
# apps/HumidityFanController.groovy. Beyond the happy-path activate /
# deactivate flows, covers state-machine convergence:
#
#   - cancel-pending-deactivation: PENDING_NORMAL → HIGH bounce
#   - cancel-pending-activation:   PENDING_HIGH → NORMAL bounce
#   - absolute-high-bypass:        skips activationDelay when bath > absoluteHigh
#   - countermand-pending-on:      v0.6.1 fix — external OFF resolves a pending
#                                  ON cleanly, no spurious "Fan failed to turn on"
#
# Gap: max-fan-run-time-expiry (60s minimum — needs slow-test variant).
#
# Test-friendly timing: activationDelay=2s, deactivationDelay=2s,
# maxFanRunTime=0. Reference baseline = 50%, bathroom triggers:
# 75 (offset activation), 95 (above absoluteHigh=90), 60 (deactivation
# via snapshot+normalOffset=65), 45 (deactivation floor at 58).
#
# Generate with: /hubitat-behavior-test apps/tests/spec-humidity-fan-controller.yaml

app:
  source: apps/HumidityFanController.groovy
  type_name: "Humidity-Based Fan Controller"
  instance_label: test-hfc-app
  config:
    highHumidityOffset: 20
    normalHumidityOffset: 15
    absoluteHighThreshold: 90
    absoluteLowThreshold: 60
    absoluteLowTolerance: 2
    activationDelay: 2
    deactivationDelay: 2
    switchVerificationTimeout: 5
    sensorInactivityTimeout: 60
    maxFanRunTime: 0
    excessiveChangeThreshold: 50    # high enough to not disturb existing-case Δs (max 30); new case uses Δ=60
    occupancyWindowSeconds: 5    # shortened from 600 default for testable gate-expiry timing

inputs:
  - { name: test-hfc-bath,     driver: Virtual Humidity Sensor, role: bathroomHumiditySensors }
  - { name: test-hfc-ref,      driver: Virtual Humidity Sensor, role: referenceHumiditySensors }
  - { name: test-hfc-restrict, driver: Virtual Switch,          role: restrictionSwitchesMustBeOff }
  - { name: test-hfc-motion,   driver: Virtual Motion Sensor,   role: occupancySensors }

outputs:
  - { name: test-hfc-fan,   driver: Virtual Switch, role: fanSwitch }
  - { name: test-hfc-hi-sw, driver: Virtual Switch, role: highHumiditySwitch }

maker_api:
  label: test-hfc-maker

cases:
  - name: baseline-normal
    setup:
      - { device: test-hfc-bath,     command: setHumidity, args: [45] }
      - { device: test-hfc-ref,      command: setHumidity, args: [50] }
      - { device: test-hfc-restrict, command: "off" }
      - { device: test-hfc-fan,      command: "off" }
      - { device: test-hfc-hi-sw,    command: "off" }
    wait_seconds: 4
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "off" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "off" }

  - name: activate-via-offset
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
    wait_seconds: 4
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "on" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }

  # HIGH → PENDING_NORMAL → HIGH bounce. Bath drops below snapshot
  # threshold, then rises back above it before the 2s deactivation
  # timer fires. Cancel must unschedule the timer; fan must stay on.
  - name: cancel-pending-deactivation
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [60] }
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
    command_spacing_seconds: 1.0
    wait_seconds: 2
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "on" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }
    assert_logs:
      - { pattern: "Humidity rose during deactivation delay", level: info }

  - name: deactivate-via-snapshot
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [60] }
    wait_seconds: 4
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "off" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "off" }

  # NORMAL → PENDING_HIGH → NORMAL bounce. Bath rises above activation
  # threshold, then drops back below it before the 2s activation timer
  # fires. Cancel must unschedule the timer; fan must stay off.
  - name: cancel-pending-activation
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
      - { device: test-hfc-bath, command: setHumidity, args: [45] }
    command_spacing_seconds: 1.0
    wait_seconds: 2
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "off" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "off" }
    assert_logs:
      - { pattern: "Humidity dropped during activation delay", level: info }

  # PENDING_HIGH → HIGH bypass. While in PENDING_HIGH, bath jumps above
  # absoluteHighThreshold (90) → skip the 2s activation timer entirely.
  # The 0.5s wait is much shorter than activationDelay=2s, so this case
  # only passes if the bypass code actually fires; a regression would
  # leave fan=off at the assertion point.
  - name: absolute-high-bypass
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
      - { device: test-hfc-bath, command: setHumidity, args: [95] }
    command_spacing_seconds: 1.0
    wait_seconds: 0.5
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "on" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }
    assert_logs:
      - { pattern: "bypassing activation delay", level: info }

  # v0.6.1 bug-fix coverage. After absolute-high-bypass: state=HIGH, fan=on,
  # snapshot=50. Engineer pendingCommand="on" with no fan event in flight:
  #   bath=60 → HIGH → PENDING_NORMAL (snapshot+offset = 65, so 60 deactivates)
  #   bath=75 → rise during deactivation → back to HIGH → turnOnFan →
  #             pendingCommand="on", fanSwitch.on() is a dedup (fan already on)
  #   fan.off → fanSwitchHandler must treat as countermand: clear
  #             pendingCommand, clear fanTurnedOnByApp, no spurious error
  #
  # Before v0.6.1, verifyFanOn fired 5s later and emitted a spurious
  # "Fan failed to turn on" error + notification.
  - name: countermand-pending-on
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [60] }
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
      - { device: test-hfc-fan,  command: "off" }
    command_spacing_seconds: 1.0
    wait_seconds: 2
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "off" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }
    assert_logs:
      - { pattern: "Pending ON countermanded by external OFF event", level: info }
      - { pattern: "Fan failed to turn on", level: error, negate: true }

  - name: restriction-blocks-activation
    setup:
      - { device: test-hfc-bath,     command: setHumidity, args: [45] }
      - { device: test-hfc-restrict, command: "on" }
    setup_wait_seconds: 3
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
    wait_seconds: 4
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "off" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }

  - name: restriction-lifted-while-high
    actions:
      - { device: test-hfc-restrict, command: "off" }
    wait_seconds: 3
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "on" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }
    assert_logs:
      - { pattern: "Restriction lifted while humidity is high", level: info }

  - name: cleanup-to-baseline
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [45] }
    wait_seconds: 4
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "off" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "off" }

  # NORMAL → HIGH fast-climb bypass. Three rising events within 60s with
  # slope ≥ 2.5 %/min skip the 2s activationDelay entirely. The 1s wait
  # is half the activationDelay, so this case only passes if the fast-climb
  # bypass actually fires; a regression would leave hi-sw=off (state still
  # PENDING_HIGH) and the fast-climb log absent.
  - name: fast-climb-bypasses-activation-delay
    setup:
      - { device: test-hfc-bath,     command: setHumidity, args: [40] }
      - { device: test-hfc-ref,      command: setHumidity, args: [50] }
      - { device: test-hfc-restrict, command: "off" }
      - { device: test-hfc-fan,      command: "off" }
      - { device: test-hfc-hi-sw,    command: "off" }
      - { device: test-hfc-motion,   command: active }
    setup_wait_seconds: 4
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [50] }
      - { device: test-hfc-bath, command: setHumidity, args: [65] }
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
    # Spacing 0.7s is the floor — at 0.6s Hubitat coalesces the middle event
    # and the burst falls below burstEventCount.
    command_spacing_seconds: 0.7
    wait_seconds: 1
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "on" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }
    assert_logs:
      - { pattern: "Fast humidity climb detected", level: info }
      - { pattern: "bypassing activation delay", level: info }

  # Occupancy gate: with occupancySensors configured and the motion-active
  # window expired (occupancyWindowSeconds=5), the same burst as above must
  # NOT bypass. State falls through to the threshold path (PENDING_HIGH +
  # 2s delay); with wait_seconds=1 the delay hasn't fired, so fan stays
  # off and hi-sw stays off. Prior case left motion=active; setup_wait=4
  # plus inter-case overhead pushes lastMotionActiveTime > 5s stale.
  - name: occupancy-gate-blocks-fast-climb
    setup:
      - { device: test-hfc-bath,   command: setHumidity, args: [40] }
      - { device: test-hfc-motion, command: inactive }
      - { device: test-hfc-fan,    command: "off" }
      - { device: test-hfc-hi-sw,  command: "off" }
    setup_wait_seconds: 4
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [50] }
      - { device: test-hfc-bath, command: setHumidity, args: [65] }
      - { device: test-hfc-bath, command: setHumidity, args: [75] }
    command_spacing_seconds: 0.7
    wait_seconds: 1
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "off" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "off" }
    assert_logs:
      - { pattern: "Fast humidity climb detected", level: info, negate: true }

  # NORMAL → HIGH excessive-change bypass. Single bath event with Δ ≥
  # excessiveChangeThreshold (50) skips the 2s activationDelay entirely.
  # Bath 30 → 92 = Δ 62 (above threshold) AND 92 > activation line 70
  # AND 92 > activation floor 62. The 0.5s wait is much shorter than
  # activationDelay=2s, so this case only passes if the excessive-change
  # bypass actually fires; a regression would leave fan=off (state still
  # PENDING_HIGH) and the excessive-change log absent.
  #
  # Setup forces NORMAL via a low-bath reading first (30 < activation
  # floor 62, so isAboveActivationThreshold returns false and state stays
  # NORMAL even if it was HIGH from prior cases).
  #
  # PENDING_HIGH entry path is exercised by code review only — no realistic humidity Δ available.
  - name: excessive-change-bypasses-from-normal
    setup:
      - { device: test-hfc-bath,     command: setHumidity, args: [30] }
      - { device: test-hfc-ref,      command: setHumidity, args: [50] }
      - { device: test-hfc-restrict, command: "off" }
      - { device: test-hfc-fan,      command: "off" }
      - { device: test-hfc-hi-sw,    command: "off" }
    setup_wait_seconds: 4
    actions:
      - { device: test-hfc-bath, command: setHumidity, args: [92] }
    wait_seconds: 0.5
    assert:
      - { device: test-hfc-fan,   attribute: switch, value: "on" }
      - { device: test-hfc-hi-sw, attribute: switch, value: "on" }
    assert_logs:
      - { pattern: "Excessive humidity change", level: info }
      - { pattern: "bypassing activation delay", level: info }

runtime_budget_seconds: 70
