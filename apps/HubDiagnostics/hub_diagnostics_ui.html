// Compute snapshot diff client-side. Mirrors the structure that renderDiff() expects;
// hub no longer ships /api/snapshot/diff. Inputs are two full snapshots fetched via
// /api/snapshot/view (which already runs migrateSnapshotDevices on the way out).
function computeSnapshotDiff(older, newer){
  // Chronological order
  if((older.timestampMs||0) > (newer.timestampMs||0)){const tmp=older;older=newer;newer=tmp}
  const oDevs=(older.devices&&older.devices.allDevices)||[];
  const nDevs=(newer.devices&&newer.devices.allDevices)||[];
  const oIds=new Set(oDevs.map(x=>x.id));
  const nIds=new Set(nDevs.map(x=>x.id));
  const oById={};oDevs.forEach(x=>{oById[x.id]=x});
  const mapDev=x=>({id:x.id,name:x.name,connectionType:CD[x.connectionType]||x.connectionType,integration:x.integration});
  const added=nDevs.filter(x=>!oIds.has(x.id)).map(mapDev);
  const removed=oDevs.filter(x=>!nIds.has(x.id)).map(mapDev);
  const changed=nDevs.filter(x=>oIds.has(x.id)).map(x=>{
    const old=oById[x.id];const ch=[];
    if(old.status!==x.status)ch.push({field:'status',from:old.status,to:x.status});
    if(old.connectionType!==x.connectionType)ch.push({field:'connectionType',from:CD[old.connectionType]||old.connectionType,to:CD[x.connectionType]||x.connectionType});
    if(old.integration!==x.integration)ch.push({field:'integration',from:old.integration,to:x.integration});
    return ch.length?{id:x.id,name:x.name,changes:ch}:null;
  }).filter(Boolean);

  const distChanges=(oMap,nMap,labelKey,labelXform)=>{
    oMap=oMap||{};nMap=nMap||{};
    const keys=new Set([...Object.keys(oMap),...Object.keys(nMap)]);
    return [...keys].filter(k=>(oMap[k]||0)!==(nMap[k]||0))
      .map(k=>({[labelKey]:labelXform?labelXform(k):k,from:oMap[k]||0,to:nMap[k]||0}));
  };
  const connectionTypeChanges=distChanges(older.devices&&older.devices.byConnectionType,newer.devices&&newer.devices.byConnectionType,'connectionType',k=>CD[k]||k);
  const integrationChanges=distChanges(older.devices&&older.devices.byIntegration,newer.devices&&newer.devices.byIntegration,'integration');

  const oApps=(older.apps&&older.apps.userAppsList)||[];
  const nApps=(newer.apps&&newer.apps.userAppsList)||[];
  const aid=a=>String(a.id||'');
  const oAids=new Set(oApps.map(aid));
  const nAids=new Set(nApps.map(aid));
  const oAppsById={};oApps.forEach(a=>{oAppsById[aid(a)]=a});
  const appsAdded=nApps.filter(a=>!oAids.has(aid(a))).map(a=>({id:a.id,name:a.name,label:a.label}));
  const appsRemoved=oApps.filter(a=>!nAids.has(aid(a))).map(a=>({id:a.id,name:a.name,label:a.label}));
  const appsChanged=nApps.filter(a=>{const o=oAppsById[aid(a)];return o&&((o.disabled||false)!==(a.disabled||false))})
    .map(a=>({id:a.id,name:a.name,label:a.label,disabled:a.disabled||false}));

  const oNet=older.network||{},nNet=newer.network||{};
  const networkChanges={};
  if((oNet.zigbee&&oNet.zigbee.channel)!==(nNet.zigbee&&nNet.zigbee.channel))
    networkChanges.zigbeeChannel={from:oNet.zigbee&&oNet.zigbee.channel,to:nNet.zigbee&&nNet.zigbee.channel};
  if((oNet.zwave&&oNet.zwave.region)!==(nNet.zwave&&nNet.zwave.region))
    networkChanges.zwaveRegion={from:oNet.zwave&&oNet.zwave.region,to:nNet.zwave&&nNet.zwave.region};
  if((oNet.matter&&oNet.matter.enabled)!==(nNet.matter&&nNet.matter.enabled))
    networkChanges.matterEnabled={from:oNet.matter&&oNet.matter.enabled,to:nNet.matter&&nNet.matter.enabled};
  const peerName=p=>p.name||p.ipAddress;
  const oPeers=((oNet.hubMesh&&oNet.hubMesh.hubList)||[]).map(peerName);
  const nPeers=((nNet.hubMesh&&nNet.hubMesh.hubList)||[]).map(peerName);
  const oPeerSet=new Set(oPeers),nPeerSet=new Set(nPeers);
  const peersAdded=nPeers.filter(p=>!oPeerSet.has(p));
  const peersRemoved=oPeers.filter(p=>!nPeerSet.has(p));
  if(peersAdded.length||peersRemoved.length)networkChanges.hubMeshPeers={added:peersAdded,removed:peersRemoved};
  if('ntpServer' in older && 'ntpServer' in newer && older.ntpServer!==newer.ntpServer)
    networkChanges.ntpServer={from:older.ntpServer,to:newer.ntpServer};
  if('loadThreshold' in older && 'loadThreshold' in newer && older.loadThreshold!==newer.loadThreshold)
    networkChanges.loadThreshold={from:older.loadThreshold,to:newer.loadThreshold};

  const oSt=older.storage||{},nSt=newer.storage||{};
  const storageChanges={};
  if(oSt.fileCount!=null&&nSt.fileCount!=null&&oSt.fileCount!==nSt.fileCount)storageChanges.fileCount={from:oSt.fileCount,to:nSt.fileCount};
  if(oSt.freeSpace!=null&&nSt.freeSpace!=null&&oSt.freeSpace!==nSt.freeSpace)storageChanges.freeSpace={from:oSt.freeSpace,to:nSt.freeSpace};

  const backupsChanges={};
  const oBk=older.backups,nBk=newer.backups;
  if(oBk&&nBk){
    const oLo=oBk.local||{},nLo=nBk.local||{};
    if((oLo.count||0)!==(nLo.count||0))backupsChanges.localCount={from:oLo.count||0,to:nLo.count||0};
    if(oLo.latestCreateTime!==nLo.latestCreateTime&&(oLo.latestCreateTime||nLo.latestCreateTime))
      backupsChanges.latestLocal={from:oLo.latestCreateTime,to:nLo.latestCreateTime};
    const oCl=oBk.cloud||{},nCl=nBk.cloud||{};
    if((oCl.thisHubCount||0)!==(nCl.thisHubCount||0))backupsChanges.cloudThisHubCount={from:oCl.thisHubCount||0,to:nCl.thisHubCount||0};
    if((oCl.hasCloudBackupEntitlements||false)!==(nCl.hasCloudBackupEntitlements||false))
      backupsChanges.cloudBackupEntitlement={from:oCl.hasCloudBackupEntitlements||false,to:nCl.hasCloudBackupEntitlements||false};
    if((oCl.hasCloudRestoreEntitlements||false)!==(nCl.hasCloudRestoreEntitlements||false))
      backupsChanges.cloudRestoreEntitlement={from:oCl.hasCloudRestoreEntitlements||false,to:nCl.hasCloudRestoreEntitlements||false};
  }

  const securityChanges={};
  const oSec=older.security,nSec=newer.security;
  if(oSec&&nSec){
    const oLim=!!(oSec.limitedAccess&&oSec.limitedAccess.enabled);
    const nLim=!!(nSec.limitedAccess&&nSec.limitedAccess.enabled);
    if(oLim!==nLim)securityChanges.limitedAccess={from:oLim,to:nLim};
    const oAddrs=(oSec.limitedAccess&&oSec.limitedAccess.addresses)||[];
    const nAddrs=(nSec.limitedAccess&&nSec.limitedAccess.addresses)||[];
    const setEq=(a,b)=>a.length===b.length&&a.every(x=>b.includes(x));
    if(!setEq(oAddrs,nAddrs))securityChanges.limitedAddresses={from:oAddrs,to:nAddrs};
    const oSub=oSec.allowedSubnets||[];const nSub=nSec.allowedSubnets||[];
    if(!setEq(oSub,nSub))securityChanges.allowedSubnets={from:oSub,to:nSub};
    if(oSec.dnsFallback!==nSec.dnsFallback)securityChanges.dnsFallback={from:oSec.dnsFallback,to:nSec.dnsFallback};
    if(oSec.cloudController!==nSec.cloudController&&(oSec.cloudController!=null||nSec.cloudController!=null))
      securityChanges.cloudController={from:oSec.cloudController,to:nSec.cloudController};
  }

  const codeChanges={};
  const oCode=older.code,nCode=newer.code;
  if(oCode&&nCode){
    const diffById=(o,n)=>{
      o=o||[];n=n||[];
      const oIds=new Set(o.map(x=>x.id));const nIdSet=new Set(n.map(x=>x.id));
      return {added:n.filter(x=>!oIds.has(x.id)),removed:o.filter(x=>!nIdSet.has(x.id))};
    };
    const bdl=diffById(oCode.bundles,nCode.bundles);
    if(bdl.added.length||bdl.removed.length)codeChanges.bundles=bdl;
    const oLib=oCode.libraries||[],nLib=nCode.libraries||[];
    const oLibById={};oLib.forEach(l=>{oLibById[l.id]=l});
    const lib=diffById(oLib,nLib);
    const versionChanged=nLib.filter(l=>oLibById[l.id]&&oLibById[l.id].version!==l.version)
      .map(l=>({id:l.id,name:l.name,namespace:l.namespace,from:oLibById[l.id].version,to:l.version}));
    if(lib.added.length||lib.removed.length||versionChanged.length)codeChanges.libraries={added:lib.added,removed:lib.removed,versionChanged};
    const oHv=oCode.hubVariables||[],nHv=nCode.hubVariables||[];
    const oHvByName={};oHv.forEach(v=>{oHvByName[v.name]=v});
    const oNames=new Set(oHv.map(v=>v.name));const nNames=new Set(nHv.map(v=>v.name));
    const hvAdded=nHv.filter(v=>!oNames.has(v.name));
    const hvRemoved=oHv.filter(v=>!nNames.has(v.name));
    const typeChanged=nHv.filter(v=>oHvByName[v.name]&&oHvByName[v.name].type!==v.type)
      .map(v=>({name:v.name,from:oHvByName[v.name].type,to:v.type}));
    if(hvAdded.length||hvRemoved.length||typeChanged.length)codeChanges.hubVariables={added:hvAdded,removed:hvRemoved,typeChanged};
  }

  return {
    older:{timestamp:older.timestamp,firmware:older.hubInfo&&older.hubInfo.firmware,storage:older.storage},
    newer:{timestamp:newer.timestamp,firmware:newer.hubInfo&&newer.hubInfo.firmware,storage:newer.storage},
    deviceChanges:{olderTotal:(older.devices&&older.devices.totalDevices)||0,newerTotal:(newer.devices&&newer.devices.totalDevices)||0,added,removed,changed},
    connectionTypeChanges, integrationChanges,
    appChanges:{olderTotal:(older.apps&&older.apps.totalApps)||0,newerTotal:(newer.apps&&newer.apps.totalApps)||0,added:appsAdded,removed:appsRemoved,changed:appsChanged},
    networkChanges:Object.keys(networkChanges).length?networkChanges:null,
    storageChanges:Object.keys(storageChanges).length?storageChanges:null,
    backupsChanges:Object.keys(backupsChanges).length?backupsChanges:null,
    securityChanges:Object.keys(securityChanges).length?securityChanges:null,
    codeChanges:Object.keys(codeChanges).length?codeChanges:null
  };
}

function renderDiff(d,elId){
  const el=document.getElementById(elId);if(!el)return;
  if(d.error){el.innerHTML='<div class="alert a-warn">'+h(d.error)+'</div>';return}
  let o='<h3>Config Snapshot Comparison</h3>';
  o+='<div style="margin:6px 0"><b>Older:</b> '+h(d.older.timestamp)+' &rarr; <b>Newer:</b> '+h(d.newer.timestamp)+'</div>';
  // Firmware
  if(d.older.firmware!==d.newer.firmware)o+='<div style="color:var(--primary);margin:4px 0"><b>Firmware:</b> '+h(d.older.firmware)+' &rarr; '+h(d.newer.firmware)+'</div>';
  // Device changes
  const dc=d.deviceChanges;const dd=dc.newerTotal-dc.olderTotal;
  o+='<div style="margin:8px 0"><b>Devices:</b> '+dc.olderTotal+' &rarr; '+dc.newerTotal+(dd!==0?' <span style="color:'+(dd>0?'var(--ok)':'var(--crit)')+'">('+( dd>0?'+':'')+dd+')</span>':'')+'</div>';
  if(dc.added.length){o+='<div class="diff-add" style="margin:4px 0"><b>Added ('+dc.added.length+'):</b></div>';
    dc.added.forEach(d=>{o+='<div style="margin:2px 0 2px 16px" class="diff-add">+ '+dlink(d.id,d.name)+' ('+h(d.integration||d.connectionType||'')+')</div>'})}
  if(dc.removed.length){o+='<div class="diff-rem" style="margin:4px 0"><b>Removed ('+dc.removed.length+'):</b></div>';
    dc.removed.forEach(d=>{o+='<div style="margin:2px 0 2px 16px" class="diff-rem">- '+dlink(d.id,d.name)+' ('+h(d.integration||d.connectionType||'')+')</div>'})}
  if(dc.changed.length){o+='<div class="diff-chg" style="margin:4px 0"><b>Changed ('+dc.changed.length+'):</b></div>';
    dc.changed.forEach(d=>{const ch=d.changes.map(c=>c.field+': '+c.from+' \u2192 '+c.to).join(', ');
      o+='<div style="margin:2px 0 2px 16px" class="diff-chg">~ '+dlink(d.id,d.name)+' &mdash; '+h(ch)+'</div>'})}
  // Protocol changes
  if(d.connectionTypeChanges&&d.connectionTypeChanges.length){o+='<div style="margin:8px 0"><b>Connection Type Changes:</b></div>';
    d.connectionTypeChanges.forEach(p=>{const dd=p.to-p.from;o+='<div style="margin:2px 0 2px 16px">'+h(p.connectionType)+': '+p.from+' \u2192 '+p.to+' <span style="color:'+(dd>0?'var(--ok)':'var(--crit)')+'">('+( dd>0?'+':'')+dd+')</span></div>'})}
  if(d.integrationChanges&&d.integrationChanges.length){o+='<div style="margin:8px 0"><b>Integration Changes:</b></div>';
    d.integrationChanges.forEach(p=>{const dd=p.to-p.from;o+='<div style="margin:2px 0 2px 16px">'+h(p.integration)+': '+p.from+' \u2192 '+p.to+' <span style="color:'+(dd>0?'var(--ok)':'var(--crit)')+'">('+( dd>0?'+':'')+dd+')</span></div>'})}
  // App changes
  const ac=d.appChanges;const ad=ac.newerTotal-ac.olderTotal;
  o+='<div style="margin:8px 0"><b>Apps:</b> '+ac.olderTotal+' \u2192 '+ac.newerTotal+(ad!==0?' <span style="color:'+(ad>0?'var(--ok)':'var(--crit)')+'">('+( ad>0?'+':'')+ad+')</span>':'')+'</div>';
  if(ac.added&&ac.added.length)ac.added.forEach(a=>o+='<div style="margin:2px 0 2px 16px" class="diff-add">+ '+alink(a.id,a.label||a.name)+'</div>');
  if(ac.removed&&ac.removed.length)ac.removed.forEach(a=>o+='<div style="margin:2px 0 2px 16px" class="diff-rem">- '+h(a.label||a.name)+'</div>');
  if(ac.changed&&ac.changed.length){o+='<div class="diff-chg" style="margin:4px 0"><b>Status Changed ('+ac.changed.length+'):</b></div>';
    ac.changed.forEach(a=>o+='<div style="margin:2px 0 2px 16px" class="diff-chg">~ '+alink(a.id,a.label||a.name)+' &mdash; '+(a.disabled?'enabled \u2192 disabled':'disabled \u2192 enabled')+'</div>')}
  // Network config changes
  const nc=d.networkChanges||{};
  if(nc.zigbeeChannel)o+='<div style="margin:8px 0"><b>Zigbee Channel:</b> '+(nc.zigbeeChannel.from??'?')+' \u2192 '+(nc.zigbeeChannel.to??'?')+'</div>';
  if(nc.zwaveRegion)o+='<div style="margin:8px 0"><b>Z-Wave Region:</b> '+h(nc.zwaveRegion.from||'?')+' \u2192 '+h(nc.zwaveRegion.to||'?')+'</div>';
  if(nc.matterEnabled!=null)o+='<div style="margin:8px 0"><b>Matter:</b> '+(nc.matterEnabled.from?'enabled':'disabled')+' \u2192 '+(nc.matterEnabled.to?'enabled':'disabled')+'</div>';
  if(nc.hubMeshPeers){
    if(nc.hubMeshPeers.added&&nc.hubMeshPeers.added.length)nc.hubMeshPeers.added.forEach(p=>o+='<div style="margin:2px 0 2px 16px" class="diff-add">+ Hub Mesh peer: '+h(p)+'</div>');
    if(nc.hubMeshPeers.removed&&nc.hubMeshPeers.removed.length)nc.hubMeshPeers.removed.forEach(p=>o+='<div style="margin:2px 0 2px 16px" class="diff-rem">- Hub Mesh peer: '+h(p)+'</div>')}
  // Storage
  const os=d.older?.storage,ns=d.newer?.storage,sc=d.storageChanges||{};
  if(os||ns||Object.keys(sc).length){
    const fmtSt=st=>st?(st.fileCount+' files'+(st.usedBytes!=null?', '+fmem(st.usedBytes)+' used':'')+(st.freeSpace!=null?', '+fmem(st.freeSpace)+' free':'')):'N/A';
    o+='<div style="margin:8px 0"><b>File Manager:</b> '+fmtSt(os)+' → '+fmtSt(ns)+'</div>';
    if(sc.fileCount)o+='<div style="margin:2px 0 2px 16px"'+(sc.fileCount.to>sc.fileCount.from?' class="diff-add"':sc.fileCount.to<sc.fileCount.from?' class="diff-rem"':'')+'>Files: '+sc.fileCount.from+' → '+sc.fileCount.to+'</div>';
    if(sc.freeSpace)o+='<div style="margin:2px 0 2px 16px"'+(sc.freeSpace.to>sc.freeSpace.from?' class="diff-add"':sc.freeSpace.to<sc.freeSpace.from?' class="diff-rem"':'')+'>Free Space: '+fmem(sc.freeSpace.from)+' → '+fmem(sc.freeSpace.to)+'</div>'}
  // Backups (v5.13.0)
  const bc=d.backupsChanges;
  if(bc&&Object.keys(bc).length){o+='<div style="margin:8px 0"><b>Backups:</b></div>';
    if(bc.localCount){const dd=bc.localCount.to-bc.localCount.from;const cls=bc.localCount.to<bc.localCount.from?'diff-rem':bc.localCount.to>bc.localCount.from?'diff-add':'';o+='<div style="margin:2px 0 2px 16px" class="'+cls+'">Local backup count: '+bc.localCount.from+' → '+bc.localCount.to+(dd!==0?' ('+(dd>0?'+':'')+dd+')':'')+'</div>'}
    if(bc.latestLocal)o+='<div style="margin:2px 0 2px 16px">Latest local backup: '+h(bc.latestLocal.from||'(none)')+' → '+h(bc.latestLocal.to||'(none)')+'</div>';
    if(bc.cloudThisHubCount){const dd=bc.cloudThisHubCount.to-bc.cloudThisHubCount.from;const cls=bc.cloudThisHubCount.to<bc.cloudThisHubCount.from?'diff-rem':bc.cloudThisHubCount.to>bc.cloudThisHubCount.from?'diff-add':'';o+='<div style="margin:2px 0 2px 16px" class="'+cls+'">Cloud backups (this hub): '+bc.cloudThisHubCount.from+' → '+bc.cloudThisHubCount.to+(dd!==0?' ('+(dd>0?'+':'')+dd+')':'')+'</div>'}
    if(bc.cloudBackupEntitlement)o+='<div style="margin:2px 0 2px 16px" class="diff-chg">Cloud backup entitlement: '+(bc.cloudBackupEntitlement.from?'yes':'no')+' → '+(bc.cloudBackupEntitlement.to?'yes':'no')+'</div>';
    if(bc.cloudRestoreEntitlement)o+='<div style="margin:2px 0 2px 16px" class="diff-chg">Cloud restore entitlement: '+(bc.cloudRestoreEntitlement.from?'yes':'no')+' → '+(bc.cloudRestoreEntitlement.to?'yes':'no')+'</div>';
  }
  // Security (v5.13.0)
  const secCh=d.securityChanges;
  if(secCh&&Object.keys(secCh).length){o+='<div style="margin:8px 0"><b>Security:</b></div>';
    if(secCh.limitedAccess)o+='<div style="margin:2px 0 2px 16px" class="diff-chg">Limited Access: '+(secCh.limitedAccess.from?'enabled':'off')+' → '+(secCh.limitedAccess.to?'enabled':'off')+'</div>';
    if(secCh.limitedAddresses)o+='<div style="margin:2px 0 2px 16px" class="diff-chg">Allowed IPs: ['+secCh.limitedAddresses.from.map(h).join(', ')+'] → ['+secCh.limitedAddresses.to.map(h).join(', ')+']</div>';
    if(secCh.allowedSubnets)o+='<div style="margin:2px 0 2px 16px" class="diff-chg">Allowed Subnets: ['+secCh.allowedSubnets.from.map(h).join(', ')+'] → ['+secCh.allowedSubnets.to.map(h).join(', ')+']</div>';
    if(secCh.dnsFallback)o+='<div style="margin:2px 0 2px 16px" class="diff-chg">DNS Fallback: '+(secCh.dnsFallback.from?'on':'off')+' → '+(secCh.dnsFallback.to?'on':'off')+'</div>';
    if(secCh.cloudController)o+='<div style="margin:2px 0 2px 16px" class="diff-chg">Hubitat Cloud: '+h(secCh.cloudController.from||'?')+' → '+h(secCh.cloudController.to||'?')+'</div>';
  }
  // Network settings (NTP, load threshold) — extends networkChanges block
  if(nc.ntpServer)o+='<div style="margin:8px 0"><b>NTP Server:</b> '+h(nc.ntpServer.from||'(none)')+' → '+h(nc.ntpServer.to||'(none)')+'</div>';
  if(nc.loadThreshold)o+='<div style="margin:8px 0"><b>Hub Load Threshold:</b> '+h(String(nc.loadThreshold.from??'?'))+'% → '+h(String(nc.loadThreshold.to??'?'))+'%</div>';
  // Code inventory (v5.13.0)
  const cc=d.codeChanges;
  if(cc&&Object.keys(cc).length){o+='<div style="margin:8px 0"><b>User Code:</b></div>';
    if(cc.bundles){
      (cc.bundles.added||[]).forEach(b=>o+='<div style="margin:2px 0 2px 16px" class="diff-add">+ Bundle: '+h(b.namespace+'/'+b.name)+'</div>');
      (cc.bundles.removed||[]).forEach(b=>o+='<div style="margin:2px 0 2px 16px" class="diff-rem">- Bundle: '+h(b.namespace+'/'+b.name)+'</div>');
    }
    if(cc.libraries){
      (cc.libraries.added||[]).forEach(l=>o+='<div style="margin:2px 0 2px 16px" class="diff-add">+ Library: '+h(l.namespace+'/'+l.name)+(l.version?' v'+l.version:'')+'</div>');
      (cc.libraries.removed||[]).forEach(l=>o+='<div style="margin:2px 0 2px 16px" class="diff-rem">- Library: '+h(l.namespace+'/'+l.name)+(l.version?' v'+l.version:'')+'</div>');
      (cc.libraries.versionChanged||[]).forEach(l=>o+='<div style="margin:2px 0 2px 16px" class="diff-chg">~ Library: '+h(l.namespace+'/'+l.name)+' v'+l.from+' → v'+l.to+'</div>');
    }
    if(cc.hubVariables){
      (cc.hubVariables.added||[]).forEach(v=>o+='<div style="margin:2px 0 2px 16px" class="diff-add">+ Hub Variable: '+h(v.name)+(v.type?' ('+h(v.type)+')':'')+'</div>');
      (cc.hubVariables.removed||[]).forEach(v=>o+='<div style="margin:2px 0 2px 16px" class="diff-rem">- Hub Variable: '+h(v.name)+(v.type?' ('+h(v.type)+')':'')+'</div>');
      (cc.hubVariables.typeChanged||[]).forEach(v=>o+='<div style="margin:2px 0 2px 16px" class="diff-chg">~ Hub Variable: '+h(v.name)+' '+h(v.from)+' → '+h(v.to)+'</div>');
    }
  }
  el.innerHTML=o;
}

  // Checkpoint Scheduling
  o+='<div class="card"><div class="card-h">Perf Checkpoint Scheduling</div><div class="card-b"><div style="display:flex;flex-direction:column;gap:10px">';
  o+=`<div class="cfg-row"><label><input type="checkbox" id="cfg_autoCheckpoint" ${s.autoCheckpoint?'checked':''}><span>Enable automatic perf checkpoints</span></label></div>`;

  o+=`<label>Interval: <select id="cfg_checkpointInterval">`;

  o+=`<label><input type="checkbox" id="cfg_debugLogging" ${s.debugLogging?'checked':''}><span>Enable debug logging</span></label>`;
  o+='</div></div></div>';

  // Live Data
  o+='<div class="card"><div class="card-h">Live Data</div><div class="card-b"><div class="cfg-row">';
  o+=`<label>Auto-refresh interval: <input type="number" id="cfg_liveRefreshSec" value="${s.liveRefreshSec||30}" min="10" max="300" class="cfg-n"> seconds</label>`;
  o+=`<button class="btn btn-p btn-s" id="cfg_saveLive">Save</button><span id="cfg_liveStatus" style="font-size:12px;color:var(--ok)"></span>`;
  o+='</div></div></div>';

  // Export
  o+='<div class="card"><div class="card-h">Export</div><div class="card-b"><div class="cfg-row">';
  o+=`<label><input type="checkbox" id="cfg_obfuscate" ${s.obfuscateForumExport?'checked':''}> Obfuscate device/app labels in forum export (use driver/app type instead of name)</label>`;
  o+='</div></div></div>';

  // Alert Thresholds
  o+='<div class="card"><div class="card-h">Alert Thresholds</div><div class="card-b">';
  o+=`<p style="font-size:13px;color:var(--muted);margin:0 0 10px">Adjust to match your hub model and environment. Defaults suit most C-8/C-8 Pro setups.</p>`;
  o+=`<div class="cfg-row">`;
  o+=`<label>Free memory warning: <input type="number" id="cfg_warnMemMb" value="${s.warnMemMb}" min="10" max="2000" class="cfg-n"> MB</label>`;
  o+=`<label>Free memory critical: <input type="number" id="cfg_critMemMb" value="${s.critMemMb}" min="10" max="2000" class="cfg-n"> MB</label>`;
  o+=`</div><div class="cfg-row">`;
  o+=`<label>CPU load warning: <input type="number" id="cfg_warnCpuLoad" value="${s.warnCpuLoad}" min="0.1" max="32" step="0.1" class="cfg-n"></label>`;
  o+=`<label>CPU load critical: <input type="number" id="cfg_critCpuLoad" value="${s.critCpuLoad}" min="0.1" max="32" step="0.1" class="cfg-n"></label>`;
  o+=`</div><div class="cfg-row">`;
  o+=`<label>Temperature warning: <input type="number" id="cfg_warnTempC" value="${s.warnTempC}" min="20" max="100" class="cfg-n"> \u00B0C</label>`;
  o+=`<label>Temperature critical: <input type="number" id="cfg_critTempC" value="${s.critTempC}" min="20" max="100" class="cfg-n"> \u00B0C</label>`;
  o+=`</div>`;
  o+=`<div class="cfg-row"><button class="btn btn-p btn-s" id="cfg_saveThresholds">Save</button><span id="cfg_threshStatus" style="font-size:12px;color:var(--ok)"></span></div>`;
  o+='</div></div>';

  // Maintenance
  o+='<div class="card"><div class="card-h">Maintenance</div><div class="card-b"><div class="cfg-row">';
  o+=`<button class="btn btn-d" id="cfg_clearCache">Clear Enrichment Cache (${s.cacheSize} entries)</button>`;
  o+=`<span id="cfg_cacheStatus" style="font-size:12px;color:var(--ok)"></span>`;
  o+='</div></div></div>';

  document.getElementById(P).innerHTML=o;

    const res=await post('cache/clear',{});drop('settings');
    this.textContent='Clear Enrichment Cache (0 entries)';

const R={dashboard:rDashboard,devices:rDevices,apps:rApps,code:rCode,network:rNetwork,health:rHealth,performance:rPerf,config:rConfig,snapshots:rSnap};
function go(t){
  curTab=t;
  localStorage.setItem('hub_diag_tab', t);
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+t));
  const p=document.getElementById('p-'+t);
  if(!p.children.length||p.querySelector('.loading')||p.querySelector('.err'))R[t]();
}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.dataset.tab)go(e.target.dataset.tab)});

async function refreshLive(){
  if(document.hidden)return;
  try{
    const sep='?';
    const resp=await fetch(B+'/api/live'+sep+'access_token='+T);
    if(!resp.ok)return;
    const d=await resp.json();
    const r={freeOSMemory:d.freeOSMemory,cpuAvg5min:d.cpuAvg5min,
              totalJavaMemory:d.totalJavaMemory,freeJavaMemory:d.freeJavaMemory,
              directJavaMemory:d.directJavaMemory,
              temperature:d.temperature,databaseSize:d.databaseSize};
    const dash=document.getElementById('res-dash');if(dash)dash.innerHTML=renderDashRes(r,d);
    const health=document.getElementById('res-health');if(health)health.innerHTML=renderHealthRes(r,d);
    const perf=document.getElementById('res-perf');if(perf)perf.innerHTML=renderPerfRes(r);
    const ts=new Date().toLocaleTimeString();
    ['res-dash-ts','res-health-ts','res-perf-ts'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='Updated '+ts});
  }catch(e){}
}

async function renderAuditPage() {
  document.body.innerHTML = '<div id="audit-root" style="padding:20px"><div class="loading">Loading audit report…</div></div>';
  try {
    const data = await api('audit/data');
    document.getElementById('audit-root').innerHTML = buildAuditHtml(data);
    initAuditSort();
  } catch(e) {
    document.getElementById('audit-root').innerHTML = `<div class="err">Failed to load audit report: ${h(e.message || String(e))}</div>`;
  }

function fmtDurSec(ms) {
  if (ms == null) return '';
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + 'm ' + s + 's';
}

function buildAuditHtml(data) {
  const hubName = data.hubName || '';
  const generatedAt = data.generatedAt || '';
  const unreferenced = data.unreferenced || [];
  const meshOrphans = data.meshOrphans || [];
  const stuckJobs = data.stuckJobs || [];
  const tunedDevices = data.tunedDevices || [];
  const tunedDefaults = data.tunedDefaults || {};
  const criticalTop20 = data.criticalTop20 || [];
  const rooms = data.rooms || [];
  const appsToDevices = data.appsToDevices || [];
  const dashboardsToDevices = data.dashboardsToDevices || [];
  const allDevices = data.allDevices || {};
  const failed = data.failed || [];

  const zwNodeRows = Object.values(allDevices).filter(d => d.zwaveNode != null);
  const hmRows = Object.values(allDevices).filter(d => d.hubMeshState != null);

  function sumcell(label, value, severity) {
    const color = severity === 'warn' ? 'var(--warn)' : severity === 'crit' ? 'var(--crit)' : null;
    const s = color ? ` style="color:${color}"` : '';
    return `<div class="m"><div class="m-l">${h(label)}</div><div class="m-v"${s}>${h(String(value ?? ''))}</div></div>`;
  }
  function openCard(anchorId, headerHtml, openByDefault) {
    const openAttr = openByDefault ? ' open' : '';
    return `<div class="card" id="${anchorId}"><details${openAttr}><summary class="card-h">${headerHtml}</summary><div class="card-b">`;
  }
  function closeCard() { return '</div></details></div>'; }
  function driverBadge(dt) {
    return dt === 'usr'
      ? '<span class="badge b-community">Community</span>'
      : '<span class="badge b-builtin">Built-in</span>';
  }

  let o = '';

  // Header
  o += `<div class="hdr-audit"><h1>Device Usage Audit — ${h(hubName)}</h1>`;
  o += `<div class="meta">Generated ${h(generatedAt)} · ${data.deviceCount} devices · scan ${fmtDurSec(data.scanDurationMs)}</div></div>`;

  // TOC
  o += '<div class="toc"><div class="toc-l">Contents</div><div class="toc-grid">';
  o += '<div><a href="#summary">Summary</a></div>';
  o += `<div><a href="#unref">Unreferenced devices (${unreferenced.length})</a></div>`;
  o += `<div><a href="#orphans">Mesh orphans (${meshOrphans.length})</a></div>`;
  o += `<div><a href="#stuck">Stuck scheduled jobs (${stuckJobs.length})</a></div>`;
  o += `<div><a href="#tuned">Manually-tuned devices (${tunedDevices.length})</a></div>`;
  o += '<div><a href="#critical">Critical devices (top 20)</a></div>';
  o += `<div><a href="#rooms">Devices by room (${rooms.length})</a></div>`;
  if (zwNodeRows.length > 0) o += `<div><a href="#zwjs">Z-Wave JS mesh health (${zwNodeRows.length})</a></div>`;
  if (hmRows.length > 0) o += `<div><a href="#hubmesh">Hub Mesh linked devices (${hmRows.length})</a></div>`;
  o += `<div><a href="#apps">Apps → devices (${appsToDevices.length})</a></div>`;
  o += `<div><a href="#dashboards">Dashboards → devices (${dashboardsToDevices.length})</a></div>`;
  o += '<div><a href="#all">Per-device detail table</a></div>';
  if (failed.length > 0) o += `<div><a href="#failed" class="crit">Failed to fetch (${failed.length})</a></div>`;
  o += '</div></div>';

  // Summary
  o += '<div class="card" id="summary"><div class="card-h">Summary</div><div class="card-b"><div class="metrics">';
  o += sumcell('Devices', data.deviceCount, null);
  o += sumcell('Unreferenced', unreferenced.length, 'warn');
  o += sumcell('Mesh orphans', meshOrphans.length, 'crit');
  o += sumcell('Stuck jobs', stuckJobs.length, 'warn');
  o += sumcell(`Critical (≥${data.criticalThreshold} refs)`, data.criticalCount, null);
  o += '</div></div></div>';

  // Unreferenced
  o += openCard('unref', `⚠ Unreferenced devices (${unreferenced.length})`, true);
  if (!unreferenced.length) {
    o += '<div class="muted">None — every device is used by at least one app, dashboard, or parent integration.</div>';
  } else {
    o += '<div class="muted" style="margin-bottom:6px">No apps, no dashboards, no parent app — default sort: oldest last activity first.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_unref"><thead><tr><th>Device</th><th>Type</th><th data-sd="asc">Last activity</th><th>Source</th></tr></thead><tbody>';
    unreferenced.forEach(u => {
      o += `<tr><td>${dlink(u.id, u.name)}</td>`;
      o += `<td>${h(u.type || '')}</td>`;
      o += `<td>${h(u.lastActivityTime || '')}</td>`;
      o += `<td>${driverBadge(u.driverType)}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Mesh orphans
  o += openCard('orphans', `⚠ Mesh orphans (${meshOrphans.length})`, true);
  if (!meshOrphans.length) {
    o += '<div class="muted">None — no devices report orphan radio state.</div>';
  } else {
    o += '<div class="muted" style="margin-bottom:6px">Hubitat reports <code>orphan: true</code> — physical radio relationship lost.</div>';
    o += '<div>' + meshOrphans.map(d => dlink(d.id, d.name)).join(' · ') + '</div>';
  }
  o += closeCard();

  // Stuck jobs
  o += openCard('stuck', `⚠ Stuck scheduled jobs (${stuckJobs.length})`, true);
  if (!stuckJobs.length) {
    o += '<div class="muted">None — all scheduled jobs have a future or null nextRunTime.</div>';
  } else {
    o += '<div class="muted" style="margin-bottom:6px">A null <i>Last run</i> with a past <i>nextRunTime</i> = job was scheduled but never fired.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_stuck"><thead><tr><th>Device</th><th>Handler</th><th data-t="n" data-sd="desc">Overdue</th><th>Last run</th><th>Status</th></tr></thead><tbody>';
    stuckJobs.forEach(s => {
      const prev = s.prevRunTime || '';
      o += `<tr><td>${dlink(s.id, s.name)}</td>`;
      o += `<td><code>${h(s.handler || '')}</code></td>`;
      o += `<td data-sv="${s.overdueMs || 0}">${fmtDurSec(s.overdueMs)}</td>`;
      o += `<td>${prev ? h(prev) : '<span class="muted">never</span>'}</td>`;
      o += `<td>${h(s.status || '')}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Manually-tuned devices
  o += openCard('tuned', `🛠 Manually-tuned devices (${tunedDevices.length})`, true);
  if (!tunedDevices.length) {
    o += '<div class="muted">All devices share the same buffer/threshold values — none have been manually tuned.</div>';
  } else {
    o += `<div class="muted" style="margin-bottom:6px">Devices whose buffer/threshold values diverge from the fleet mode (default: spammyThreshold=${tunedDefaults.spammyThreshold || '?'}, maxStates=${tunedDefaults.maxStates || '?'}, maxEvents=${tunedDefaults.maxEvents || '?'}). Diverging values shown in <span class="warn">bold</span>.</div>`;
    o += '<div class="tbl-wrap"><table data-sortable id="t_tuned"><thead><tr><th data-sd="asc">Device</th><th data-t="n">spammyThreshold</th><th data-t="n">maxStates</th><th data-t="n">maxEvents</th></tr></thead><tbody>';
    tunedDevices.forEach(t => {
      const stCell = t.spammyThreshold == null ? '<span class="muted">—</span>' : (t.spammyOff ? `<b style="color:var(--warn)">${t.spammyThreshold}</b>` : String(t.spammyThreshold));
      const msCell = t.maxStates == null ? '<span class="muted">—</span>' : (t.maxStatesOff ? `<b style="color:var(--warn)">${t.maxStates}</b>` : String(t.maxStates));
      const meCell = t.maxEvents == null ? '<span class="muted">—</span>' : (t.maxEventsOff ? `<b style="color:var(--warn)">${t.maxEvents}</b>` : String(t.maxEvents));
      o += `<tr><td>${dlink(t.id, t.name)}</td>`;
      o += `<td data-sv="${t.spammyThreshold ?? 0}">${stCell}</td>`;
      o += `<td data-sv="${t.maxStates ?? 0}">${msCell}</td>`;
      o += `<td data-sv="${t.maxEvents ?? 0}">${meCell}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Critical devices
  o += openCard('critical', '⭐ Critical devices (top 20 by reference count)', true);
  if (!criticalTop20.length) {
    o += '<div class="muted">No devices have any apps or dashboards.</div>';
  } else {
    o += '<div class="tbl-wrap"><table data-sortable id="t_crit"><thead><tr><th>Device</th><th data-t="n">Apps</th><th data-t="n">Dashboards</th><th data-t="n" data-sd="desc">Total</th></tr></thead><tbody>';
    criticalTop20.forEach(c => {
      o += `<tr><td>${dlink(c.id, c.name)}</td>`;
      o += `<td>${c.appsCount}</td><td>${c.dashboardsCount}</td>`;
      o += `<td><b>${c.total}</b></td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Devices by room
  o += openCard('rooms', `🏠 Devices by room (${rooms.length})`, true);
  if (!rooms.length) {
    o += '<div class="muted">No room data available.</div>';
  } else {
    o += '<div class="muted" style="margin-bottom:6px">Devices grouped by their assigned room. Empty rooms surface storage clutter; high-density rooms may warrant a split.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_rooms"><thead><tr><th>Room</th><th data-t="n" data-sd="desc">Devices</th><th>Members</th></tr></thead><tbody>';
    rooms.forEach(r => {
      const dids = r.deviceIds || [];
      const members = dids.map(did => {
        const dev = allDevices[did];
        const label = dev ? (dev.label || dev.name || ('Device ' + did)) : ('Device ' + did);
        return dlink(did, label);
      }).join(' · ');
      o += `<tr><td><b>${h(r.name || '')}</b></td>`;
      o += `<td data-sv="${dids.length}">${dids.length}</td>`;
      o += `<td>${members || '<span class="muted">empty</span>'}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Z-Wave JS mesh health
  if (zwNodeRows.length > 0) {
    o += openCard('zwjs', `📶 Z-Wave JS mesh health (${zwNodeRows.length})`, true);
    o += '<div class="muted" style="margin-bottom:6px">Per-node controller statistics from Z-Wave JS. RSSI lower (more negative) is quieter; RTT lower is faster; PER (packet error rate) higher is worse.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_zwjs"><thead><tr><th>Device</th><th data-t="n">Node</th><th>State</th><th>Status</th><th>Interview</th><th data-t="n">RTT</th><th>RSSI</th><th data-t="n" data-sd="desc">PER %</th><th data-t="n">TX</th><th data-t="n">RX</th><th>Last Seen</th></tr></thead><tbody>';
    const sortedZw = zwNodeRows.slice().sort((a, b) => ((b.zwaveNode && b.zwaveNode.per) || 0) - ((a.zwaveNode && a.zwaveNode.per) || 0));
    sortedZw.forEach(d => {
      const z = d.zwaveNode || {};
      const stats = z.statistics || {};
      const stateColor = z.nodeState === 'OK' ? 'var(--ok)' : 'var(--crit)';
      o += `<tr><td>${dlink(d.id, d.label || d.name)}</td>`;
      o += `<td>${z.nodeId || ''}</td>`;
      o += `<td><span style="color:${stateColor}">${h(z.nodeState || '')}</span></td>`;
      o += `<td>${z.status || ''}</td>`;
      o += `<td>${h(z.interviewStage || '')}</td>`;
      o += `<td>${z.rtt || '<span class="muted">—</span>'}</td>`;
      o += `<td>${z.rssi || '<span class="muted">—</span>'}</td>`;
      o += `<td data-sv="${z.per || 0}">${z.per || 0}</td>`;
      o += `<td>${stats.commandsTX || 0}</td>`;
      o += `<td>${stats.commandsRX || 0}</td>`;
      o += `<td>${h((z.lastSeenLocal || ''))}</td></tr>`;
    });
    o += '</tbody></table></div>';
    o += closeCard();
  }

  // Hub Mesh linked devices
  if (hmRows.length > 0) {
    o += openCard('hubmesh', `🔗 Hub Mesh linked devices (${hmRows.length})`, true);
    o += '<div class="muted" style="margin-bottom:6px">Devices physically owned by another hub on this account, exposed locally via Hub Mesh.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_hubmesh"><thead><tr><th>Device</th><th>Source Hub</th><th>Source Device ID</th><th>Status</th><th>Raw</th></tr></thead><tbody>';
    hmRows.forEach(d => {
      const hm = d.hubMeshState || {};
      const srcHub = hm.sourceHubName || hm.hostHubName || hm.hubName || '—';
      const srcDevId = String(hm.sourceDeviceId || hm.hostDeviceId || hm.remoteDeviceId || '');
      const status = String(hm.status || hm.linkStatus || hm.online || '');
      o += `<tr><td>${dlink(d.id, d.label || d.name)}</td>`;
      o += `<td>${h(srcHub)}</td>`;
      o += `<td>${h(srcDevId)}</td>`;
      o += `<td>${h(status)}</td>`;
      o += `<td><code style="font-size:11px">${h(JSON.stringify(hm))}</code></td></tr>`;
    });
    o += '</tbody></table></div>';
    o += closeCard();
  }

  // Apps -> devices
  o += openCard('apps', `📱 Apps → devices (${appsToDevices.length})`, true);
  if (!appsToDevices.length) {
    o += '<div class="muted">No apps subscribe to any devices.</div>';
  } else {
    o += '<div class="filter"><input type="text" data-filter="t_apps" placeholder="Filter apps or devices…"></div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_apps"><thead><tr><th data-sd="asc">App</th><th data-t="n"># Devices</th><th>Devices</th></tr></thead><tbody>';
    appsToDevices.forEach(a => {
      const n = (a.devices || []).length;
      const devs = (a.devices || []).map(d => dlink(d.id, d.name)).join(', ');
      const appCell = a.disabled
        ? `<s class="muted" title="App is disabled — its subscriptions are inactive">${alink(a.id, a.label)}</s> <span class="badge b-warn">disabled</span>`
        : alink(a.id, a.label);
      o += `<tr><td data-sv="${h(a.label || '')}">${appCell}</td>`;
      o += `<td>${n}</td>`;
      o += `<td>${devs}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Dashboards -> devices
  o += openCard('dashboards', `📊 Dashboards → devices (${dashboardsToDevices.length})`, true);
  if (!dashboardsToDevices.length) {
    o += '<div class="muted">No dashboards reference any devices.</div>';
  } else {
    o += '<div class="filter"><input type="text" data-filter="t_dash" placeholder="Filter dashboards or devices…"></div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_dash"><thead><tr><th data-sd="asc">Dashboard</th><th data-t="n"># Devices</th><th>Devices</th></tr></thead><tbody>';
    dashboardsToDevices.forEach(d => {
      const n = (d.devices || []).length;
      const devs = (d.devices || []).map(dv => dlink(dv.id, dv.name)).join(', ');
      o += `<tr><td><b>${h(d.name || '')}</b></td>`;
      o += `<td>${n}</td>`;
      o += `<td>${devs}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Per-device detail table
  o += openCard('all', `📋 Per-device detail table (${data.deviceCount})`, true);
  o += '<div class="filter"><input type="text" data-filter="t_all" placeholder="Filter devices…"></div>';
  o += '<div class="tbl-wrap"><table data-sortable id="t_all"><thead><tr><th data-sd="asc">Name</th><th>Type</th><th>Source</th><th data-t="n">Apps</th><th data-t="n">Dashboards</th><th>Parent app</th><th>Last activity</th></tr></thead><tbody>';
  const sortedDevices = Object.values(allDevices).slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  sortedDevices.forEach(d => {
    const src = d.driverType === 'usr' ? '<span class="badge b-community">Community</span>' : '<span class="badge b-builtin">Built-in</span>';
    const apps = d.appsUsing || [];
    const dashs = d.dashboards || [];
    let appsCell;
    if (apps.length) {
      appsCell = apps.slice(0, 4).map(a => {
        const inner = alink(a.id, a.label || a.name);
        return a.disabled ? `<s class="muted" title="App is disabled — subscription inactive">${inner}</s>` : inner;
      }).join(', ') + (apps.length > 4 ? `, <span class="muted">+${apps.length - 4}</span>` : '');
    } else {
      appsCell = d.parentApp == null ? '<span class="warn">⚠ unreferenced</span>' : '<span class="muted">—</span>';
    }
    const dashsCell = dashs.length
      ? dashs.slice(0, 4).map(dash => `<a href="/installedapp/configure/${dash.id}" target="_blank">${h(dash.name || '')}</a>`).join(', ')
        + (dashs.length > 4 ? `, <span class="muted">+${dashs.length - 4}</span>` : '')
      : '<span class="muted">—</span>';
    const pa = d.parentApp;
    const paCell = pa ? alink(pa.id, pa.label || pa.name) : '<span class="muted">—</span>';
    const typeName = h(d.deviceTypeName || '');
    const typeCell = (d.driverType === 'usr' && d.deviceTypeId)
      ? `<a href="/driver/editor/${d.deviceTypeId}" target="_blank">${typeName}</a>`
      : typeName;
    o += `<tr><td>${dlink(d.id, d.label || d.name)}</td>`;
    o += `<td>${typeCell}</td>`;
    o += `<td>${src}</td>`;
    o += `<td data-sv="${apps.length}">${appsCell}</td>`;
    o += `<td data-sv="${dashs.length}">${dashsCell}</td>`;
    o += `<td>${paCell}</td>`;
    o += `<td>${h(d.lastActivityTime || '')}</td></tr>`;
  });
  o += '</tbody></table></div>';
  o += closeCard();

  // Failed footnote
  if (failed.length > 0) {
    o += `<div class="card" id="failed"><div class="card-h crit">Failed to fetch (${failed.length})</div><div class="card-b muted">`;
    o += failed.map(f => `Device ${f.id}: ${h(f.reason || '')}`).join('<br>');
    o += '</div></div>';
  }

  return o;
}

function initAuditSort() {
  function cmp(a, b, n) {
    if (n) { a = parseFloat(a) || 0; b = parseFloat(b) || 0; return a < b ? -1 : a > b ? 1 : 0; }
    a = String(a).toLowerCase(); b = String(b).toLowerCase(); return a < b ? -1 : a > b ? 1 : 0;
  }
  function getSv(td) { return td.dataset.sv != null ? td.dataset.sv : td.textContent.trim(); }
  function sortTable(tbl, col, dir) {
    const th = tbl.tHead.rows[0].cells[col], n = th.dataset.t === 'n';
    const tb = tbl.tBodies[0];
    const rows = Array.from(tb.rows);
    rows.sort((r1, r2) => cmp(getSv(r1.cells[col]), getSv(r2.cells[col]), n) * (dir === 'desc' ? -1 : 1));
    rows.forEach(r => tb.appendChild(r));
  }
  function setArrows(ths, col, dir) {
    Array.from(ths).forEach((t, i) => {
      const a = t.querySelector('.arr');
      if (i === col) { t.dataset.dir = dir; if (a) a.textContent = dir === 'asc' ? ' ▲' : ' ▼'; }
      else { delete t.dataset.dir; if (a) a.textContent = ' ⇅'; }
    });
  }
  document.querySelectorAll('table[data-sortable]').forEach(tbl => {
    if (!tbl.tHead || !tbl.tBodies[0]) return;
    const ths = tbl.tHead.rows[0].cells;
    let defCol = -1, defDir = 'asc';
    Array.from(ths).forEach((th, i) => {
      const s = document.createElement('span'); s.className = 'arr'; s.textContent = ' ⇅'; th.appendChild(s);
      th.addEventListener('click', () => {
        const dir = th.dataset.dir === 'asc' ? 'desc' : (th.dataset.dir === 'desc' ? 'asc' : (th.dataset.t === 'n' ? 'desc' : 'asc'));
        setArrows(ths, i, dir); sortTable(tbl, i, dir);
      });
      if (th.dataset.sd) { defCol = i; defDir = th.dataset.sd; }
    });
    if (defCol >= 0) { setArrows(ths, defCol, defDir); sortTable(tbl, defCol, defDir); }
  });
  document.querySelectorAll('input[data-filter]').forEach(inp => {
    const tbl = document.getElementById(inp.dataset.filter); if (!tbl || !tbl.tBodies[0]) return;
    inp.addEventListener('input', () => {
      const q = inp.value.toLowerCase();
      Array.from(tbl.tBodies[0].rows).forEach(r => { r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
    });
  });
}

// ===== STARTUP =====
const _inAuditMode = new URLSearchParams(window.location.search).has('audit');
if (_inAuditMode) {
  renderAuditPage();
} else {
  let liveTimer=setInterval(refreshLive,liveIntervalSec*1000);
  document.addEventListener('visibilitychange',()=>{
    clearInterval(liveTimer);
    if(!document.hidden)liveTimer=setInterval(refreshLive,liveIntervalSec*1000)
  });
  // Populate header hub info regardless of which tab opens first (cached for 2min, free on dashboard tab).
  api('dashboard').then(d=>setHubInfoHeader(d&&d.hub)).catch(()=>{});
  go(curTab);
}
</script>
