function fmtDurSec(ms) {
  if (ms == null) return '';
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + 'm ' + s + 's';
}

// Audit cross-reference, derived in the browser from the raw allDevices map (moved off the hub — LB1, v5.42.0).
// Reference count at/above which a device is flagged "critical" in the audit report. Owned by the
// SPA (the hub no longer ships criticalThreshold) — used for both the filter and the label below.
const AUDIT_CRIT_REFS = 5;
// Mirrors the former Groovy buildCrossReference. `stuckJobs` is intentionally not produced (its card was removed).
// String ordering uses code-unit comparison (a<b) to match Groovy's String <=> for the non-re-sorted lists.
function buildAuditXref(allDevices) {
  const byName = (a, b) => (String(a.name) < String(b.name) ? -1 : String(a.name) > String(b.name) ? 1 : 0);
  const devs = Object.values(allDevices || {});
  const unreferenced = [], meshOrphans = [], allRefs = [];
  const appsIndex = {}, dashIndex = {};
  devs.forEach(d => {
    const nm = d.label || d.name;
    const apps = d.appsUsingCount || 0;
    const dashs = (d.dashboards || []).length;
    // Unreferenced: no app subscribers and no parent app (dashboard membership ignored)
    if (apps === 0 && d.parentApp == null) {
      unreferenced.push({ id: d.id, name: nm, type: d.deviceTypeName, lastActivityTime: d.lastActivityTime, lastActivityTimeMs: d.lastActivityTimeMs, driverType: d.driverType });
    }
    if (d.orphan) meshOrphans.push({ id: d.id, name: nm });
    allRefs.push({ id: d.id, name: nm, appsCount: apps, dashboardsCount: dashs, total: apps + dashs });
    (d.appsUsing || []).forEach(a => {
      const e = appsIndex[a.id] || (appsIndex[a.id] = { id: a.id, label: (a.label || a.name), disabled: a.disabled === true, devices: [] });
      e.devices.push({ id: d.id, name: nm });
    });
    (d.dashboards || []).forEach(dd => {
      const e = dashIndex[dd.id] || (dashIndex[dd.id] = { id: dd.id, name: dd.name, devices: [] });
      e.devices.push({ id: d.id, name: nm });
    });
  });
  unreferenced.sort((a, b) => (a.lastActivityTimeMs || 0) - (b.lastActivityTimeMs || 0));
  meshOrphans.sort(byName);
  const criticalTop20 = allRefs.slice().sort((a, b) => (b.total - a.total) || byName(a, b)).slice(0, 20);
  const criticalCount = allRefs.filter(r => r.total >= AUDIT_CRIT_REFS).length;
  const appsToDevices = Object.values(appsIndex)
    .map(e => ({ id: e.id, label: e.label, disabled: e.disabled, devices: e.devices.slice().sort(byName) }))
    .sort((a, b) => (String(a.label) < String(b.label) ? -1 : String(a.label) > String(b.label) ? 1 : 0));
  const dashboardsToDevices = Object.values(dashIndex)
    .map(e => ({ id: e.id, name: e.name, devices: e.devices.slice().sort(byName) }))
    .sort(byName);
  // Manually-tuned devices: divergence from the fleet mode of each tuning field (robust proxy for the platform default).
  const mode = key => { const c = {}; let best = null, bc = -1; devs.forEach(d => { const v = d[key]; if (v != null) { c[v] = (c[v] || 0) + 1; if (c[v] > bc) { bc = c[v]; best = v; } } }); return best; };
  const modeSt = mode('spammyThreshold'), modeMs = mode('maxStates'), modeMe = mode('maxEvents');
  const tunedDevices = [];
  devs.forEach(d => {
    const st = d.spammyThreshold, ms = d.maxStates, me = d.maxEvents;
    const stOff = (st != null && modeSt != null && st !== modeSt);
    const msOff = (ms != null && modeMs != null && ms !== modeMs);
    const meOff = (me != null && modeMe != null && me !== modeMe);
    if (stOff || msOff || meOff) tunedDevices.push({ id: d.id, name: (d.label || d.name), spammyThreshold: st, maxStates: ms, maxEvents: me, spammyOff: stOff, maxStatesOff: msOff, maxEventsOff: meOff });
  });
  tunedDevices.sort(byName);
  return { unreferenced, meshOrphans, criticalTop20, criticalCount, appsToDevices, dashboardsToDevices, tunedDevices, tunedDefaults: { spammyThreshold: modeSt, maxStates: modeMs, maxEvents: modeMe } };
}

function buildAuditHtml(data) {
  const hubName = data.hubName || '';
  // Hub ships generatedMs (epoch); format for display here, consistent with the rest of the UI.
  const generatedAt = data.generatedMs ? new Date(data.generatedMs).toLocaleString() : '';
  const rooms = data.rooms || [];
  const allDevices = data.allDevices || {};
  const failed = data.failed || [];
  // Cross-reference derivation moved off the hub (LB1, v5.42.0) — derive from allDevices in the browser.
  const x = buildAuditXref(allDevices);
  const unreferenced = x.unreferenced;
  const meshOrphans = x.meshOrphans;
  const tunedDevices = x.tunedDevices;
  const tunedDefaults = x.tunedDefaults;
  const criticalTop20 = x.criticalTop20;
  const appsToDevices = x.appsToDevices;
  const dashboardsToDevices = x.dashboardsToDevices;

  const zwNodeRows = Object.values(allDevices).filter(d => d.zwaveNode != null);
  const hmRows = Object.values(allDevices).filter(d => d.hubMeshState != null);

  function sumcell(label, value, severity) {
    const color = severity === 'warn' ? 'var(--warn)' : severity === 'crit' ? 'var(--crit)' : null;
    const s = color ? ` style="color:${color}"` : '';
    return `<div class="m"><div class="m-l">${h(label)}</div><div class="m-v"${s}>${h(String(value ?? ''))}</div></div>`;
  }
  function openCard(anchorId, headerHtml, openByDefault) {
    const openAttr = openByDefault ? ' open' : '';
    return `<div class="card" id="${anchorId}"><details${openAttr}><summary class="card-h">${headerHtml}</summary><div class="card-b">`;
  }
  function closeCard() { return '</div></details></div>'; }
  function driverBadge(dt) { return dt === 'usr' ? BADGE.community : BADGE.builtin; }

  let o = '';

  // Header
  o += `<div class="hdr-audit"><h1>Device Usage Audit — ${h(hubName)}</h1>`;
  o += `<div class="meta">Generated ${h(generatedAt)} · ${data.deviceCount} devices · scan ${fmtDurSec(data.scanDurationMs)}</div></div>`;

  // Summary
  o += '<div class="card" id="summary"><div class="card-h">Summary</div><div class="card-b"><div class="metrics">';
  o += sumcell('Devices', data.deviceCount, null);
  o += sumcell('Unreferenced', unreferenced.length, 'warn');
  o += sumcell('Mesh orphans', meshOrphans.length, 'crit');
  o += sumcell(`Critical (≥${AUDIT_CRIT_REFS} refs)`, x.criticalCount, null);
  o += '</div></div></div>';

  // Unreferenced
  o += openCard('unref', `⚠ Unreferenced devices (${unreferenced.length})`);
  if (!unreferenced.length) {
    o += '<div class="muted">None — every device is used by at least one app, dashboard, or parent integration.</div>';
  } else {
    o += '<div class="muted" style="margin-bottom:6px">No apps, no dashboards, no parent app — default sort: oldest last activity first.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_unref"><thead><tr><th>Device</th><th>Type</th><th data-sd="asc">Last activity</th><th>Source</th></tr></thead><tbody>';
    unreferenced.forEach(u => {
      o += `<tr><td>${dlink(u.id, u.name)}</td>`;
      o += `<td>${h(u.type || '')}</td>`;
      o += `<td>${h(u.lastActivityTime || '')}</td>`;
      o += `<td>${driverBadge(u.driverType)}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Mesh orphans
  o += openCard('orphans', `⚠ Mesh orphans (${meshOrphans.length})`);
  if (!meshOrphans.length) {
    o += '<div class="muted">None — no devices report orphan radio state.</div>';
  } else {
    o += '<div class="muted" style="margin-bottom:6px">Hubitat reports <code>orphan: true</code> — physical radio relationship lost.</div>';
    o += '<div>' + meshOrphans.map(d => dlink(d.id, d.name)).join(' · ') + '</div>';
  }
  o += closeCard();

  // Manually-tuned devices
  o += openCard('tuned', `🛠 Manually-tuned devices (${tunedDevices.length})`);
  if (!tunedDevices.length) {
    o += '<div class="muted">All devices share the same buffer/threshold values — none have been manually tuned.</div>';
  } else {
    o += `<div class="muted" style="margin-bottom:6px">Devices whose buffer/threshold values diverge from the fleet mode (default: spammyThreshold=${tunedDefaults.spammyThreshold || '?'}, maxStates=${tunedDefaults.maxStates || '?'}, maxEvents=${tunedDefaults.maxEvents || '?'}). Diverging values shown in <span class="warn">bold</span>.</div>`;
    o += '<div class="tbl-wrap"><table data-sortable id="t_tuned"><thead><tr><th data-sd="asc">Device</th><th data-t="n">spammyThreshold</th><th data-t="n">maxStates</th><th data-t="n">maxEvents</th></tr></thead><tbody>';
    tunedDevices.forEach(t => {
      const stCell = t.spammyThreshold == null ? '<span class="muted">—</span>' : (t.spammyOff ? `<b style="color:var(--warn)">${t.spammyThreshold}</b>` : String(t.spammyThreshold));
      const msCell = t.maxStates == null ? '<span class="muted">—</span>' : (t.maxStatesOff ? `<b style="color:var(--warn)">${t.maxStates}</b>` : String(t.maxStates));
      const meCell = t.maxEvents == null ? '<span class="muted">—</span>' : (t.maxEventsOff ? `<b style="color:var(--warn)">${t.maxEvents}</b>` : String(t.maxEvents));
      o += `<tr><td>${dlink(t.id, t.name)}</td>`;
      o += `<td data-sv="${t.spammyThreshold ?? 0}">${stCell}</td>`;
      o += `<td data-sv="${t.maxStates ?? 0}">${msCell}</td>`;
      o += `<td data-sv="${t.maxEvents ?? 0}">${meCell}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Critical devices
  o += openCard('critical', '⭐ Critical devices (top 20 by reference count)');
  if (!criticalTop20.length) {
    o += '<div class="muted">No devices have any apps or dashboards.</div>';
  } else {
    o += '<div class="tbl-wrap"><table data-sortable id="t_crit"><thead><tr><th>Device</th><th data-t="n">Apps</th><th data-t="n">Dashboards</th><th data-t="n" data-sd="desc">Total</th></tr></thead><tbody>';
    criticalTop20.forEach(c => {
      o += `<tr><td>${dlink(c.id, c.name)}</td>`;
      o += `<td>${c.appsCount}</td><td>${c.dashboardsCount}</td>`;
      o += `<td><b>${c.total}</b></td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Device hardware and firmware (hardware identity) — make / model / firmware, v5.37.0
  const invRows = Object.values(allDevices).map(dv => ({
    id: dv.id,
    name: dv.label || dv.name || '',
    type: dv.deviceTypeName || '',
    protocol: dv.protocol || '',
    manufacturer: dv.manufacturer || '',
    model: dv.model || '',
    firmware: dv.firmware || ''
  })).sort((a, b) => (a.manufacturer || '').localeCompare(b.manufacturer || '') || a.name.localeCompare(b.name));
  window._auditInventory = invRows;
  window._auditHubName = hubName || 'hub';
  o += openCard('inventory', `🔧 Device hardware and firmware (${invRows.length})`);
  o += '<div style="margin-bottom:10px"><button type="button" class="btn btn-p btn-s" onclick="downloadInventoryCsv()">⬇ Download CSV</button> <button type="button" class="btn btn-p btn-s" onclick="copyInventoryCsv(this)">⧉ Copy CSV</button></div>';
  o += '<div class="filter"><input type="text" data-filter="t_inv" placeholder="Filter by name, manufacturer, model…"></div>';
  o += '<div class="tbl-wrap"><table data-sortable id="t_inv"><thead><tr><th>Name</th><th>Type</th><th>Protocol</th><th data-sd="asc">Manufacturer</th><th>Model</th><th>Firmware</th></tr></thead><tbody>';
  const invDash = '<span class="muted">—</span>';
  invRows.forEach(r => {
    o += `<tr><td>${dlink(r.id, r.name)}</td>`;
    o += `<td>${h(r.type)}</td>`;
    o += `<td>${r.protocol ? h(r.protocol) : invDash}</td>`;
    o += `<td>${r.manufacturer ? h(r.manufacturer) : invDash}</td>`;
    o += `<td>${r.model ? h(r.model) : invDash}</td>`;
    o += `<td>${r.firmware ? h(r.firmware) : invDash}</td></tr>`;
  });
  o += '</tbody></table></div>';
  o += closeCard();

  // Devices by room
  o += openCard('rooms', `🏠 Devices by room (${rooms.length})`);
  if (!rooms.length) {
    o += '<div class="muted">No room data available.</div>';
  } else {
    o += '<div class="muted" style="margin-bottom:6px">Devices grouped by their assigned room. Empty rooms surface storage clutter; high-density rooms may warrant a split.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_rooms"><thead><tr><th>Room</th><th data-t="n" data-sd="desc">Devices</th><th>Members</th></tr></thead><tbody>';
    rooms.forEach(r => {
      const dids = r.deviceIds || [];
      const members = dids.map(did => {
        const dev = allDevices[did];
        const label = dev ? (dev.label || dev.name || ('Device ' + did)) : ('Device ' + did);
        return dlink(did, label);
      }).join(' · ');
      o += `<tr><td><b>${h(r.name || '')}</b></td>`;
      o += `<td data-sv="${dids.length}">${dids.length}</td>`;
      o += `<td>${members || '<span class="muted">empty</span>'}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Z-Wave JS mesh health
  if (zwNodeRows.length > 0) {
    o += openCard('zwjs', `📶 Z-Wave JS mesh health (${zwNodeRows.length})`);
    o += '<div class="muted" style="margin-bottom:6px">Per-node controller statistics from Z-Wave JS. RSSI lower (more negative) is quieter; RTT lower is faster; PER (packet error rate) higher is worse.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_zwjs"><thead><tr><th>Device</th><th data-t="n">Node</th><th>State</th><th>Status</th><th>Interview</th><th data-t="n">RTT</th><th>RSSI</th><th data-t="n" data-sd="desc">PER %</th><th data-t="n">TX</th><th data-t="n">RX</th><th>Last Seen</th></tr></thead><tbody>';
    const sortedZw = zwNodeRows.slice().sort((a, b) => ((b.zwaveNode && b.zwaveNode.per) || 0) - ((a.zwaveNode && a.zwaveNode.per) || 0));
    sortedZw.forEach(d => {
      const z = d.zwaveNode || {};
      const stats = z.statistics || {};
      const stateColor = z.nodeState === 'OK' ? 'var(--ok)' : 'var(--crit)';
      o += `<tr><td>${dlink(d.id, d.label || d.name)}</td>`;
      o += `<td>${z.nodeId || ''}</td>`;
      o += `<td><span style="color:${stateColor}">${h(z.nodeState || '')}</span></td>`;
      o += `<td>${z.status || ''}</td>`;
      o += `<td>${h(z.interviewStage || '')}</td>`;
      o += `<td>${z.rtt || '<span class="muted">—</span>'}</td>`;
      o += `<td>${z.rssi || '<span class="muted">—</span>'}</td>`;
      o += `<td data-sv="${z.per || 0}">${z.per || 0}</td>`;
      o += `<td>${stats.commandsTX || 0}</td>`;
      o += `<td>${stats.commandsRX || 0}</td>`;
      o += `<td>${h((z.lastSeenLocal || ''))}</td></tr>`;
    });
    o += '</tbody></table></div>';
    o += closeCard();
  }

  // Hub Mesh linked devices
  if (hmRows.length > 0) {
    o += openCard('hubmesh', `🔗 Hub Mesh linked devices (${hmRows.length})`);
    o += '<div class="muted" style="margin-bottom:6px">Devices physically owned by another hub on this account, exposed locally via Hub Mesh.</div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_hubmesh"><thead><tr><th>Device</th><th>Source Hub</th><th>Source Device ID</th><th>Status</th><th>Raw</th></tr></thead><tbody>';
    hmRows.forEach(d => {
      const hm = d.hubMeshState || {};
      const srcHub = hm.sourceHubName || hm.hostHubName || hm.hubName || '—';
      const srcDevId = String(hm.sourceDeviceId || hm.hostDeviceId || hm.remoteDeviceId || '');
      const status = String(hm.status || hm.linkStatus || hm.online || '');
      o += `<tr><td>${dlink(d.id, d.label || d.name)}</td>`;
      o += `<td>${h(srcHub)}</td>`;
      o += `<td>${h(srcDevId)}</td>`;
      o += `<td>${h(status)}</td>`;
      o += `<td><code style="font-size:11px">${h(JSON.stringify(hm))}</code></td></tr>`;
    });
    o += '</tbody></table></div>';
    o += closeCard();
  }

  // Apps -> devices
  o += openCard('apps', `📱 Apps → devices (${appsToDevices.length})`);
  if (!appsToDevices.length) {
    o += '<div class="muted">No apps subscribe to any devices.</div>';
  } else {
    o += '<div class="filter"><input type="text" data-filter="t_apps" placeholder="Filter apps or devices…"></div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_apps"><thead><tr><th data-sd="asc">App</th><th data-t="n"># Devices</th><th>Devices</th></tr></thead><tbody>';
    appsToDevices.forEach(a => {
      const n = (a.devices || []).length;
      const devs = (a.devices || []).map(d => dlink(d.id, d.name)).join(', ');
      const appCell = a.disabled
        ? `<s class="muted" title="App is disabled — its subscriptions are inactive">${alink(a.id, a.label)}</s> <span class="badge b-warn">disabled</span>`
        : alink(a.id, a.label);
      o += `<tr><td data-sv="${h(a.label || '')}">${appCell}</td>`;
      o += `<td>${n}</td>`;
      o += `<td>${devs}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Dashboards -> devices
  o += openCard('dashboards', `📊 Dashboards → devices (${dashboardsToDevices.length})`);
  if (!dashboardsToDevices.length) {
    o += '<div class="muted">No dashboards reference any devices.</div>';
  } else {
    o += '<div class="filter"><input type="text" data-filter="t_dash" placeholder="Filter dashboards or devices…"></div>';
    o += '<div class="tbl-wrap"><table data-sortable id="t_dash"><thead><tr><th data-sd="asc">Dashboard</th><th data-t="n"># Devices</th><th>Devices</th></tr></thead><tbody>';
    dashboardsToDevices.forEach(d => {
      const n = (d.devices || []).length;
      const devs = (d.devices || []).map(dv => dlink(dv.id, dv.name)).join(', ');
      o += `<tr><td><b>${h(Obf.nm(d.name || ''))}</b></td>`;
      o += `<td>${n}</td>`;
      o += `<td>${devs}</td></tr>`;
    });
    o += '</tbody></table></div>';
  }
  o += closeCard();

  // Per-device detail table
  o += openCard('all', `📋 Per-device detail table (${data.deviceCount})`);
  o += '<div class="filter"><input type="text" data-filter="t_all" placeholder="Filter devices…"></div>';
  o += '<div class="tbl-wrap"><table data-sortable id="t_all"><thead><tr><th data-sd="asc">Name</th><th>Type</th><th>Source</th><th data-t="n">Apps</th><th data-t="n">Dashboards</th><th>Parent app</th><th>Last activity</th></tr></thead><tbody>';
  const sortedDevices = Object.values(allDevices).slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  sortedDevices.forEach(d => {
    const src = driverBadge(d.driverType);
    const apps = d.appsUsing || [];
    const dashs = d.dashboards || [];
    let appsCell;
    if (apps.length) {
      appsCell = apps.slice(0, 4).map(a => {
        const inner = alink(a.id, a.label || a.name);
        return a.disabled ? `<s class="muted" title="App is disabled — subscription inactive">${inner}</s>` : inner;
      }).join(', ') + (apps.length > 4 ? `, <span class="muted">+${apps.length - 4}</span>` : '');
    } else {
      appsCell = d.parentApp == null ? '<span class="warn">⚠ unreferenced</span>' : '<span class="muted">—</span>';
    }
    const dashsCell = dashs.length
      ? dashs.slice(0, 4).map(dash => `<a href="/installedapp/configure/${dash.id}" target="_blank">${h(Obf.nm(dash.name || ''))}</a>`).join(', ')
        + (dashs.length > 4 ? `, <span class="muted">+${dashs.length - 4}</span>` : '')
      : '<span class="muted">—</span>';
    const pa = d.parentApp;
    const paCell = pa ? alink(pa.id, pa.label || pa.name) : '<span class="muted">—</span>';
    const typeName = h(d.deviceTypeName || '');
    const typeCell = (d.driverType === 'usr' && d.deviceTypeId)
      ? `<a href="/driver/editor/${d.deviceTypeId}" target="_blank">${typeName}</a>`
      : typeName;
    o += `<tr><td>${dlink(d.id, d.label || d.name)}</td>`;
    o += `<td>${typeCell}</td>`;
    o += `<td>${src}</td>`;
    o += `<td data-sv="${apps.length}">${appsCell}</td>`;
    o += `<td data-sv="${dashs.length}">${dashsCell}</td>`;
    o += `<td>${paCell}</td>`;
    o += `<td>${h(d.lastActivityTime || '')}</td></tr>`;
  });
  o += '</tbody></table></div>';
  o += closeCard();

  // Failed footnote
  if (failed.length > 0) {
    o += `<div class="card" id="failed"><div class="card-h crit">Failed to fetch (${failed.length})</div><div class="card-b muted">`;
    o += failed.map(f => `Device ${f.id}: ${h(f.reason || '')}`).join('<br>');
    o += '</div></div>';
  }

  return o;
}

function initAuditSort() {
  function cmp(a, b, n) {
    if (n) { a = parseFloat(a) || 0; b = parseFloat(b) || 0; return a < b ? -1 : a > b ? 1 : 0; }
    a = String(a).toLowerCase(); b = String(b).toLowerCase(); return a < b ? -1 : a > b ? 1 : 0;
  }
  function getSv(td) { return td.dataset.sv != null ? td.dataset.sv : td.textContent.trim(); }
  function sortTable(tbl, col, dir) {
    const th = tbl.tHead.rows[0].cells[col], n = th.dataset.t === 'n';
    const tb = tbl.tBodies[0];
    const rows = Array.from(tb.rows);
    rows.sort((r1, r2) => cmp(getSv(r1.cells[col]), getSv(r2.cells[col]), n) * (dir === 'desc' ? -1 : 1));
    rows.forEach(r => tb.appendChild(r));
  }
  function setArrows(ths, col, dir) {
    Array.from(ths).forEach((t, i) => {
      const a = t.querySelector('.arr');
      if (i === col) { t.dataset.dir = dir; if (a) a.textContent = dir === 'asc' ? ' ▲' : ' ▼'; }
      else { delete t.dataset.dir; if (a) a.textContent = ' ⇅'; }
    });
  }
  document.querySelectorAll('table[data-sortable]').forEach(tbl => {
    if (!tbl.tHead || !tbl.tBodies[0]) return;
    const ths = tbl.tHead.rows[0].cells;
    let defCol = -1, defDir = 'asc';
    Array.from(ths).forEach((th, i) => {
      const s = document.createElement('span'); s.className = 'arr'; s.textContent = ' ⇅'; th.appendChild(s);
      th.addEventListener('click', () => {
        const dir = th.dataset.dir === 'asc' ? 'desc' : (th.dataset.dir === 'desc' ? 'asc' : (th.dataset.t === 'n' ? 'desc' : 'asc'));
        setArrows(ths, i, dir); sortTable(tbl, i, dir);
      });
      if (th.dataset.sd) { defCol = i; defDir = th.dataset.sd; }
    });
    if (defCol >= 0) { setArrows(ths, defCol, defDir); sortTable(tbl, defCol, defDir); }
  });
  document.querySelectorAll('input[data-filter]').forEach(inp => {
    const tbl = document.getElementById(inp.dataset.filter); if (!tbl || !tbl.tBodies[0]) return;
    inp.addEventListener('input', () => {
      const q = inp.value.toLowerCase();
      Array.from(tbl.tBodies[0].rows).forEach(r => { r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
    });
  });
}

// Device inventory export (CSV download + copy) — rows stashed on window by buildAuditHtml
function _csvEscape(v) {
  const s = (v == null ? '' : String(v));
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function buildInventoryCsv() {
  const rows = window._auditInventory || [];
  const lines = ['Name,Type,Protocol,Manufacturer,Model,Firmware'];
  rows.forEach(r => lines.push([r.name, r.type, r.protocol, r.manufacturer, r.model, r.firmware].map(_csvEscape).join(',')));
  return lines.join('\r\n');
}
function downloadInventoryCsv() {
  const text = buildInventoryCsv();
  const hub = (window._auditHubName || 'hub').replace(/[^A-Za-z0-9._-]+/g, '-');
  const ts = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+Z$/, 'Z');
  const blob = new Blob([text], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `device-inventory-${hub}-${ts}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}
function copyInventoryCsv(btn) {
  const text = buildInventoryCsv();
  const orig = btn ? btn.textContent : null;
  const flash = msg => { if (btn) { btn.textContent = msg; setTimeout(() => { btn.textContent = orig; }, 1500); } };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => flash('✓ Copied')).catch(() => flash('✗ Copy failed'));
  } else {
    flash('✗ Copy unsupported');
  }
}

// ===== STARTUP =====
const _inAuditMode = new URLSearchParams(window.location.search).has('audit');
if (_inAuditMode) {
  renderAuditPage();
} else {
  let liveTimer=setInterval(refreshLive,liveIntervalSec*1000);
  document.addEventListener('visibilitychange',()=>{
    clearInterval(liveTimer);
    if(!document.hidden)liveTimer=setInterval(refreshLive,liveIntervalSec*1000)
  });
  // Populate header hub info regardless of which tab opens first (cached for 2min, free on dashboard tab).
  // Also seed the alert-aware favicon from the same payload.
  api('dashboard').then(d=>{setHubInfoHeader(d&&d.hub);setFaviconSeverity(severityFromDashboard(d))}).catch(()=>{});
  // Refresh favicon every 60s so the tab indicator stays useful even when the user is on a non-Dashboard tab.
  // api('dashboard') is cached for 2min, so most ticks hit cache; actual hub fetches happen ~every 2min.
  setInterval(()=>{api('dashboard').then(d=>setFaviconSeverity(severityFromDashboard(d))).catch(()=>{})},60000);
  go(curTab);
}

// ===== ALERT-AWARE FAVICON =====
// Overlays a colored dot (green/amber/red) on the Hubitat favicon, reflecting the highest alert severity.
// Lets the user spot a problem from the browser tab list without switching tabs.
let __favBaseImg=null,__favLastSev=null,__favBaseLoading=null;
function faviconBase(){
  if(__favBaseImg)return Promise.resolve(__favBaseImg);
  if(__favBaseLoading)return __favBaseLoading;
  __favBaseLoading=new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{__favBaseImg=img;resolve(img)};
    img.onerror=()=>resolve(null);
    img.src='/ui2/images/favicon-32x32.png';
  });
  return __favBaseLoading;
}
async function setFaviconSeverity(sev){
  if(sev===__favLastSev)return;
  // Textual equivalent of the favicon dot for screen readers / icon-less browsers.
  document.title=(sev==='critical'?'⛔ ':sev==='warning'?'⚠ ':'')+'Hub Diagnostics';
  const img=await faviconBase();
  if(!img)return;
  const c=document.createElement('canvas');c.width=32;c.height=32;
  const ctx=c.getContext('2d');
  ctx.drawImage(img,0,0,32,32);
  const color=sev==='critical'?'#e53935':sev==='warning'?'#fb8c00':'#43a047';
  // White halo for legibility on any background, then severity-colored dot.
  ctx.beginPath();ctx.arc(24,24,7,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
  ctx.beginPath();ctx.arc(24,24,5.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  let url;try{url=c.toDataURL('image/png')}catch(e){return}
  let link=document.querySelector('link[rel="icon"][sizes="32x32"]');
  if(!link){link=document.createElement('link');link.rel='icon';link.type='image/png';link.setAttribute('sizes','32x32');document.head.appendChild(link)}
  link.href=url;
  __favLastSev=sev;
}
function severityFromDashboard(d){
  // Reuse composeAlerts to honor the same alert thresholds + signals as the Dashboard/Health tabs.
  const alerts=(d&&typeof composeAlerts==='function')?composeAlerts(d):((d&&d.alerts)||[]);
  if(alerts.some(a=>a.severity==='critical'))return 'critical';
  if(alerts.some(a=>a.severity==='warning'))return 'warning';
  return 'ok';
}
