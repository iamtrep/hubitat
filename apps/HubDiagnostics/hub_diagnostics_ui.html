// ===== TAB: PERFORMANCE =====
let _perfInFlight=false;
async function rPerf(){if(_perfInFlight)return;_perfInFlight=true;const P='p-performance';loading(P);try{
  const d=await api('performance');let o='';
  // Logic to determine which stats to show
  let s = d.stats;
  let res = d.resources;
  let title = 'Current Runtime';
  if(activePerfComp) {
    s = activePerfComp.diff;
    res = activePerfComp.diffResources;
    title = 'Comparison: ' + h(activePerfComp.baselineLabel) + ' \u2192 ' + h(activePerfComp.checkpointLabel);
  }

  // Actions
  o+='<div class="actions">';
  o+='<button class="btn btn-p" id="btnCp">Take Perf Checkpoint</button>';
  if(d.checkpointCount>0)o+='<button class="btn btn-d" id="btnClrCp">Clear All</button>';
  if(activePerfComp) o+='<button class="btn btn-p" id="btnClearComp">Clear Comparison</button>';
  o+='</div>';

  // Comparison controls + checkpoint list (top — affects all cards below)
  if(d.checkpointCount>0){
    o+='<div class="live-only"><div class="card"><div class="card-h">Compare Performance</div><div class="card-b">';
    o+='<div style="margin-bottom:10px"><label>Baseline: </label><select id="selBase"><option value="startup" '+(activePerfComp?.baseIdx==='startup'?'selected':'')+'>Since Startup</option>';
    d.checkpoints.forEach((cp,i)=>{
      const sel = activePerfComp?.baseIdx == i ? 'selected' : '';
      o+='<option value="'+i+'" '+sel+'>Perf Checkpoint '+(i+1)+' -'+h(cp.timestamp)+'</option>';
    });
    o+='</select><label>Compare to: </label><select id="selCp">';
    o+='<option value="now" '+(activePerfComp?.compIdx==='now'?'selected':'')+'>Now</option>';
    d.checkpoints.forEach((cp,i)=>{
      const sel = activePerfComp?.compIdx == i ? 'selected' : '';
      o+='<option value="'+i+'" '+sel+'>Perf Checkpoint '+(i+1)+' -'+h(cp.timestamp)+'</option>';
    });
    o+='</select><button class="btn btn-p" id="btnCompare" style="margin-left:8px">Compare</button></div>';
    o+='<div id="compResult"></div></div></div></div>';
    o+='<div class="card"><details><summary class="card-h" style="display:block;cursor:pointer">Perf Checkpoints ('+d.checkpointCount+' / '+d.maxCheckpoints+')</summary><div class="card-b"><div id="cpTbl"></div></div></details></div>';
  } else {
    o+='<div class="card"><div class="card-h">Perf Checkpoints (0 / '+d.maxCheckpoints+')</div><div class="card-b"><p style="color:var(--muted)">No performance checkpoints yet. Take one to start tracking.</p></div></div>';
  }

  // Runtime stats
  if(s){
    o+='<div class="card"><div class="card-h">'+title+'</div><div class="card-b"><div class="metrics">';
    if(s.uptime)o+=mc('Interval/Uptime',s.uptime);
    if(s.totalDevicesRuntime!=null)o+=mc('Devices Runtime',typeof s.totalDevicesRuntime==='number'?fmsDuration(s.totalDevicesRuntime):s.totalDevicesRuntime);
    if(s.devicePct)o+=mc('Devices % Busy',s.devicePct);
    if(s.totalAppsRuntime!=null)o+=mc('Apps Runtime',typeof s.totalAppsRuntime==='number'?fmsDuration(s.totalAppsRuntime):s.totalAppsRuntime);
    if(s.appPct)o+=mc('Apps % Busy',s.appPct);
    o+='</div></div></div>'}
  
  if(res){
    const isDiff = activePerfComp != null;
    const perfResId = isDiff ? '' : ' id="res-perf"';
    const perfTs=isDiff?'':' id="res-perf-ts" style="float:right;font-size:11px;font-weight:normal;opacity:.6"';
    o+='<div class="card"><div class="card-h">Resources '+(isDiff?'(Delta)':'')+'<span'+perfTs+'></span></div><div class="card-b"><div'+perfResId+' class="metrics">';
    if(isDiff) {
      o+=mc('Free OS Memory',fmem(res.freeOSMemory),res.freeOSMemory<0?'var(--crit)':'var(--ok)');
      o+=mc('CPU Load',res.cpuAvg5min?.toFixed(2),res.cpuAvg5min>0?'var(--warn)':'var(--ok)');
      if(res.temperature!=null)o+=mc('Temperature',ftempD(res.temperature),res.temperature>2?'var(--warn)':'var(--ok)');
      if(res.databaseSize!=null){const sgn=res.databaseSize>=0?'+':'';o+=mc('Database',sgn+res.databaseSize+' MB',res.databaseSize>50?'var(--warn)':'var(--ok)');}
    } else {
      o+=renderPerfRes(res);
    }
    o+='</div></div></div>'}

  // Top Talkers — derived client-side from raw radioStats (comparison interval, else current).
  const talkers=topRadioTalkers(activePerfComp ? s?.radioStats : d.radioStats);
  if(talkers&&talkers.length){
    o+='<div class="card"><div class="card-h">Top Talkers'+(activePerfComp?' (Interval)':'')+'</div><div class="card-b">';
    talkers.forEach((t,i)=>{
      o+='<div style="padding:4px 0">'+(i+1)+'. '+(t.deviceId?dlink(t.deviceId,t.name):h(Obf.nm(t.name)))+' <span style="color:var(--muted)">('+h(t.integration||'')+')</span> &mdash; <b>'+t.msgCount+'</b> msgs</div>'});
    o+='</div></div>'}

  // Saved comparison
  if(!activePerfComp && (d.savedComparison||d.savedComparisonHtml)){o+='<div class="card"><div class="card-h">Last Comparison</div><div class="card-b"><div id="savedComp"></div></div></div>'}
  
  // Runtime detail tables
  if(s&&s.appStats&&s.appStats.length){
    o+='<div class="card"><div class="card-h">CPU by App Type</div><div class="card-b"><div id="perfAppCpuChart"></div></div></div>'}
  if(s&&s.deviceStats&&s.deviceStats.length){
    o+='<div class="card"><div class="card-h">CPU by Device Type</div><div class="card-b"><div id="perfDevCpuChart"></div></div></div>'}
  if(s&&s.deviceStats&&s.deviceStats.length){
    o+='<div class="card"><div class="card-h">Device Runtime Detail</div><div class="card-b"><div id="devStatsTbl"></div></div></div>'}
  if(s&&s.appStats&&s.appStats.length){
    o+='<div class="card"><div class="card-h">App Runtime Detail</div><div class="card-b"><div id="appStatsTbl"></div></div></div>'}
  // Radio message stats — compute msgPerMin for both current and comparison views
  const rs=s?.radioStats;
  const isComp=activePerfComp!=null;
  const uptimeMin=isComp?(s.radioElapsedMin||0):(s?.uptimeSeconds?s.uptimeSeconds/60:0);
  if(rs&&uptimeMin>0){
    ['zwave','zigbee'].forEach(p=>{(rs[p]||[]).forEach(d=>{
      if(d.msgPerMin==null)d.msgPerMin=uptimeMin>0?(d.msgCount||0)/uptimeMin:0})});
  }
  const hasZw=rs&&rs.zwave&&rs.zwave.length;
  const hasZb=rs&&rs.zigbee&&rs.zigbee.length;
  if(hasZw||hasZb){
    o+='<div class="card"><div class="card-h">Radio Message Counts'+(isComp?' (Delta)':'')+'</div><div class="card-b">';
    if(uptimeMin>0)o+='<div style="margin-bottom:8px;color:var(--muted)">'+(isComp?'Interval':'Uptime')+': '+uptimeMin.toFixed(1)+' min</div>';
    // Spammy alerts
    if(uptimeMin>0){
      const alerts=[];const warns=[];
      const chattyT=TH.chattyDeviceThreshold,chattyW=chattyT*0.6;
      ['zwave','zigbee'].forEach(p=>{(rs[p]||[]).forEach(d=>{
        if(d.msgPerMin>=chattyT)alerts.push({name:d.name,proto:p,rate:d.msgPerMin});
        else if(d.msgPerMin>=chattyW)warns.push({name:d.name,proto:p,rate:d.msgPerMin})})});
      if(alerts.length){o+='<div class="alert a-crit" style="margin-bottom:8px">\u26D4 High message rate (\u2265'+chattyT+'/min): ';
        o+=alerts.map(d=>h(Obf.nm(d.name))+' <b>'+d.rate.toFixed(1)+'/min</b> ('+d.proto+')').join(', ');o+='</div>'}
      if(warns.length){o+='<div class="alert a-warn" style="margin-bottom:8px">\u26A0 Elevated message rate (\u2265'+chattyW.toFixed(0)+'/min): ';
        o+=warns.map(d=>h(Obf.nm(d.name))+' <b>'+d.rate.toFixed(1)+'/min</b> ('+d.proto+')').join(', ');o+='</div>'}}
    if(hasZw)o+='<div id="perfZwMsgTbl"></div>';
    if(hasZb)o+='<div id="perfZbMsgTbl" style="margin-top:8px"></div>';
    o+='</div></div>'}
  document.getElementById(P).innerHTML=o;
  
  // Render checkpoint table
  if(d.checkpoints&&d.checkpoints.length){
    const cpRows=d.checkpoints.map((cp,i)=>({idx:i+1,timestamp:cp.timestamp,
      uptime:cp.stats?.uptime||'N/A',devRuntime:cp.stats?.totalDevicesRuntime||'N/A',appRuntime:cp.stats?.totalAppsRuntime||'N/A',
      temp:cp.temperature!=null?ftemp(cp.temperature):'—',db:cp.databaseSize!=null?cp.databaseSize+' MB':'—',_idx:i}));
    tbl('cpTbl',[
      {l:'#',f:'idx',t:'n'},{l:'Timestamp',f:'timestamp'},{l:'Uptime',f:'uptime'},
      {l:'Dev Runtime',f:'devRuntime'},{l:'App Runtime',f:'appRuntime'},
      {l:'Temp',f:'temp'},{l:'DB',f:'db'},
      {l:'',f:'_idx',r:r=>'<button class="btn btn-d" onclick="delCp('+r._idx+')">\u{1F5D1}</button>'}
    ],cpRows,{sc:0,sd:'desc'})}

  // CPU by device type chart — v5.20.0 (R-7 B2): id→type map now ships in /api/performance
  if(s&&s.deviceStats&&s.deviceStats.length){
    const typeById=d.deviceTypeById||{};
    renderBarChart(aggregateByType(s.deviceStats,typeById,'id','total'),'perfDevCpuChart',{format:v=>v.toFixed(0)+' ms'});
  }
  // Device Runtime table
  if(s&&s.deviceStats)
    tbl('devStatsTbl',[
      {l:'Name',f:'name',r:r=>r.id?dlink(r.id,r.name):h(Obf.nm(r.name))},{l:'Total (ms)',f:'total',t:'n'},
      {l:'% Busy',f:'pct',t:'n',r:r=>r.pct!=null?r.pct.toFixed(1)+'%':''},
      {l:'% Total',f:'pctTotal',t:'n',r:r=>r.pctTotal!=null?r.pctTotal.toFixed(3)+'%':''},
      {l:'Count',f:'count',t:'n'},{l:'Avg (ms)',f:'average',t:'n',r:r=>Number(r.average||0).toFixed(1)},
      {l:'State Size',f:'stateSize',t:'n'},{l:'Hub Actions',f:'hubActionCount',t:'n'},{l:'Cloud Calls',f:'cloudCallCount',t:'n'}
    ],s.deviceStats,{sc:1,sd:'desc',filter:true,collapse:10,collapseLabel:'Device Runtime Detail'});
  // CPU by app type chart — v5.20.0 (R-7 B2): id→parent-label map now ships in /api/performance
  if(s&&s.appStats&&s.appStats.length){
    const ptm=d.appParentTypeById||{};
    renderBarChart(aggregateByType(s.appStats,ptm,'id','total'),'perfAppCpuChart',{format:v=>v.toFixed(0)+' ms'});
  }
  // App Runtime table
  if(s&&s.appStats){
    tbl('appStatsTbl',[
      {l:'Name',  f:'name',  r:r=>r.id?'<a href="/installedapp/status/'+r.id+'" target="_blank">'+h(Obf.nm(r.name))+'</a>':h(Obf.nm(r.name))},
      {l:'Source',f:'source',r:r=>srcBadge(r.source,false)},
      {l:'Total (ms)',f:'total',t:'n'},
      {l:'% Busy',f:'pct',t:'n',r:r=>r.pct!=null?r.pct.toFixed(1)+'%':''},
      {l:'% Total',f:'pctTotal',t:'n',r:r=>r.pctTotal!=null?r.pctTotal.toFixed(3)+'%':''},
      {l:'Count',f:'count',t:'n'},
      {l:'Avg (ms)',f:'average',t:'n',r:r=>Number(r.average||0).toFixed(1)},
      {l:'State Size',f:'stateSize',t:'n'},{l:'Hub Actions',f:'hubActionCount',t:'n'},{l:'Cloud Calls',f:'cloudCallCount',t:'n'}
    ],s.appStats,{sc:2,sd:'desc',filter:true,collapse:10,collapseLabel:'App Runtime Detail'});}
  // Radio message count tables
  if(hasZw){
    tbl('perfZwMsgTbl',[
      {l:'Device',f:'name',r:r=>r.deviceId?dlink(r.deviceId,r.name):h(Obf.nm(r.name))},{l:'Messages',f:'msgCount',t:'n'},
      {l:'Msgs/Min',f:'msgPerMin',t:'n',r:rateCell},{l:'Route Changes',f:'routeChanges',t:'n'}
    ],rs.zwave,{sc:2,sd:'desc',collapse:10,collapseLabel:'Z-Wave Messages'})}
  if(hasZb){
    tbl('perfZbMsgTbl',[
      {l:'Device',f:'name',r:r=>r.id?dlink(r.id,r.name):h(Obf.nm(r.name))},{l:'Messages',f:'msgCount',t:'n'},
      {l:'Msgs/Min',f:'msgPerMin',t:'n',r:rateCell}
    ],rs.zigbee,{sc:2,sd:'desc',collapse:10,collapseLabel:'Zigbee Messages'})}
  // Saved comparison render
  if(!activePerfComp && (d.savedComparison||d.savedComparisonHtml)){
    const sc=d.savedComparison||{};
    // Persisted startup comparisons store baselineStats:null + baselineMode:"startup"; rebuild the zero baseline.
    const scBase=sc.baselineStats||(sc.baselineMode==='startup'?zeroBaseline(sc.checkpointStats):sc.baselineStats);
    renderComparison({comparisonHtml:d.savedComparisonHtml,...sc,baselineStats:scBase},'savedComp');
  }

  // Button bindings
  const btnCp=document.getElementById('btnCp');
  if(btnCp)btnCp.onclick=async()=>{btnCp.disabled=true;btnCp.textContent='Creating...';await post('checkpoint/create');drop('performance');rPerf()};
  const btnClr=document.getElementById('btnClrCp');
  if(btnClr)btnClr.onclick=async()=>{if(!confirm('Clear all checkpoints?'))return;await post('checkpoints/clear');drop('performance');rPerf()};
  const btnClearComp=document.getElementById('btnClearComp');
  if(btnClearComp)btnClearComp.onclick=()=>{activePerfComp=null;drop('performance');rPerf()};
  const btnComp=document.getElementById('btnCompare');
  if(btnComp)btnComp.onclick=async()=>{btnComp.disabled=true;btnComp.textContent='Comparing...';
    const b=document.getElementById('selBase').value,c=document.getElementById('selCp').value;
    // Validate temporal order when both sides are checkpoint indices
    if(b!=='startup'&&c!=='now'){
      const bTs=d.checkpoints[parseInt(b)]?.timestampMs,cTs=d.checkpoints[parseInt(c)]?.timestampMs;
      if(bTs!=null&&cTs!=null&&bTs>=cTs){
        document.getElementById('compResult').innerHTML='<div class="alert a-warn">Baseline must be older than the comparison point. Swap the selections.</div>';
        btnComp.disabled=false;btnComp.textContent='Compare';return;}}
    try {
      const r=await post('performance/compare','baseline='+b+'&checkpoint='+c);
      if(r.success){
        // Startup baseline arrives as null + baselineMode:"startup"; synthesize the zeroed mirror client-side.
        const baseStats = r.baselineStats || (r.baselineMode==='startup' ? zeroBaseline(r.checkpointStats) : null);
        activePerfComp = {
          baseIdx: b === 'startup' ? 'startup' : parseInt(b),
          compIdx: c === 'now' ? 'now' : parseInt(c),
          baselineLabel: r.baselineLabel,
          checkpointLabel: r.checkpointLabel,
          diff: diffStats(baseStats, r.checkpointStats),
          diffResources: baseStats && baseStats.resources && r.checkpointStats.resources ? {
            freeOSMemory: r.checkpointStats.resources.freeOSMemory - baseStats.resources.freeOSMemory,
            cpuAvg5min: r.checkpointStats.resources.cpuAvg5min - baseStats.resources.cpuAvg5min,
            temperature: r.checkpointStats.temperature!=null&&baseStats.temperature!=null ? r.checkpointStats.temperature-baseStats.temperature : null,
            databaseSize: r.checkpointStats.databaseSize!=null&&baseStats.databaseSize!=null ? r.checkpointStats.databaseSize-baseStats.databaseSize : null
          } : null
        };
        rPerf();
      }else{document.getElementById('compResult').innerHTML='<div class="alert a-warn">'+h(r.error)+'</div>'}
    } catch(e) { alert('Comparison failed: '+e.message); }
    btnComp.disabled=false;btnComp.textContent='Compare'};
}catch(e){err(P,e,rPerf)}finally{_perfInFlight=false}}

async function delCp(idx){if(!confirm('Delete performance checkpoint '+(idx+1)+'?'))return;await post('checkpoint/delete','index='+idx);drop('performance');rPerf()}

function renderComparison(data,elId){
  const el=document.getElementById(elId);if(!el)return;
  if(data&&data.comparisonHtml){el.innerHTML=data.comparisonHtml;return}
  const b=data.baselineStats||{},c=data.checkpointStats||{};
  let o='<div><b>Baseline:</b> '+h(data.baselineLabel)+' &rarr; <b>Current:</b> '+h(data.checkpointLabel)+'</div>';
  // Resources delta
  if(b.resources&&c.resources){
    o+='<div style="margin-top:10px"><b>System Resources:</b></div><div class="ng" style="margin-top:6px">';
    const br=b.resources,cr=c.resources;
    if(cr.freeOSMemory!=null&&br.freeOSMemory!=null){const d=cr.freeOSMemory-br.freeOSMemory;o+=ni('Free OS Memory',fmem(cr.freeOSMemory)+' ('+(d>=0?'+':'')+fmem(d)+')',d<0?'var(--crit)':'var(--ok)')}
    if(cr.cpuAvg5min!=null&&br.cpuAvg5min!=null){const d=cr.cpuAvg5min-br.cpuAvg5min;o+=ni('CPU Load',cr.cpuAvg5min.toFixed(2)+' ('+(d>=0?'+':'')+d.toFixed(2)+')',d>0?'var(--warn)':'var(--ok)')}
    if(c.temperature!=null&&b.temperature!=null){const d=c.temperature-b.temperature;o+=ni('Temperature',ftemp(c.temperature)+' ('+ftempD(d)+')',d>2?'var(--warn)':'var(--ok)')}
    if(c.databaseSize!=null&&b.databaseSize!=null){const d=c.databaseSize-b.databaseSize;o+=ni('Database',c.databaseSize+' MB ('+(d>=0?'+':'')+d+' MB)',d>50?'var(--warn)':'var(--ok)')}
    o+='</div>'}
  el.innerHTML=o;
}

// ===== TAB: SNAPSHOTS =====
function renderSnapTable(snaps){
  const rows=snaps.map((s,i)=>({idx:i+1,timestamp:s.timestamp,firmware:s.hubInfo?.firmware||'N/A',
    devices:s.devices.totalDevices,apps:s.apps.totalApps,memory:s.memory!=null?fmem(s.memory):'N/A',_idx:i}));
  tbl('snapTbl',[
    {l:'#',f:'idx',t:'n'},{l:'Timestamp',f:'timestamp'},{l:'Firmware',f:'firmware'},
    {l:'Devices',f:'devices',t:'n'},{l:'Apps',f:'apps',t:'n'},{l:'Memory',f:'memory'},
    {l:'',f:'_idx',r:r=>'<button class="btn btn-d" onclick="delSnap('+r._idx+')">\u{1F5D1}</button>'}
  ],rows,{sc:0,sd:'desc'});
}
async function rSnap(){const P='p-snapshots';loading(P);try{
  const d=await api('snapshots');let o='';
  o+='<div class="actions">';
  o+='<button class="btn btn-p" id="btnSnap">Take Config Snapshot</button>';
  if(d.snapshotCount>0)o+='<button class="btn btn-d" id="btnClrSnap">Clear All</button>';
  o+='</div>';
  // Snapshot table
  o+='<div class="card"><div class="card-h"><span id="snapListHdr">Config Snapshots ('+d.snapshotCount+' / '+d.maxSnapshots+')</span></div><div class="card-b">';
  if(d.snapshots&&d.snapshots.length){o+='<div id="snapTbl"></div>'}
  else o+='<p style="color:var(--muted)">No config snapshots yet. Take one to start tracking.</p>';
  o+='</div></div>';
  // View snapshot
  if(d.snapshotCount>0){
    o+='<div class="live-only"><div class="card"><div class="card-h">View Snapshot</div><div class="card-b">';
    o+='<select id="selView"><option value="">Select a config snapshot...</option>';
    d.snapshots.forEach((s,i)=>{o+='<option value="'+i+'">'+h(s.timestamp)+' ('+s.devices.totalDevices+' devices, fw '+h(s.hubInfo?.firmware||'?')+')</option>'});
    o+='</select><div id="snapView" style="margin-top:10px"></div></div></div>';
    // Compare
    o+='<div class="card"><div class="card-h">Compare Config Snapshots</div><div class="card-b">';
    o+='<label>Older: </label><select id="selOlder"><option value="">Select...</option>';
    d.snapshots.forEach((s,i)=>{o+='<option value="'+i+'">'+h(s.timestamp)+'</option>'});
    o+='</select><label style="margin-left:8px">Newer: </label><select id="selNewer"><option value="">Select...</option><option value="now">Now (create new)</option>';
    d.snapshots.forEach((s,i)=>{o+='<option value="'+i+'">'+h(s.timestamp)+'</option>'});
    o+='</select><button class="btn btn-p" id="btnDiff" style="margin-left:8px">Compare</button>';
    o+='<div id="diffResult" style="margin-top:10px"></div></div></div></div>'}
  document.getElementById(P).innerHTML=o;
  // Render table
  if(d.snapshots&&d.snapshots.length){renderSnapTable(d.snapshots)}
  // View snapshot handler
  const selView=document.getElementById('selView');
  if(selView)selView.onchange=async()=>{
    const v=selView.value;if(!v){document.getElementById('snapView').innerHTML='';return}
    document.getElementById('snapView').innerHTML='<div class="loading"><div class="spinner"></div></div>';
    try{const snap=await api('snapshot/view?index='+v);renderSnapshotView(snap,'snapView')}
    catch(e){document.getElementById('snapView').innerHTML='<div class="alert a-crit">Failed to load snapshot: '+h(e.message)+'</div>'}};
  // Buttons
  const btnSnap=document.getElementById('btnSnap');
  if(btnSnap)btnSnap.onclick=async()=>{btnSnap.disabled=true;btnSnap.textContent='Creating...';await post('snapshot/create');drop('snapshots');rSnap()};
  const btnClr=document.getElementById('btnClrSnap');
  if(btnClr)btnClr.onclick=async()=>{if(!confirm('Clear all config snapshots?'))return;await post('snapshots/clear');drop('snapshots');rSnap()};
  // Diff handler
  const btnDiff=document.getElementById('btnDiff');
  if(btnDiff)btnDiff.onclick=async()=>{
    const o=document.getElementById('selOlder').value,n=document.getElementById('selNewer').value;
    if(!o||!n||o===n){alert('Select two different snapshots');return}
    btnDiff.disabled=true;btnDiff.textContent='Comparing...';
    document.getElementById('diffResult').innerHTML='<div class="loading"><div class="spinner"></div></div>';
    try{
    // Fetch older first (its index is stable; if "now" is selected, creating a new snapshot would shift the older index by 1).
    const olderSnap=await api('snapshot/view?index='+o);
    let newerSnap;
    if(n==='now'){const cr=await post('snapshot/create');if(cr&&cr.success===false)throw new Error(cr.error||'Failed to create live snapshot');drop('snapshots');newerSnap=await api('snapshot/view?index=0')}
    else{newerSnap=await api('snapshot/view?index='+n)}
    if(olderSnap.error||newerSnap.error)throw new Error(olderSnap.error||newerSnap.error);
    const r=computeSnapshotDiff(olderSnap,newerSnap);
    renderDiff(r,'diffResult');
    if(n==='now'){
      drop('snapshots');
      api('snapshots').then(fresh=>{
        const hdr=document.getElementById('snapListHdr');
        if(hdr)hdr.textContent='Config Snapshots ('+fresh.snapshotCount+' / '+fresh.maxSnapshots+')';
        const mkOpts=snaps=>snaps.map((s,i)=>'<option value="'+i+'">'+h(s.timestamp)+'</option>').join('');
        const so=document.getElementById('selOlder');
        if(so)so.innerHTML='<option value="">Select...</option>'+mkOpts(fresh.snapshots);
        const sn=document.getElementById('selNewer');
        if(sn)sn.innerHTML='<option value="">Select...</option><option value="now">Now (create new)</option>'+mkOpts(fresh.snapshots);
        if(fresh.snapshots&&fresh.snapshots.length&&document.getElementById('snapTbl')){renderSnapTable(fresh.snapshots)}
      }).catch(()=>{})}}
    catch(e){document.getElementById('diffResult').innerHTML='<div class="alert a-crit">Failed to compare: '+h(e.message)+'</div>'}
    btnDiff.disabled=false;btnDiff.textContent='Compare'};
}catch(e){err(P,e,rSnap)}}

async function delSnap(idx){if(!confirm('Delete config snapshot '+(idx+1)+'?'))return;await post('snapshot/delete','index='+idx);drop('snapshots');rSnap()}

    ap.parentChildHierarchy.forEach(p=>{
      o+='<div style="margin-bottom:8px"><b>'+alink(p.id,p.label||p.type)+'</b> <span style="color:var(--muted)">('+p.childCount+' children)</span>';
      if(p.children&&p.children.length){o+='<ul style="margin:4px 0 0 16px;list-style:none;padding:0">';
        p.children.forEach(c=>{o+='<li style="padding:2px 0">'+alink(c.id,c.name||c.type)+(c.disabled?' <span style="color:var(--crit)">[disabled]</span>':'')+'</li>'});
        o+='</ul>'}
      o+='</div>'});
    o+='</div></details>'}
  // Network config
  const nw=s.network||{};
  const nwParts=[];
  if(nw.zigbee)nwParts.push('Zigbee ch '+(nw.zigbee.channel??'?')+(nw.zigbee.enabled===false?' [off]':''));
  if(nw.zwave)nwParts.push('Z-Wave '+(nw.zwave.region||'?')+' ('+nw.zwave.nodeCount+' nodes)'+(nw.zwave.enabled===false?' [off]':''));
  if(nw.matter)nwParts.push('Matter: '+(nw.matter.enabled?'enabled':'disabled'));
  if(nw.hubMesh){const peers=(nw.hubMesh.peers||[]).map(p=>h(p.name||p.ip)).join(', ');nwParts.push('Hub Mesh: '+(nw.hubMesh.enabled?(peers||'no peers'):'disabled'))}
  if(nwParts.length)o+='<div style="margin:8px 0;color:var(--muted);font-size:12px">'+nwParts.join(' &nbsp;|&nbsp; ')+'</div>';
  // Storage
  if(s.storage){const st=s.storage;
    const stParts=[];
    if(st.fileCount!=null)stParts.push(st.fileCount+' files');
    if(st.usedBytes!=null)stParts.push(fmem(st.usedBytes)+' used');
    if(st.freeSpace!=null)stParts.push(fmem(st.freeSpace)+' free');
    if(stParts.length)o+='<div style="margin:4px 0;color:var(--muted);font-size:12px">File Manager: '+stParts.join(' | ')+'</div>'}
  el.innerHTML=o;
  // Render sub-tables
  if(dv.allDevices&&dv.allDevices.length)
    tbl('snapDevTbl',[
      {l:'Name',f:'name',r:r=>dlink(r.id,r.name)},{l:'Type',f:'type'},{l:'Connection',f:'connectionType',r:r=>h(CD[r.connectionType]||r.connectionType||'')},{l:'Integration',f:'integration',r:r=>h(r.integration||'')},
      {l:'Status',f:'status',r:r=>sbadge(r.status)}
    ],dv.allDevices,{sc:0,sd:'asc'});
  if(ap.byNamespace){
    const ns=Object.entries(ap.byNamespace).map(([k,v])=>({name:k,count:v})).sort((a,b)=>b.count-a.count);
    tbl('snapAppTbl',[{l:'App Type',f:'name'},{l:'Instances',f:'count',t:'n'}],ns,{sc:1,sd:'desc'})}
  if(ap.userAppsList&&ap.userAppsList.length)
    tbl('snapUserAppTbl',[
      {l:'Name',f:'label',r:r=>alink(r.id,r.label)},{l:'Type',f:'name'},
      {l:'Status',f:'disabled',r:r=>r.disabled?'<span style="color:var(--crit);font-size:11px">[disabled]</span>':''}
    ],ap.userAppsList,{sc:0,sd:'asc'});
}

// Compute snapshot diff client-side. Mirrors the structure that renderDiff() expects;
// hub no longer ships /api/snapshot/diff. Inputs are two full snapshots fetched via
// /api/snapshot/view (which already runs migrateSnapshotDevices on the way out).
function computeSnapshotDiff(older, newer){
  // Chronological order
  if((older.timestampMs||0) > (newer.timestampMs||0)){const tmp=older;older=newer;newer=tmp}
  const oDevs=(older.devices&&older.devices.allDevices)||[];
  const nDevs=(newer.devices&&newer.devices.allDevices)||[];
  const oIds=new Set(oDevs.map(x=>x.id));
  const nIds=new Set(nDevs.map(x=>x.id));
  const oById={};oDevs.forEach(x=>{oById[x.id]=x});
  const mapDev=x=>({id:x.id,name:x.name,connectionType:CD[x.connectionType]||x.connectionType,integration:x.integration});
  const added=nDevs.filter(x=>!oIds.has(x.id)).map(mapDev);
  const removed=oDevs.filter(x=>!nIds.has(x.id)).map(mapDev);
  const changed=nDevs.filter(x=>oIds.has(x.id)).map(x=>{
    const old=oById[x.id];const ch=[];
    if(old.status!==x.status)ch.push({field:'status',from:old.status,to:x.status});
    if(old.connectionType!==x.connectionType)ch.push({field:'connectionType',from:CD[old.connectionType]||old.connectionType,to:CD[x.connectionType]||x.connectionType});
    if(old.integration!==x.integration)ch.push({field:'integration',from:old.integration,to:x.integration});
    return ch.length?{id:x.id,name:x.name,changes:ch}:null;
  }).filter(Boolean);

  const distChanges=(oMap,nMap,labelKey,labelXform)=>{
    oMap=oMap||{};nMap=nMap||{};
    const keys=new Set([...Object.keys(oMap),...Object.keys(nMap)]);
    return [...keys].filter(k=>(oMap[k]||0)!==(nMap[k]||0))
      .map(k=>({[labelKey]:labelXform?labelXform(k):k,from:oMap[k]||0,to:nMap[k]||0}));
  };
  const connectionTypeChanges=distChanges(older.devices&&older.devices.byConnectionType,newer.devices&&newer.devices.byConnectionType,'connectionType',k=>CD[k]||k);
  const integrationChanges=distChanges(older.devices&&older.devices.byIntegration,newer.devices&&newer.devices.byIntegration,'integration');

  const oApps=(older.apps&&older.apps.userAppsList)||[];
  const nApps=(newer.apps&&newer.apps.userAppsList)||[];
  const aid=a=>String(a.id||'');
  const oAids=new Set(oApps.map(aid));
  const nAids=new Set(nApps.map(aid));
  const oAppsById={};oApps.forEach(a=>{oAppsById[aid(a)]=a});
  const appsAdded=nApps.filter(a=>!oAids.has(aid(a))).map(a=>({id:a.id,name:a.name,label:a.label}));
  const appsRemoved=oApps.filter(a=>!nAids.has(aid(a))).map(a=>({id:a.id,name:a.name,label:a.label}));
  const appsChanged=nApps.filter(a=>{const o=oAppsById[aid(a)];return o&&((o.disabled||false)!==(a.disabled||false))})
    .map(a=>({id:a.id,name:a.name,label:a.label,disabled:a.disabled||false}));

  const oNet=older.network||{},nNet=newer.network||{};
  const networkChanges={};
  if((oNet.zigbee&&oNet.zigbee.channel)!==(nNet.zigbee&&nNet.zigbee.channel))
    networkChanges.zigbeeChannel={from:oNet.zigbee&&oNet.zigbee.channel,to:nNet.zigbee&&nNet.zigbee.channel};
  if((oNet.zwave&&oNet.zwave.region)!==(nNet.zwave&&nNet.zwave.region))
    networkChanges.zwaveRegion={from:oNet.zwave&&oNet.zwave.region,to:nNet.zwave&&nNet.zwave.region};
  if((oNet.matter&&oNet.matter.enabled)!==(nNet.matter&&nNet.matter.enabled))
    networkChanges.matterEnabled={from:oNet.matter&&oNet.matter.enabled,to:nNet.matter&&nNet.matter.enabled};
  const peerName=p=>p.name||p.ipAddress;
  const oPeers=((oNet.hubMesh&&oNet.hubMesh.hubList)||[]).map(peerName);
  const nPeers=((nNet.hubMesh&&nNet.hubMesh.hubList)||[]).map(peerName);
  const oPeerSet=new Set(oPeers),nPeerSet=new Set(nPeers);
  const peersAdded=nPeers.filter(p=>!oPeerSet.has(p));
  const peersRemoved=oPeers.filter(p=>!nPeerSet.has(p));
  if(peersAdded.length||peersRemoved.length)networkChanges.hubMeshPeers={added:peersAdded,removed:peersRemoved};
  if('ntpServer' in older && 'ntpServer' in newer && older.ntpServer!==newer.ntpServer)
    networkChanges.ntpServer={from:older.ntpServer,to:newer.ntpServer};
  if('loadThreshold' in older && 'loadThreshold' in newer && older.loadThreshold!==newer.loadThreshold)
    networkChanges.loadThreshold={from:older.loadThreshold,to:newer.loadThreshold};

  const oSt=older.storage||{},nSt=newer.storage||{};
  const storageChanges={};
  if(oSt.fileCount!=null&&nSt.fileCount!=null&&oSt.fileCount!==nSt.fileCount)storageChanges.fileCount={from:oSt.fileCount,to:nSt.fileCount};
  if(oSt.freeSpace!=null&&nSt.freeSpace!=null&&oSt.freeSpace!==nSt.freeSpace)storageChanges.freeSpace={from:oSt.freeSpace,to:nSt.freeSpace};

  const backupsChanges={};
  const oBk=older.backups,nBk=newer.backups;
  if(oBk&&nBk){
    const oLo=oBk.local||{},nLo=nBk.local||{};
    if((oLo.count||0)!==(nLo.count||0))backupsChanges.localCount={from:oLo.count||0,to:nLo.count||0};
    if(oLo.latestCreateTime!==nLo.latestCreateTime&&(oLo.latestCreateTime||nLo.latestCreateTime))
      backupsChanges.latestLocal={from:oLo.latestCreateTime,to:nLo.latestCreateTime};
    const oCl=oBk.cloud||{},nCl=nBk.cloud||{};
    if((oCl.thisHubCount||0)!==(nCl.thisHubCount||0))backupsChanges.cloudThisHubCount={from:oCl.thisHubCount||0,to:nCl.thisHubCount||0};
    if((oCl.hasCloudBackupEntitlements||false)!==(nCl.hasCloudBackupEntitlements||false))
      backupsChanges.cloudBackupEntitlement={from:oCl.hasCloudBackupEntitlements||false,to:nCl.hasCloudBackupEntitlements||false};
    if((oCl.hasCloudRestoreEntitlements||false)!==(nCl.hasCloudRestoreEntitlements||false))
      backupsChanges.cloudRestoreEntitlement={from:oCl.hasCloudRestoreEntitlements||false,to:nCl.hasCloudRestoreEntitlements||false};
  }

  const securityChanges={};
  const oSec=older.security,nSec=newer.security;
  if(oSec&&nSec){
    const oLim=!!(oSec.limitedAccess&&oSec.limitedAccess.enabled);
    const nLim=!!(nSec.limitedAccess&&nSec.limitedAccess.enabled);
    if(oLim!==nLim)securityChanges.limitedAccess={from:oLim,to:nLim};
    const oAddrs=(oSec.limitedAccess&&oSec.limitedAccess.addresses)||[];
    const nAddrs=(nSec.limitedAccess&&nSec.limitedAccess.addresses)||[];
    const setEq=(a,b)=>a.length===b.length&&a.every(x=>b.includes(x));
    if(!setEq(oAddrs,nAddrs))securityChanges.limitedAddresses={from:oAddrs,to:nAddrs};
    const oSub=oSec.allowedSubnets||[];const nSub=nSec.allowedSubnets||[];
    if(!setEq(oSub,nSub))securityChanges.allowedSubnets={from:oSub,to:nSub};
    if(oSec.dnsFallback!==nSec.dnsFallback)securityChanges.dnsFallback={from:oSec.dnsFallback,to:nSec.dnsFallback};
    if(oSec.cloudController!==nSec.cloudController&&(oSec.cloudController!=null||nSec.cloudController!=null))
      securityChanges.cloudController={from:oSec.cloudController,to:nSec.cloudController};
  }

  const codeChanges={};
  const oCode=older.code,nCode=newer.code;
  if(oCode&&nCode){
    const diffById=(o,n)=>{
      o=o||[];n=n||[];
      const oIds=new Set(o.map(x=>x.id));const nIdSet=new Set(n.map(x=>x.id));
      return {added:n.filter(x=>!oIds.has(x.id)),removed:o.filter(x=>!nIdSet.has(x.id))};
    };
    const bdl=diffById(oCode.bundles,nCode.bundles);
    if(bdl.added.length||bdl.removed.length)codeChanges.bundles=bdl;
    const oLib=oCode.libraries||[],nLib=nCode.libraries||[];
    const oLibById={};oLib.forEach(l=>{oLibById[l.id]=l});
    const lib=diffById(oLib,nLib);
    const versionChanged=nLib.filter(l=>oLibById[l.id]&&oLibById[l.id].version!==l.version)
      .map(l=>({id:l.id,name:l.name,namespace:l.namespace,from:oLibById[l.id].version,to:l.version}));
    if(lib.added.length||lib.removed.length||versionChanged.length)codeChanges.libraries={added:lib.added,removed:lib.removed,versionChanged};
    const oHv=oCode.hubVariables||[],nHv=nCode.hubVariables||[];
    const oHvByName={};oHv.forEach(v=>{oHvByName[v.name]=v});
    const oNames=new Set(oHv.map(v=>v.name));const nNames=new Set(nHv.map(v=>v.name));
    const hvAdded=nHv.filter(v=>!oNames.has(v.name));
    const hvRemoved=oHv.filter(v=>!nNames.has(v.name));
    const typeChanged=nHv.filter(v=>oHvByName[v.name]&&oHvByName[v.name].type!==v.type)
      .map(v=>({name:v.name,from:oHvByName[v.name].type,to:v.type}));
    if(hvAdded.length||hvRemoved.length||typeChanged.length)codeChanges.hubVariables={added:hvAdded,removed:hvRemoved,typeChanged};
  }

  return {
    older:{timestamp:older.timestamp,firmware:older.hubInfo&&older.hubInfo.firmware,storage:older.storage},
    newer:{timestamp:newer.timestamp,firmware:newer.hubInfo&&newer.hubInfo.firmware,storage:newer.storage},
    deviceChanges:{olderTotal:(older.devices&&older.devices.totalDevices)||0,newerTotal:(newer.devices&&newer.devices.totalDevices)||0,added,removed,changed},
    connectionTypeChanges, integrationChanges,
    appChanges:{olderTotal:(older.apps&&older.apps.totalApps)||0,newerTotal:(newer.apps&&newer.apps.totalApps)||0,added:appsAdded,removed:appsRemoved,changed:appsChanged},
    networkChanges:Object.keys(networkChanges).length?networkChanges:null,
    storageChanges:Object.keys(storageChanges).length?storageChanges:null,
    backupsChanges:Object.keys(backupsChanges).length?backupsChanges:null,
    securityChanges:Object.keys(securityChanges).length?securityChanges:null,
    codeChanges:Object.keys(codeChanges).length?codeChanges:null
  };
}

function renderDiff(d,elId){
  const el=document.getElementById(elId);if(!el)return;
  if(d.error){el.innerHTML='<div class="alert a-warn">'+h(d.error)+'</div>';return}
  let o='<h3>Config Snapshot Comparison</h3>';
  o+='<div style="margin:6px 0"><b>Older:</b> '+h(d.older.timestamp)+' &rarr; <b>Newer:</b> '+h(d.newer.timestamp)+'</div>';
  // Firmware
  if(d.older.firmware!==d.newer.firmware)o+='<div style="color:var(--primary);margin:4px 0"><b>Firmware:</b> '+h(d.older.firmware)+' &rarr; '+h(d.newer.firmware)+'</div>';
  // Device changes
  const dc=d.deviceChanges;const dd=dc.newerTotal-dc.olderTotal;
  o+='<div style="margin:8px 0"><b>Devices:</b> '+dc.olderTotal+' &rarr; '+dc.newerTotal+(dd!==0?' <span style="color:'+(dd>0?'var(--ok)':'var(--crit)')+'">('+( dd>0?'+':'')+dd+')</span>':'')+'</div>';
  if(dc.added.length){o+='<div class="diff-add" style="margin:4px 0"><b>Added ('+dc.added.length+'):</b></div>';
    dc.added.forEach(d=>{o+='<div class="diff-item diff-add">+ '+dlink(d.id,d.name)+' ('+h(d.integration||d.connectionType||'')+')</div>'})}
  if(dc.removed.length){o+='<div class="diff-rem" style="margin:4px 0"><b>Removed ('+dc.removed.length+'):</b></div>';
    dc.removed.forEach(d=>{o+='<div class="diff-item diff-rem">- '+dlink(d.id,d.name)+' ('+h(d.integration||d.connectionType||'')+')</div>'})}
  if(dc.changed.length){o+='<div class="diff-chg" style="margin:4px 0"><b>Changed ('+dc.changed.length+'):</b></div>';
    dc.changed.forEach(d=>{const ch=d.changes.map(c=>c.field+': '+c.from+' \u2192 '+c.to).join(', ');
      o+='<div class="diff-item diff-chg">~ '+dlink(d.id,d.name)+' &mdash; '+h(ch)+'</div>'})}
  // Protocol changes
  if(d.connectionTypeChanges&&d.connectionTypeChanges.length){o+='<div style="margin:8px 0"><b>Connection Type Changes:</b></div>';
    d.connectionTypeChanges.forEach(p=>{const dd=p.to-p.from;o+='<div class="diff-item">'+h(p.connectionType)+': '+p.from+' \u2192 '+p.to+' <span style="color:'+(dd>0?'var(--ok)':'var(--crit)')+'">('+( dd>0?'+':'')+dd+')</span></div>'})}
  if(d.integrationChanges&&d.integrationChanges.length){o+='<div style="margin:8px 0"><b>Integration Changes:</b></div>';
    d.integrationChanges.forEach(p=>{const dd=p.to-p.from;o+='<div class="diff-item">'+h(p.integration)+': '+p.from+' \u2192 '+p.to+' <span style="color:'+(dd>0?'var(--ok)':'var(--crit)')+'">('+( dd>0?'+':'')+dd+')</span></div>'})}
  // App changes
  const ac=d.appChanges;const ad=ac.newerTotal-ac.olderTotal;
  o+='<div style="margin:8px 0"><b>Apps:</b> '+ac.olderTotal+' \u2192 '+ac.newerTotal+(ad!==0?' <span style="color:'+(ad>0?'var(--ok)':'var(--crit)')+'">('+( ad>0?'+':'')+ad+')</span>':'')+'</div>';
  if(ac.added&&ac.added.length)ac.added.forEach(a=>o+='<div class="diff-item diff-add">+ '+alink(a.id,a.label||a.name)+'</div>');
  if(ac.removed&&ac.removed.length)ac.removed.forEach(a=>o+='<div class="diff-item diff-rem">- '+h(Obf.nm(a.label||a.name))+'</div>');
  if(ac.changed&&ac.changed.length){o+='<div class="diff-chg" style="margin:4px 0"><b>Status Changed ('+ac.changed.length+'):</b></div>';
    ac.changed.forEach(a=>o+='<div class="diff-item diff-chg">~ '+alink(a.id,a.label||a.name)+' &mdash; '+(a.disabled?'enabled \u2192 disabled':'disabled \u2192 enabled')+'</div>')}
  // Network config changes
  const nc=d.networkChanges||{};
  if(nc.zigbeeChannel)o+='<div style="margin:8px 0"><b>Zigbee Channel:</b> '+(nc.zigbeeChannel.from??'?')+' \u2192 '+(nc.zigbeeChannel.to??'?')+'</div>';
  if(nc.zwaveRegion)o+='<div style="margin:8px 0"><b>Z-Wave Region:</b> '+h(nc.zwaveRegion.from||'?')+' \u2192 '+h(nc.zwaveRegion.to||'?')+'</div>';
  if(nc.matterEnabled!=null)o+='<div style="margin:8px 0"><b>Matter:</b> '+(nc.matterEnabled.from?'enabled':'disabled')+' \u2192 '+(nc.matterEnabled.to?'enabled':'disabled')+'</div>';
  if(nc.hubMeshPeers){
    if(nc.hubMeshPeers.added&&nc.hubMeshPeers.added.length)nc.hubMeshPeers.added.forEach(p=>o+='<div class="diff-item diff-add">+ Hub Mesh peer: '+h(p)+'</div>');
    if(nc.hubMeshPeers.removed&&nc.hubMeshPeers.removed.length)nc.hubMeshPeers.removed.forEach(p=>o+='<div class="diff-item diff-rem">- Hub Mesh peer: '+h(p)+'</div>')}
  // Storage
  const os=d.older?.storage,ns=d.newer?.storage,sc=d.storageChanges||{};
  if(os||ns||Object.keys(sc).length){
    const fmtSt=st=>st?(st.fileCount+' files'+(st.usedBytes!=null?', '+fmem(st.usedBytes)+' used':'')+(st.freeSpace!=null?', '+fmem(st.freeSpace)+' free':'')):'N/A';
    o+='<div style="margin:8px 0"><b>File Manager:</b> '+fmtSt(os)+' → '+fmtSt(ns)+'</div>';
    if(sc.fileCount)o+='<div class="diff-item'+(sc.fileCount.to>sc.fileCount.from?' diff-add':sc.fileCount.to<sc.fileCount.from?' diff-rem':'')+'">Files: '+sc.fileCount.from+' → '+sc.fileCount.to+'</div>';
    if(sc.freeSpace)o+='<div class="diff-item'+(sc.freeSpace.to>sc.freeSpace.from?' diff-add':sc.freeSpace.to<sc.freeSpace.from?' diff-rem':'')+'">Free Space: '+fmem(sc.freeSpace.from)+' → '+fmem(sc.freeSpace.to)+'</div>'}
  // Backups (v5.13.0)
  const bc=d.backupsChanges;
  if(bc&&Object.keys(bc).length){o+='<div style="margin:8px 0"><b>Backups:</b></div>';
    if(bc.localCount){const dd=bc.localCount.to-bc.localCount.from;const cls=bc.localCount.to<bc.localCount.from?'diff-rem':bc.localCount.to>bc.localCount.from?'diff-add':'';o+='<div class="diff-item '+cls+'">Local backup count: '+bc.localCount.from+' → '+bc.localCount.to+(dd!==0?' ('+(dd>0?'+':'')+dd+')':'')+'</div>'}
    if(bc.latestLocal)o+='<div class="diff-item">Latest local backup: '+h(bc.latestLocal.from||'(none)')+' → '+h(bc.latestLocal.to||'(none)')+'</div>';
    if(bc.cloudThisHubCount){const dd=bc.cloudThisHubCount.to-bc.cloudThisHubCount.from;const cls=bc.cloudThisHubCount.to<bc.cloudThisHubCount.from?'diff-rem':bc.cloudThisHubCount.to>bc.cloudThisHubCount.from?'diff-add':'';o+='<div class="diff-item '+cls+'">Cloud backups (this hub): '+bc.cloudThisHubCount.from+' → '+bc.cloudThisHubCount.to+(dd!==0?' ('+(dd>0?'+':'')+dd+')':'')+'</div>'}
    if(bc.cloudBackupEntitlement)o+='<div class="diff-item diff-chg">Cloud backup entitlement: '+(bc.cloudBackupEntitlement.from?'yes':'no')+' → '+(bc.cloudBackupEntitlement.to?'yes':'no')+'</div>';

  }
  // Security (v5.13.0)
  const secCh=d.securityChanges;
  if(secCh&&Object.keys(secCh).length){o+='<div style="margin:8px 0"><b>Security:</b></div>';
    if(secCh.limitedAccess)o+='<div class="diff-item diff-chg">Limited Access: '+(secCh.limitedAccess.from?'enabled':'off')+' → '+(secCh.limitedAccess.to?'enabled':'off')+'</div>';
    if(secCh.limitedAddresses)o+='<div class="diff-item diff-chg">Allowed IPs: ['+secCh.limitedAddresses.from.map(h).join(', ')+'] → ['+secCh.limitedAddresses.to.map(h).join(', ')+']</div>';
    if(secCh.allowedSubnets)o+='<div class="diff-item diff-chg">Allowed Subnets: ['+secCh.allowedSubnets.from.map(h).join(', ')+'] → ['+secCh.allowedSubnets.to.map(h).join(', ')+']</div>';
    if(secCh.dnsFallback)o+='<div class="diff-item diff-chg">DNS Fallback: '+(secCh.dnsFallback.from?'on':'off')+' → '+(secCh.dnsFallback.to?'on':'off')+'</div>';
    if(secCh.cloudController)o+='<div class="diff-item diff-chg">Hubitat Cloud: '+h(secCh.cloudController.from||'?')+' → '+h(secCh.cloudController.to||'?')+'</div>';
  }
  // Network settings (NTP, load threshold) — extends networkChanges block
  if(nc.ntpServer)o+='<div style="margin:8px 0"><b>NTP Server:</b> '+h(nc.ntpServer.from||'(none)')+' → '+h(nc.ntpServer.to||'(none)')+'</div>';
  if(nc.loadThreshold)o+='<div style="margin:8px 0"><b>Hub Load Threshold:</b> '+h(String(nc.loadThreshold.from??'?'))+'% → '+h(String(nc.loadThreshold.to??'?'))+'%</div>';
  // Code inventory (v5.13.0)
  const cc=d.codeChanges;
  if(cc&&Object.keys(cc).length){o+='<div style="margin:8px 0"><b>User Code:</b></div>';
    if(cc.bundles){
      (cc.bundles.added||[]).forEach(b=>o+='<div class="diff-item diff-add">+ Bundle: '+h(b.namespace+'/'+b.name)+'</div>');
      (cc.bundles.removed||[]).forEach(b=>o+='<div class="diff-item diff-rem">- Bundle: '+h(b.namespace+'/'+b.name)+'</div>');
    }
    if(cc.libraries){
      (cc.libraries.added||[]).forEach(l=>o+='<div class="diff-item diff-add">+ Library: '+h(l.namespace+'/'+l.name)+(l.version?' v'+l.version:'')+'</div>');
      (cc.libraries.removed||[]).forEach(l=>o+='<div class="diff-item diff-rem">- Library: '+h(l.namespace+'/'+l.name)+(l.version?' v'+l.version:'')+'</div>');
      (cc.libraries.versionChanged||[]).forEach(l=>o+='<div class="diff-item diff-chg">~ Library: '+h(l.namespace+'/'+l.name)+' v'+l.from+' → v'+l.to+'</div>');
    }
    if(cc.hubVariables){
      (cc.hubVariables.added||[]).forEach(v=>o+='<div class="diff-item diff-add">+ Hub Variable: '+h(v.name)+(v.type?' ('+h(v.type)+')':'')+'</div>');
      (cc.hubVariables.removed||[]).forEach(v=>o+='<div class="diff-item diff-rem">- Hub Variable: '+h(v.name)+(v.type?' ('+h(v.type)+')':'')+'</div>');

    }
  }
  el.innerHTML=o;
}

  });

  document.getElementById('rc-zb-live').addEventListener('click',rcZbHandleTailClick);
  // Capture clicks on aggregate-table headers so user's sort choice survives the 1Hz re-render.
  document.getElementById('rc-zb-aggregates').addEventListener('click',rcZbHandleAggSortClick);

  const fq=document.getElementById('rc-zb-f-q');

  rcZbReadFilters();

function rcZbUpdateBadge(){
  const el=document.getElementById('rc-zb-state');if(!el)return;
  const z=RC.zigbee;
  const s=z.state;
  const cls=s==='connected'?'b-ok':s==='disconnected'||s==='idle'?'b-warn':'b-warn';
  el.className='badge '+cls;el.textContent=s;
  // Button enable/disable based on state + buffer presence
  const idle=s==='idle'||s==='disconnected';
  const hasFrames=!!z.buf&&z.buf.count()>0;
  document.getElementById('rc-zb-start').disabled=!idle;
  document.getElementById('rc-zb-stop').disabled=idle;
  document.getElementById('rc-zb-pause').disabled=idle;
  document.getElementById('rc-zb-clear').disabled=idle&&!z.buf;
  document.getElementById('rc-zb-dl').disabled=!hasFrames;
}

function rcZbStart(){
  const z=RC.zigbee;
  if(!RC.hubIp){alert('Hub IP unknown — open the Dashboard tab once first.');return}
  // Start always begins a fresh session. Prior buffer is discarded — Download first if needed.
  const mb=parseInt(document.getElementById('rc-zb-cap').value,10);
  z.buf=new FrameBuffer(mb*1024*1024);
  z.displayBuf=[];
  z.framesLastSec=[];
  z.pausedCapture=false;
  document.getElementById('rc-zb-pause').textContent='Pause capture';
  z.reconnectMs=1000;
  rcZbRenderTail({repin:true});   // fresh session: clear any stale rows and re-pin to live (Start may follow scrolling into history)
  rcZbConnect();
}

function rcZbStop(){
  const z=RC.zigbee;
  if(z.reconnectTimer){clearTimeout(z.reconnectTimer);z.reconnectTimer=null}
  if(z.socket){z.socket.onclose=null;z.socket.close();z.socket=null}
  // Buffer is preserved on stop so Download remains useful. Start or Clear discards it.
  z.state='idle';
  rcZbUpdateBadge();rcZbUpdateMetrics();
}

function rcZbPause(){
  const z=RC.zigbee;z.pausedCapture=!z.pausedCapture;
  document.getElementById('rc-zb-pause').textContent=z.pausedCapture?'Resume capture':'Pause capture';
}

function rcZbClear(){
  const z=RC.zigbee;if(z.buf)z.buf.clear();z.displayBuf=[];z.framesLastSec=[];
  rcZbUpdateMetrics();rcZbRenderTail({repin:true});
}

function rcZbCaptureMeta(){
  const z=RC.zigbee;
  return{
    hubName:RC.hubName,hubIp:RC.hubIp,firmware:null,
    appVersion:UI_VERSION,uiVersion:UI_VERSION,
    captureDurationS:z.buf&&z.buf.startedAt?Math.round((Date.now()-z.buf.startedAt)/1000):null
  };
}

function rcZbDownload(){
  const z=RC.zigbee;if(!z.buf||z.buf.count()===0)return;
  const fn=downloadRecording(z.buf,rcZbCaptureMeta(),'zigbee');
  console.log('Saved',fn);
}

function rcZbConnect(){
  const z=RC.zigbee;
  z.state='connecting';rcZbUpdateBadge();
  const url='ws://'+RC.hubIp+'/zigbeeLogsocket';
  const ws=new WebSocket(url);
  z.socket=ws;
  ws.onopen=()=>{z.state='connected';z.reconnectMs=1000;rcZbUpdateBadge()};
  ws.onmessage=ev=>rcZbOnFrame(ev.data);
  ws.onclose=()=>{
    z.socket=null;
    if(z.state==='idle')return; // clean stop
    z.state='reconnecting';rcZbUpdateBadge();
    z.reconnectTimer=setTimeout(rcZbConnect,z.reconnectMs);
    z.reconnectMs=Math.min(z.reconnectMs*2,30000);
  };
  ws.onerror=()=>{ /* close handler will run with the same effect */ };
}

function rcZbOnFrame(text){
  const z=RC.zigbee;if(!z.buf||z.pausedCapture)return;
  z.buf.push(text);
  const now=Date.now();
  z.framesLastSec.push(now);
  // prune to 5 s window for rate calc
  while(z.framesLastSec.length&&z.framesLastSec[0]<now-5000)z.framesLastSec.shift();
  // Metrics throttled to ~10 Hz via rAF; tail + aggregates each throttled to ~1 Hz to stay cheap as the buffer grows.
  if(!z._tailPending){z._tailPending=true;requestAnimationFrame(()=>{
    z._tailPending=false;rcZbUpdateMetrics();
    const t=Date.now();
    if(t-z.lastTailRenderAt>1000){z.lastTailRenderAt=t;rcZbRenderTail({fromTick:true})}
    if(t-z.lastAggregateAt>1000){z.lastAggregateAt=t;rcZbRenderAggregates()}
  })}
}

function rcZbUpdateMetrics(){
  const z=RC.zigbee;
  const rate=z.framesLastSec.length/5;
  const rateEl=document.getElementById('rc-zb-rate');if(rateEl)rateEl.textContent=rate.toFixed(1);
  const bufEl=document.getElementById('rc-zb-buffered');
  if(bufEl)bufEl.textContent=(z.buf?z.buf.count():0)+' frames / '+fbytes(z.buf?z.buf.bytes:0);
  const dropEl=document.getElementById('rc-zb-dropped');
  if(dropEl)dropEl.textContent=z.buf?z.buf.dropped:0;
  // Re-evaluate buffer-dependent button enables
  const hasFrames=!!z.buf&&z.buf.count()>0;
  document.getElementById('rc-zb-clear').disabled=!z.buf||z.buf.count()===0;
  const dl=document.getElementById('rc-zb-dl');if(dl)dl.disabled=!hasFrames;
}

// DNI on zigbeeLogsocket is a 16-bit integer; render as 0xHHHH (4-digit zero-padded uppercase hex).
// Also handles pure-decimal strings (e.g., "30944") and already-hex strings (e.g., "78E0", "0x78E0").
function rcZbDniHex(id){
  if(id==null||id==='')return'';
  if(typeof id==='number')return'0x'+(id&0xFFFF).toString(16).toUpperCase().padStart(4,'0');
  const s=String(id).trim();
  if(/^\d+$/.test(s))return'0x'+(parseInt(s,10)&0xFFFF).toString(16).toUpperCase().padStart(4,'0');
  return'0x'+s.replace(/^0x/i,'').toUpperCase().padStart(4,'0');
}

function rcZbFrameToRow(text){
  let f;try{f=JSON.parse(text)}catch(e){return null}
  const zcl=rcZbParseZcl(f.payload,f.clusterId);
  const sum=zcl?rcZbDecodedSummary(zcl):{short:'',full:''};
  return{
    time:f.time||'',
    id:rcZbDniHex(f.id),
    name:f.name||'',
    _deviceId:f.deviceId,
    cluster:f.clusterId?clusterLabel(f.clusterId,zcl&&zcl.mfrCode):'',
    cmd:zcl?resolveCmd(zcl):'',                       // decoded, offset-correct command
    dirArrow:zcl?rcZbDirArrow(zcl):'',                // ←hub / →dev, folded into the Command cell
    mfrMark:zcl&&zcl.mfrSpecific?' (mfr)':'',
    decoded:sum.short,                                // compact payload decode for the Decoded column
    decodedFull:sum.full,                             // full form for the cell title tooltip
    lqi:f.lastHopLqi!=null?f.lastHopLqi:'',
    rssi:f.lastHopRssi!=null?f.lastHopRssi:'',
    _raw:text
  };
}

function rcZbFilterCard(){
  return `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input id="rc-zb-f-q" type="text" placeholder="Filter live tail… (name, DNI, cluster, command, decoded value, LQI, RSSI)" style="flex:1;min-width:260px;padding:6px 10px">
        <span style="font-size:12px;opacity:.7">Substring match across all columns; space-separated terms all must match. Filters the live tail only — the recording stays full-fidelity.</span>
      </div>
    </div>`;

function rcZbReadFilters(){
  const el=document.getElementById('rc-zb-f-q');
  const v=el?el.value.trim().toLowerCase():'';
  // Space-separated terms, AND-matched against a per-frame search string. Null = no filter.
  RC.zigbee.filters=v?{q:v.split(/\s+/).filter(Boolean)}:null;
}

// Compose the same text the live tail shows for a frame, so the single filter box matches what the user sees.
function rcZbFrameHaystack(frame){
  const zcl=rcZbParseZcl(frame.payload,frame.clusterId);
  const sum=zcl?rcZbDecodedSummary(zcl):{short:''};
  return [
    frame.time, frame.name, rcZbDniHex(frame.id),
    clusterLabel(frame.clusterId||'',zcl&&zcl.mfrCode),
    zcl?rcZbDirArrow(zcl):'', zcl?resolveCmd(zcl):'', zcl&&zcl.mfrSpecific?'mfr':'',
    sum.short, frame.lastHopLqi, frame.lastHopRssi
  ].join(' ').toLowerCase();
}

function rcZbFrameMatchesFilter(text,f){
  if(!f||!f.q||!f.q.length)return true;
  let frame;try{frame=JSON.parse(text)}catch(e){return false}
  const hay=rcZbFrameHaystack(frame);
  return f.q.every(t=>hay.includes(t));
}

// Returns array of {k, v, ...extra} sorted by v desc. extraFn(frame) is called once per new key
// to seed auxiliary fields (e.g., deviceId for link rendering).
function rcZbAggregateBy(frames, keyFn, extraFn){
  const counts=new Map();
  for(const f of frames){const k=keyFn(f);if(!k)continue;
    let row=counts.get(k);
    if(!row){row={k,v:0,...(extraFn?extraFn(f):{})};counts.set(k,row)}
    row.v++;
  }
  return [...counts.values()].sort((a,b)=>b.v-a.v);
}

// OTA command types per Zigbee OTA spec (cluster 0x0019 ZCL commands).
const OTA_CMDS={'00':'Image Notify','01':'Query Next Image Req','02':'Query Next Image Resp',
  '03':'Image Block Req','04':'Image Page Req','05':'Image Block Resp',
  '06':'Upgrade End Req','07':'Upgrade End Resp','08':'Query Specific File Req','09':'Query Specific File Resp'};

function rcZbOtaSummary(frames){
  const byDev=new Map();
  for(const f of frames){
    if(f.clusterId!=='0019')continue;
    if(!f.payload||f.payload.length<6)continue;
    const key=f.name||rcZbDniHex(f.id)||'unknown';
    const cmd=String(f.payload[2]).toLowerCase().padStart(2,'0');
    const mfr=(f.payload[5]+f.payload[4]).toUpperCase();
    const row=byDev.get(key)||{device:key,frames:0,mfr:'',blockReqs:0,lastCmd:'',lastSeen:null,deviceId:null};
    row.frames++;row.mfr=mfr;row.lastCmd=OTA_CMDS[cmd]||('0x'+cmd);row.lastSeen=f.time||'';
    if(!row.deviceId&&f.deviceId)row.deviceId=f.deviceId;
    if(cmd==='03'||cmd==='04')row.blockReqs++;
    byDev.set(key,row);
  }
  return [...byDev.values()].sort((a,b)=>b.frames-a.frames);
}

// Per-device last-hop signal quality (LQI 0-255, higher=better; RSSI dBm, higher=better).
// Skips frames missing the metric. Returns one row per device with {n,min,avg,max} for each.
function rcZbSignalSummary(frames){
  const byDev=new Map();
  for(const f of frames){
    const key=f.name||rcZbDniHex(f.id);if(!key)continue;
    let row=byDev.get(key);
    if(!row){row={device:key,deviceId:f.deviceId||null,lqis:[],rssis:[]};byDev.set(key,row)}
    if(!row.deviceId&&f.deviceId)row.deviceId=f.deviceId;
    if(f.lastHopLqi!=null)row.lqis.push(f.lastHopLqi);
    if(f.lastHopRssi!=null)row.rssis.push(f.lastHopRssi);
  }
  const stat=a=>a.length?{n:a.length,min:Math.min(...a),max:Math.max(...a),avg:Math.round(a.reduce((s,x)=>s+x,0)/a.length)}:null;
  return [...byDev.values()].map(r=>({device:r.device,deviceId:r.deviceId,lqi:stat(r.lqis),rssi:stat(r.rssis)}));
}

function rcZbRenderAggregates(){
  const z=RC.zigbee;
  const container=document.getElementById('rc-zb-aggregates');
  if(!z.buf||z.buf.count()===0){container.innerHTML='';return}
  const win1=z.buf.window(60*1000);
  const win5=z.buf.window(5*60*1000);
  const parse=fr=>{try{return JSON.parse(fr.line)}catch(e){return null}};
  const parsed1=win1.frames.map(parse).filter(Boolean);
  const parsed5=win5.frames.map(parse).filter(Boolean);

  const devKey=f=>f.name||rcZbDniHex(f.id);
  const devExtra=f=>({deviceId:f.deviceId});
  const top1=rcZbAggregateBy(parsed1,devKey,devExtra).slice(0,10);
  const top5=rcZbAggregateBy(parsed5,devKey,devExtra).slice(0,10);
  const clusters=rcZbAggregateBy(parsed5,f=>{if(!f.clusterId)return null;const z=rcZbParseZcl(f.payload,f.clusterId);return clusterLabel(f.clusterId,z&&z.mfrCode)}).slice(0,15);

  const truncNote1=win1.fullCoverage?'':'<div class="warn-note" style="font-size:12px;color:var(--warn);margin-bottom:4px">Window truncated to last '+Math.round((Date.now()-win1.coverFrom)/1000)+' s of buffer.</div>';
  const truncNote5=win5.fullCoverage?'':'<div class="warn-note" style="font-size:12px;color:var(--warn);margin-bottom:4px">Window truncated to last '+Math.round((Date.now()-win5.coverFrom)/1000)+' s of buffer.</div>';

  container.innerHTML=`
    <div class="card" style="margin-top:12px">
      <h3 style="margin-top:0">Aggregates</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:16px">
        <div>
          <h4>Top talkers (1 min)</h4>${truncNote1}
          <div id="rc-zb-top1"></div>
        </div>
        <div>
          <h4>Top talkers (5 min)</h4>${truncNote5}
          <div id="rc-zb-top5"></div>
        </div>
        <div>
          <h4>Cluster breakdown (5 min)</h4>
          <div id="rc-zb-clusters"></div>
        </div>
      </div>
    </div>`;
  const devCol={l:'Device',f:'k',r:r=>r.deviceId?dlink(r.deviceId,r.k):h(r.k)};
  const s1=z.aggSort.top1, s5=z.aggSort.top5;
  tbl('rc-zb-top1',[devCol,{l:'Frames',f:'v',t:'n'}],top1,{filter:false,sc:s1.sc,sd:s1.sd});
  tbl('rc-zb-top5',[devCol,{l:'Frames',f:'v',t:'n'}],top5,{filter:false,sc:s5.sc,sd:s5.sd});
  renderBarChart(clusters.map(c=>({label:c.k,value:c.v})),'rc-zb-clusters',{height:200});
  // Signal quality: per-device LQI/RSSI rollups over the 5-min window, weakest links first.
  // Capped to the 10 weakest (lowest avg) like the Top-talkers tables above — sort here before
  // slicing since tbl() only sorts for display, so the cap keeps the worst offenders, not an
  // arbitrary 10. The header's column sort still rearranges those 10.
  const sig=rcZbSignalSummary(parsed5);
  const lqiRows=sig.filter(r=>r.lqi).map(r=>({device:r.device,deviceId:r.deviceId,frames:r.lqi.n,min:r.lqi.min,avg:r.lqi.avg,max:r.lqi.max})).sort((a,b)=>a.avg-b.avg).slice(0,10);
  const rssiRows=sig.filter(r=>r.rssi).map(r=>({device:r.device,deviceId:r.deviceId,frames:r.rssi.n,min:r.rssi.min,avg:r.rssi.avg,max:r.rssi.max})).sort((a,b)=>a.avg-b.avg).slice(0,10);
  if(lqiRows.length||rssiRows.length){
    container.insertAdjacentHTML('beforeend',
      '<div class="card" style="margin-top:12px"><h3 style="margin-top:0">Signal quality (last 5 min) <span style="font-weight:normal;font-size:12px;opacity:.7">— last-hop LQI/RSSI per device, weakest first</span></h3>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'
      +'<div><h4 style="margin-top:0">Weakest LQI</h4><div id="rc-zb-lqi"></div></div>'
      +'<div><h4 style="margin-top:0">Weakest RSSI</h4><div id="rc-zb-rssi"></div></div>'
      +'</div></div>');
    const sigCols=[
      {l:'Device',f:'device',r:r=>r.deviceId?dlink(r.deviceId,r.device):h(r.device)},
      {l:'Frames',f:'frames',t:'n'},{l:'Min',f:'min',t:'n'},{l:'Avg',f:'avg',t:'n'},{l:'Max',f:'max',t:'n'}
    ];
    const sl=z.aggSort.lqi, sr=z.aggSort.rssi;
    if(lqiRows.length)tbl('rc-zb-lqi',sigCols,lqiRows,{filter:false,sc:sl.sc,sd:sl.sd});
    if(rssiRows.length)tbl('rc-zb-rssi',sigCols,rssiRows,{filter:false,sc:sr.sc,sd:sr.sd});
  }
  const ota=rcZbOtaSummary(parsed5);
  if(ota.length){
    container.insertAdjacentHTML('beforeend',
      '<div class="card" style="margin-top:12px"><h3 style="margin-top:0">OTA progress (last 5 min)</h3><div id="rc-zb-ota"></div></div>');
    const so=z.aggSort.ota;
    tbl('rc-zb-ota',[
      {l:'Device',f:'device',r:r=>r.deviceId?dlink(r.deviceId,r.device):h(r.device)},
      {l:'Manufacturer',f:'mfr',r:r=>h(mfrLabel(r.mfr))},
      {l:'Frames',f:'frames',t:'n'},
      {l:'Block Reqs',f:'blockReqs',t:'n'},
      {l:'Last Cmd',f:'lastCmd'},
      {l:'Last Seen',f:'lastSeen'}
    ],ota,{filter:false,sc:so.sc,sd:so.sd});
  }
}

// ===== RADIO CAPTURE: shared live-tail scroll / auto-follow (Zigbee + Z-Wave) =====
// Frames render newest-first, so the "live edge" is the TOP of the scroll box.
// The scroll container is built once per sub-tab render (persistent) and only its
// inner <table> is repainted per tick, so scroll position survives. Auto-follow pins
// to the top; scrolling down or expanding a row un-pins and shows a jump-to-live pill.
const RC_PIN_THRESHOLD_PX = 8;
const RC_SCROLL_SUPPRESS_MS = 80;   // window during which rcTailOnScroll ignores the render's own programmatic scrollTop writes

// cfg: { liveId, tblId, z, rowsHtml }
// opt: { fromTick:true } new frames prepended (anchor history) | { repin:true } reset to live | {} keep position
// Precondition for fromTick: use it only when displayBuf grew at the FRONT since the last paint — newest rows
// added on top, existing rows unchanged in order (the 1 Hz ingest path). The table HTML is always rebuilt
// wholesale, so the scroll correction relies on the height delta, not a DOM-level prepend. Any paint that can
// reorder or drop existing rows (filter change) must pass { repin:true } instead, or the anchor math is wrong.
function rcTailPaint(cfg, opt){
  opt=opt||{};
  const z=cfg.z;
  const live=document.getElementById(cfg.liveId);if(!live)return;
  const headerHtml='Live tail ('+z.displayBuf.length+' frames) '
    +'<span style="font-weight:normal;font-size:12px;opacity:.7">— click a row to expand; top is live, scroll down for history</span>';
  let tbl=document.getElementById(cfg.tblId);
  if(!tbl){
    // First paint for this sub-tab render: build the persistent shell once. A brand-new shell has no
    // scroll history to preserve, so (re)establish the live-pinned invariant — module-level pin state may
    // be stale-unpinned from before a DOM rebuild (e.g. the Refresh button re-runs the panel renderer).
    z.pinnedToLive=true;z.pinBaselineLen=0;
    live.innerHTML='<div class="card">'
      +'<h3 id="'+cfg.tblId+'-h" style="margin-top:0">'+headerHtml+'</h3>'
      +'<div style="position:relative">'
      +'<button id="'+cfg.tblId+'-pill" type="button" style="display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:2;cursor:pointer;border:0;border-radius:12px;padding:4px 12px;font-size:12px;background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)"></button>'
      +'<div id="'+cfg.tblId+'" style="max-height:420px;overflow-y:auto;border:1px solid rgba(255,255,255,0.08);border-radius:4px">'+cfg.rowsHtml+'</div>'
      +'</div></div>';
    tbl=document.getElementById(cfg.tblId);
    tbl.addEventListener('scroll',()=>rcTailOnScroll(cfg));
    document.getElementById(cfg.tblId+'-pill').addEventListener('click',()=>rcTailJumpToLive(cfg));
    z._suppressScrollUntil=performance.now()+RC_SCROLL_SUPPRESS_MS;tbl.scrollTop=0;
    rcTailUpdatePill(cfg);
    return;
  }
  // Subsequent paints: update the header count, swap only the inner table, keep scroll sane.
  const hEl=document.getElementById(cfg.tblId+'-h');if(hEl)hEl.innerHTML=headerHtml;
  const oldH=tbl.scrollHeight,oldTop=tbl.scrollTop;
  tbl.innerHTML=cfg.rowsHtml;
  let newTop;
  if(opt.repin){z.pinnedToLive=true;z.pinBaselineLen=0;newTop=0;}
  else if(z.pinnedToLive){newTop=0;}
  else if(opt.fromTick){newTop=oldTop+(tbl.scrollHeight-oldH);}  // new frames prepended above the viewport
  else{newTop=oldTop;}                                           // user interaction (expand/collapse): hold position
  z._suppressScrollUntil=performance.now()+RC_SCROLL_SUPPRESS_MS;tbl.scrollTop=newTop;
  rcTailUpdatePill(cfg);
}

// Pin when the user returns to the top; un-pin (and snapshot the baseline frame count) when they scroll into history.
function rcTailOnScroll(cfg){
  const z=cfg.z;
  if(performance.now()<(z._suppressScrollUntil||0))return;   // ignore the render's own programmatic scrolls
  const tbl=document.getElementById(cfg.tblId);if(!tbl)return;
  if(tbl.scrollTop<=RC_PIN_THRESHOLD_PX){
    if(!z.pinnedToLive){z.pinnedToLive=true;z.pinBaselineLen=0;rcTailUpdatePill(cfg);}
  }else if(z.pinnedToLive){
    z.pinnedToLive=false;z.pinBaselineLen=z.displayBuf.length;rcTailUpdatePill(cfg);
  }
}

function rcTailUpdatePill(cfg){
  const z=cfg.z;
  const pill=document.getElementById(cfg.tblId+'-pill');if(!pill)return;
  const n=Math.max(0,z.displayBuf.length-(z.pinBaselineLen||0));
  if(!z.pinnedToLive&&n>0){pill.style.display='';pill.textContent='▲ '+n+' new frame'+(n===1?'':'s');}
  else{pill.style.display='none';}
}

function rcTailJumpToLive(cfg){
  const z=cfg.z;const tbl=document.getElementById(cfg.tblId);if(!tbl)return;
  z.pinnedToLive=true;z.pinBaselineLen=0;
  z._suppressScrollUntil=performance.now()+RC_SCROLL_SUPPRESS_MS;tbl.scrollTop=0;
  rcTailUpdatePill(cfg);
}

function rcZbRenderTail(opt){
  const z=RC.zigbee;
  // Rebuild displayBuf from the entire recording buffer (filter-respecting). Newest first.
  // Buffer accumulates without cap — the visible area is constrained by max-height + overflow-y on the wrapper.
  const src=z.buf?z.buf.frames:[];
  const filters=z.filters;
  z.displayBuf=[];
  for(let i=src.length-1;i>=0;i--){
    if(!rcZbFrameMatchesFilter(src[i].line,filters))continue;
    const r=rcZbFrameToRow(src[i].line);if(r)z.displayBuf.push(r);
  }
  // If the selected row scrolled out (e.g., ring overflow dropped it), deselect.
  if(z.selectedRaw&&!z.displayBuf.some(r=>r._raw===z.selectedRaw))z.selectedRaw=null;
  rcTailPaint({liveId:'rc-zb-live',tblId:'rc-zb-tail-tbl',z:z,rowsHtml:rcZbRenderTailHtml(z.displayBuf,z.selectedRaw)},opt);
}

function rcZbRenderTailHtml(rows, selectedRaw){
  if(!rows.length)return '<p style="color:var(--muted,#888);padding:16px;margin:0">No frames yet</p>';
  const th='padding:6px 10px;text-align:left;font-size:12px;background:#1a1d24;position:sticky;top:0;z-index:1;border-bottom:1px solid rgba(255,255,255,0.12)';
  const td='padding:5px 10px;font-size:12px;border-top:1px solid rgba(255,255,255,0.05);vertical-align:top';
  const tdMono=td+';font-family:ui-monospace,SFMono-Regular,Menlo,monospace';
  let html='<table style="width:100%;border-collapse:collapse"><thead><tr>';
  ['Time','Name','DNI','LQI','RSSI','Cluster','Command','Decoded'].forEach(l=>html+='<th style="'+th+'">'+l+'</th>');
  html+='</tr></thead><tbody>';
  rows.forEach((r,idx)=>{
    const sel=r._raw===selectedRaw;
    const rowBg=sel?'background:rgba(33,150,243,0.18)':'';
    const cmdCell=(r.dirArrow?'<span style="opacity:.65">'+h(r.dirArrow)+'</span> ':'')+h(r.cmd||'')+(r.mfrMark?'<span style="opacity:.6">'+h(r.mfrMark)+'</span>':'');
    html+='<tr data-idx="'+idx+'" style="cursor:pointer;'+rowBg+'">';
    html+='<td style="'+td+'">'+h(r.time)+'</td>';
    html+='<td style="'+td+'">'+(r._deviceId?dlink(r._deviceId,r.name):h(Obf.nm(r.name)))+'</td>';
    html+='<td style="'+tdMono+'">'+h(r.id)+'</td>';
    html+='<td style="'+td+';text-align:right">'+h(String(r.lqi))+'</td>';
    html+='<td style="'+td+';text-align:right">'+h(String(r.rssi))+'</td>';
    html+='<td style="'+td+'">'+h(r.cluster)+'</td>';
    html+='<td style="'+td+'">'+cmdCell+'</td>';
    html+='<td style="'+tdMono+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px"'+(r.decodedFull?' title="'+h(r.decodedFull)+'"':'')+'>'+h(r.decoded||'')+'</td>';
    html+='</tr>';
    if(sel){
      let pretty;try{pretty=JSON.stringify(JSON.parse(r._raw),null,2)}catch(e){pretty=r._raw}
      html+='<tr style="background:rgba(33,150,243,0.08)"><td colspan="8" style="padding:8px 14px">'+rcZbDecodeHtml(r._raw)+'<pre style="margin:0;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;word-break:break-all;color:var(--text)">'+h(pretty)+'</pre></td></tr>';
    }
  });
  html+='</tbody></table>';
  return html;
}

// Mirror tbl()'s internal sort-toggle logic so our persisted sort state stays in sync with what tbl() actually showed.
// tbl(): same column → flip asc/desc; different column → set new column with desc default.
function rcZbHandleAggSortClick(e){
  const th=e.target.closest('th[data-c]');if(!th)return;
  const tableEl=th.closest('table');if(!tableEl)return;
  const wrap=tableEl.closest('[id^="rc-zb-"]');if(!wrap)return;

  if(!key)return;

function rcZwUpdateBadge(){
  const el=document.getElementById('rc-zw-state');if(!el)return;
  const z=RC.zwave;
  const s=z.state;
  const cls=s==='connected'?'b-ok':'b-warn';
  el.className='badge '+cls;el.textContent=s;
  const idle=s==='idle'||s==='disconnected';
  const hasFrames=!!z.buf&&z.buf.count()>0;
  document.getElementById('rc-zw-start').disabled=!idle;
  document.getElementById('rc-zw-stop').disabled=idle;
  document.getElementById('rc-zw-pause').disabled=idle;
  document.getElementById('rc-zw-clear').disabled=idle&&!z.buf;
  document.getElementById('rc-zw-dl').disabled=!hasFrames;

function rcZwStart(){
  const z=RC.zwave;
  if(!RC.hubIp){alert('Hub IP unknown — open the Dashboard tab once first.');return}
  // Start always begins a fresh session. Prior buffer is discarded — Download first if needed.
  const mb=parseInt(document.getElementById('rc-zw-cap').value,10);
  z.buf=new FrameBuffer(mb*1024*1024);
  z.displayBuf=[];
  z.framesLastSec=[];
  z.pausedCapture=false;
  z.stack=RC.zwaveStack;          // freeze the per-stack mapper choice for this session
  document.getElementById('rc-zw-pause').textContent='Pause capture';
  z.reconnectMs=1000;
  rcZwRenderTail({repin:true});   // fresh session: clear any stale rows and re-pin to live (Start may follow scrolling into history)
  rcZwConnect();
}

function rcZwStop(){
  const z=RC.zwave;
  if(z.reconnectTimer){clearTimeout(z.reconnectTimer);z.reconnectTimer=null}
  if(z.socket){z.socket.onclose=null;z.socket.close();z.socket=null}
  // Buffer preserved on stop so Download stays useful. Start or Clear discards it.
  z.state='idle';
  rcZwUpdateBadge();rcZwUpdateMetrics();
}

function rcZwPause(){
  const z=RC.zwave;z.pausedCapture=!z.pausedCapture;
  document.getElementById('rc-zw-pause').textContent=z.pausedCapture?'Resume capture':'Pause capture';
}

function rcZwClear(){
  const z=RC.zwave;if(z.buf)z.buf.clear();z.displayBuf=[];z.framesLastSec=[];
  rcZwUpdateMetrics();rcZwRenderTail({repin:true});
}

function rcZwCaptureMeta(){

    hubName:RC.hubName,hubIp:RC.hubIp,firmware:null,zwaveStack:RC.zwaveStack,

  };
}

function rcZwDownload(){
  const z=RC.zwave;if(!z.buf||z.buf.count()===0)return;
  const fn=downloadRecording(z.buf,rcZwCaptureMeta(),'zwave');
  console.log('Saved',fn);
}

function rcZwConnect(){
  const z=RC.zwave;
  z.state='connecting';rcZwUpdateBadge();
  const url='ws://'+RC.hubIp+'/zwaveLogsocket';
  const ws=new WebSocket(url);
  z.socket=ws;
  ws.onopen=()=>{z.state='connected';z.reconnectMs=1000;rcZwUpdateBadge()};
  ws.onmessage=ev=>rcZwOnFrame(ev.data);
  ws.onclose=()=>{
    z.socket=null;
    if(z.state==='idle')return; // clean stop
    z.state='reconnecting';rcZwUpdateBadge();
    z.reconnectTimer=setTimeout(rcZwConnect,z.reconnectMs);
    z.reconnectMs=Math.min(z.reconnectMs*2,30000);
  };
  ws.onerror=()=>{ /* close handler will run with the same effect */ };
}

function rcZwOnFrame(text){
  const z=RC.zwave;if(!z.buf||z.pausedCapture)return;
  z.buf.push(text);          // raw, unmodified — keeps the recording full-fidelity
  const now=Date.now();
  z.framesLastSec.push(now);
  while(z.framesLastSec.length&&z.framesLastSec[0]<now-5000)z.framesLastSec.shift();
  // Metrics throttled via rAF; tail re-render throttled to ~1 Hz to stay cheap as the buffer grows.
  if(!z._tailPending){z._tailPending=true;requestAnimationFrame(()=>{
    z._tailPending=false;rcZwUpdateMetrics();
    const t=Date.now();
    if(t-z.lastTailRenderAt>1000){z.lastTailRenderAt=t;rcZwRenderTail({fromTick:true})}
  })}
}

function rcZwUpdateMetrics(){
  const z=RC.zwave;
  const rate=z.framesLastSec.length/5;
  const rateEl=document.getElementById('rc-zw-rate');if(rateEl)rateEl.textContent=rate.toFixed(1);
  const bufEl=document.getElementById('rc-zw-buffered');
  if(bufEl)bufEl.textContent=(z.buf?z.buf.count():0)+' frames / '+fbytes(z.buf?z.buf.bytes:0);
  const dropEl=document.getElementById('rc-zw-dropped');
  if(dropEl)dropEl.textContent=z.buf?z.buf.dropped:0;
  const hasFrames=!!z.buf&&z.buf.count()>0;
  const cl=document.getElementById('rc-zw-clear');if(cl)cl.disabled=!z.buf||z.buf.count()===0;
  const dl=document.getElementById('rc-zw-dl');if(dl)dl.disabled=!hasFrames;
}

// Per-stack frame→row dispatch. The connect URL is identical for both stacks; only the row mapper differs.
function rcZwFrameToRow(text){
  const s=RC.zwave.stack||RC.zwaveStack||'unknown';
  if(s==='legacy')return rcZwLegacyFrameToRow(text);   // implemented (HAR-derived imeReport schema)
  if(s==='js')return rcZwJsFrameToRow(text);           // stub — falls back to raw until a JS sample exists
  return rcZwRawFrameToRow(text);                       // unknown → raw fallback
}

// Z/IP (legacy) zwaveLogsocket frame:
//   {seqNo, name, deviceId, id:"<decimal node id>", imeReport:{...,"3":[rssiPerHop],...}, time, type}
// imeReport["3"] is RSSI per hop in dBm; 127 = unused hop.
function rcZwLegacyFrameToRow(text){
  let f;try{f=JSON.parse(text)}catch(e){return rcZwRawFrameToRow(text)}
  const ime=f.imeReport||{};
  const hops=Array.isArray(ime['3'])?ime['3']:[];
  const rssi=hops.filter(v=>v!=null&&v!==127).join('/');
  return{
    time:f.time||'',
    node:(f.id!=null?String(f.id):''),
    device:f.name||'',
    _deviceId:f.deviceId,
    type:f.type||'',
    rssi:rssi,
    seq:(f.seqNo!=null?f.seqNo:''),
    _raw:text
  };
}

// STUB: no Z-Wave JS zwaveLogsocket sample yet (needs a JS-stack hub with paired nodes).
// Finalize the named-field extraction here once a sample is captured. Until then, show JS frames raw.
function rcZwJsFrameToRow(text){return rcZwRawFrameToRow(text)}

// Universal fallback: pull a timestamp if the line is JSON, otherwise show the raw line verbatim.
function rcZwRawFrameToRow(text){
  let t='';try{const f=JSON.parse(text);if(f&&f.time)t=f.time}catch(e){}
  return{time:t,raw:text,_raw:text};
}

function rcZwRenderTail(opt){
  const z=RC.zwave;
  // Rebuild displayBuf from the full recording buffer, newest first.
  const src=z.buf?z.buf.frames:[];
  z.displayBuf=[];
  for(let i=src.length-1;i>=0;i--){
    const r=rcZwFrameToRow(src[i].line);if(r)z.displayBuf.push(r);
  }
  if(z.selectedRaw&&!z.displayBuf.some(r=>r._raw===z.selectedRaw))z.selectedRaw=null;
  rcTailPaint({liveId:'rc-zw-live',tblId:'rc-zw-tail-tbl',z:z,rowsHtml:rcZwRenderTailHtml(z.displayBuf,z.selectedRaw,z.stack)},opt);
}
